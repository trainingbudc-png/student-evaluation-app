<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบแดชบอร์ดผู้ดูแลระบบ - Admin Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f1f5f9; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { color: #1e293b; margin-top: 0; border-bottom: 2px solid #e2e8f0; padding-bottom: 15px; }
        .btn-refresh { padding: 10px 20px; background: #4f46e5; color: white; border: none; border-radius: 4px; font-size: 15px; cursor: pointer; font-weight: bold; transition: background 0.2s; }
        .btn-refresh:hover { background: #4338ca; }
        .table-responsive { margin-top: 20px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 15px; }
        th, td { padding: 12px 15px; border-bottom: 1px solid #e2e8f0; }
        th { background-color: #f8fafc; color: #64748b; font-weight: bold; }
        tr:hover { background-color: #f8fafc; }
        .badge { padding: 4px 8px; border-radius: 12px; font-size: 13px; font-weight: bold; }
        .badge-success { background-color: #d1fae5; color: #065f46; }
        .badge-warning { background-color: #fef3c7; color: #b45309; }
        .status-text { font-size: 14px; color: #64748b; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px;">
        <h2>⚙️ แดชบอร์ดติดตามสถานะการประเมินผล (Admin)</h2>
        <button class="btn-refresh" onclick="loadAdminLogs()">🔄 อัปเดตดึงข้อมูลล่าสุด</button>
    </div>
    
    <p class="status-text" id="statusText">กดปุ่มด้านบนเพื่อโหลดประวัติการประเมินจาก Google Sheets</p>

    <div class="table-responsive">
        <table>
            <thead>
                <tr>
                    <th>วัน-เวลาประเมิน</th>
                    <th>อาจารย์ผู้ประเมิน</th>
                    <th>รหัสวิชา</th>
                    <th>รหัสนิสิต</th>
                    <th>ชื่อ-นามสกุลนิสิต</th>
                    <th>คะแนนรวม (100)</th>
                    <th>ผลการประเมิน</th>
                </tr>
            </thead>
            <tbody id="logTableBody">
                <tr>
                    <td colspan="7" style="text-align: center; color: #94a3b8; padding: 30px;">ไม่มีข้อมูลการประเมิน หรือกรุณากดปุ่มเพื่อโหลดข้อมูลล่าสุด</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    // 🔗 ฝัง URL เว็บแอปให้เรียบร้อยแล้วครับ ไม่ต้องแก้ไขอะไรเพิ่ม
    const API_URL = "https://script.google.com/macros/s/AKfycby-NJ261ieZ5r37krHBdcK4dbJmxD0ZYhapsrgmBKtZorzjVPGAi643QrBWc72GHVEY/exec"; 

    async function loadAdminLogs() {
        const statusText = document.getElementById('statusText');
        const tbody = document.getElementById('logTableBody');
        
        statusText.innerText = '⏳ กำลังติดต่อเชื่อมโยงคลังข้อมูลคลาวด์...';
        tbody.innerHTML = `<tr><td colspan="7" style="text-align: center; padding: 30px;">กำลังโหลด...</td></tr>`;

        try {
            const response = await fetch(`${API_URL}?action=getAdminLogs`);
            const logs = await response.json();

            if (logs.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" style="text-align: center; color: #94a3b8; padding: 30px;">คลังข้อมูลว่างเปล่า (ยังไม่เคยมีบันทึกการประเมินส่งเข้ามา)</td></tr>`;
                statusText.innerText = 'โหลดเสร็จสิ้น: ไม่พบข้อมูลบันทึก';
                return;
            }

            tbody.innerHTML = '';
            // เรียงลำดับเอาอันล่าสุดขึ้นก่อน
            logs.reverse().forEach(log => {
                const tr = document.createElement('tr');
                
                // จัดการ Format วันที่ให้ดูง่ายขึ้น
                const dateObj = new Date(log.date);
                const formattedDate = dateObj.toLocaleDateString('th-TH', {
                    year: 'numeric', month: 'short', day: 'numeric',
                    hour: '2-digit', minute: '2-digit'
                });

                // ตรวจสอบBadgeเกรด
                const badgeClass = log.grade.includes('โดดเด่น') ? 'badge-success' : 'badge-warning';

                tr.innerHTML = `
                    <td>${formattedDate} น.</td>
                    <td><strong>${log.teacher}</strong></td>
                    <td><code style="background:#f1f5f9; padding:2px 6px; border-radius:4px;">${log.subject}</code></td>
                    <td>${log.studentId}</td>
                    <td>${log.studentName}</td>
                    <td><strong>${log.totalScore}</strong> แต้ม</td>
                    <td><span class="badge ${badgeClass}">${log.grade}</span></td>
                `;
                tbody.appendChild(tr);
            });

            statusText.innerText = `✅ อัปเดตข้อมูลสำเร็จ ดึงข้อมูลล่าสุดเมื่อ: ${new Date().toLocaleTimeString('th-TH')} น. (พบทั้งหมด ${logs.length} รายการ)`;

        } catch (error) {
            statusText.innerText = '❌ เกิดข้อผิดพลาดในการเชื่อมต่อกรุณาลองตรวจสอบอินเทอร์เน็ต';
            tbody.innerHTML = `<tr><td colspan="7" style="text-align: center; color: red; padding: 30px;">ไม่สามารถโหลดข้อมูลได้</td></tr>`;
        }
    }

    // สั่งให้โหลดอัตโนมัติเมื่อเปิดหน้าเว็บขึ้นมาครั้งแรก
    window.onload = loadAdminLogs;
</script>
</body>
</html>
