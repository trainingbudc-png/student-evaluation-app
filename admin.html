<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบควบคุมแอดมินหลัก - 10 เมนูจัดการฐานข้อมูล</title>

    <link rel="icon" type="image/png" href="logo.png">

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: { extend: { fontFamily: { sans: ['Prompt', 'sans-serif'] } } }
        }
    </script>
</head>
<body class="bg-slate-100 text-slate-800 font-sans min-h-screen flex">

    <aside id="sidebar" class="w-80 bg-slate-900 text-slate-300 flex flex-col min-h-screen shadow-xl border-r border-slate-800 shrink-0 transition-all duration-300 overflow-hidden">
        <div class="p-6 border-b border-slate-800 bg-slate-950 flex items-center gap-3 w-80">
            <span class="text-3xl">⚙️</span>
            <div>
                <h1 class="text-lg font-bold text-white leading-none mb-1">Admin Panel</h1>
                <p class="text-xs text-slate-500 font-light">ระบบจัดการข้อมูลแพทย์ศาสตรศึกษา</p>
            </div>
        </div>
        
        <nav class="flex-grow p-4 space-y-6 overflow-y-auto w-80" style="max-height: calc(100vh - 90px);">
            <div>
                <p class="px-3 text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">🧑‍🎓 ข้อมูลนิสิต</p>
                <div class="space-y-1">
                    <button onclick="switchTab('studentProfiles')" id="btn-studentProfiles" class="tab-btn w-full text-left px-4 py-2.5 rounded-xl font-medium text-sm flex items-center gap-3 hover:bg-slate-800 transition-all">📸 ข้อมูลนิสิต & รูปภาพ</button>
                </div>
            </div>

            <div>
                <p class="px-3 text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">📊 ผลการประเมิน & ตารางงาน</p>
                <div class="space-y-1">
                    <button onclick="switchTab('evaluationResults')" id="btn-evaluationResults" class="tab-btn w-full text-left px-4 py-2.5 rounded-xl font-medium text-sm flex items-center gap-3 hover:bg-slate-800 transition-all">📝 ผลการประเมินทั้งหมด</button>
                    <button onclick="switchTab('mainElectives')" id="btn-mainElectives" class="tab-btn w-full text-left px-4 py-2.5 rounded-xl font-medium text-sm flex items-center gap-3 hover:bg-slate-800 transition-all">📅 ตารางเรียนนิสิต (Elective)</button>
                </div>
            </div>

            <div>
                <p class="px-3 text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">🎓 เกณฑ์ & รายชื่อวิชา</p>
                <div class="space-y-1">
                    <button onclick="switchTab('formCriteria')" id="btn-formCriteria" class="tab-btn w-full text-left px-4 py-2.5 rounded-xl font-medium text-sm flex items-center gap-3 hover:bg-slate-800 transition-all">📋 เกณฑ์การประเมิน (Rubrics)</button>
                    <button onclick="switchTab('assessors')" id="btn-assessors" class="tab-btn w-full text-left px-4 py-2.5 rounded-xl font-medium text-sm flex items-center gap-3 hover:bg-slate-800 transition-all">👨‍🏫 รายชื่ออาจารย์ผู้ประเมิน</button>
                    <button onclick="switchTab('subjects')" id="btn-subjects" class="tab-btn w-full text-left px-4 py-2.5 rounded-xl font-medium text-sm flex items-center gap-3 hover:bg-slate-800 transition-all">📚 รายชื่อวิชาเรียน</button>
                </div>
            </div>

            <div>
                <p class="px-3 text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">🗂️ ข้อมูลระบบ (Master Data)</p>
                <div class="space-y-1">
                    <button onclick="switchTab('departments')" id="btn-departments" class="tab-btn w-full text-left px-4 py-2.5 rounded-xl font-medium text-sm flex items-center gap-3 hover:bg-slate-800 transition-all">🏢 ข้อมูลภาควิชา</button>
                    <button onclick="switchTab('specialties')" id="btn-specialties" class="tab-btn w-full text-left px-4 py-2.5 rounded-xl font-medium text-sm flex items-center gap-3 hover:bg-slate-800 transition-all">🧬 ข้อมูลสาขาวิชา</button>
                    <button onclick="switchTab('positions')" id="btn-positions" class="tab-btn w-full text-left px-4 py-2.5 rounded-xl font-medium text-sm flex items-center gap-3 hover:bg-slate-800 transition-all">🎖️ ข้อมูลตำแหน่งอาจารย์</button>
                    <button onclick="switchTab('institutes')" id="btn-institutes" class="tab-btn w-full text-left px-4 py-2.5 rounded-xl font-medium text-sm flex items-center gap-3 hover:bg-slate-800 transition-all">🏥 ข้อมูลสถาบัน / รพ.</button>
                    <button onclick="switchTab('provinces')" id="btn-provinces" class="tab-btn w-full text-left px-4 py-2.5 rounded-xl font-medium text-sm flex items-center gap-3 hover:bg-slate-800 transition-all">🗺️ ข้อมูลจังหวัด</button>
                </div>
            </div>
        </nav>
    </aside>

    <main class="flex-grow flex flex-col h-screen overflow-hidden">
        <header class="bg-white border-b border-slate-200 px-8 py-4 flex items-center justify-between shadow-sm shrink-0">
            <div class="flex items-center gap-4">
                <button onclick="toggleSidebar()" class="p-2 hover:bg-slate-100 rounded-lg text-slate-600 transition-colors focus:outline-none focus:ring-2 focus:ring-slate-200">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                    </svg>
                </button>
                <h2 id="current-title" class="text-xl font-bold text-slate-800">กำลังโหลดฐานข้อมูลระบบ...</h2>
            </div>
            
            <div class="flex items-center gap-4">
                <input type="text" id="searchBox" oninput="searchTable()" placeholder="🔍 ค้นหาในหน้านี้..." class="px-4 py-2 text-sm border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 w-64 transition-all">
                <button id="addBtn" onclick="openAddModal()" class="bg-blue-600 hover:bg-blue-700 text-white text-sm font-semibold px-5 py-2 rounded-xl shadow-lg shadow-blue-100 flex items-center gap-1.5 transition-all">
                    ➕ เพิ่มข้อมูลใหม่
                </button>
            </div>
        </header>

        <section class="flex-grow p-8 overflow-auto">
            <div class="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead id="table-head" class="bg-slate-50 border-b border-slate-200 text-xs font-bold text-slate-500 uppercase tracking-wider sticky top-0 z-10">
                        </thead>
                        <tbody id="table-body" class="text-sm divide-y divide-slate-100 text-slate-600">
                            <tr>
                                <td colspan="15" class="text-center py-12 text-slate-400">กรุณารอสักครู่ ระบบกำลังดึงฐานข้อมูลสดจาก Excel...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzztzVKjo66T95WJHOIir1QRR5JmPgnJv83ZLNM3dWtqZNnT_pDx4Ktu6O1-6-hm9Cy1w/exec"; 
        
        let ALL_DATA = {};
        let currentActiveTab = "studentProfiles"; 

        const schemas = {
            studentProfiles: { title: "ข้อมูลนิสิต & รูปภาพ", sheet: "Student_Profile", fields: ["รหัสนิสิต", "ชื่อ-สกุล", "ลิงก์รูปภาพ"] },
            evaluationResults: { title: "ผลการประเมินทั้งหมด", sheet: "Evaluation_Results", fields: ["Timestamp", "ชื่อผู้ประเมิน", "รหัสนิสิต", "ชื่อนิสิต", "รหัสวิชา", "คะแนนรวม", "เกรด", "ความคิดเห็น"] },
            mainElectives: { title: "ตารางเรียนนิสิต (Elective)", sheet: "Main", fields: ["ลำดับ", "รหัสนิสิต", "ชื่อ-สกุล", "กลุ่ม", "เริ่มเรียน", "สิ้นสุด", "รหัสวิชา", "ภายใน/ภายนอก", "สถานที่", "จังหวัด"] },
            formCriteria: { title: "เกณฑ์การประเมิน (Rubrics)", sheet: "Form", fields: ["หัวข้อการประเมิน", "คำจำกัดความ", "คะแนน", "รายละเอียด"] },
            assessors: { title: "รายชื่ออาจารย์ผู้ประเมิน", sheet: "Assessor", fields: ["คำนำหน้า", "ชื่อ", "นามสกุล", "ตำแหน่ง", "email", "เบอร์โทร", "สถาบัน", "ภาควิชา"] },
            subjects: { title: "รายชื่อวิชาเรียน", sheet: "Subject", fields: ["รหัสวิชา", "ชื่อวิชา", "กลุ่มงาน", "สาขาวิชา"] },
            departments: { title: "ข้อมูลภาควิชา", sheet: "Department_Master", fields: ["ชื่อกลุ่ม_ภาควิชา"] },
            specialties: { title: "ข้อมูลสาขาวิชา", sheet: "Specialty_Master", fields: ["ชื่อสาขาวิชา"] },
            positions: { title: "ข้อมูลตำแหน่งอาจารย์", sheet: "Position_Master", fields: ["ชื่อตำแหน่ง"] },
            institutes: { title: "ข้อมูลสถาบัน / รพ.", sheet: "Institute_Master", fields: ["ชื่อสถาบัน"] },
            provinces: { title: "ข้อมูลจังหวัด", sheet: "Province_Master", fields: ["ชื่อจังหวัด"] }
        };

        window.addEventListener("DOMContentLoaded", loadAllDataFromServer);

        function toggleSidebar() {
            const sidebar = document.getElementById("sidebar");
            if (sidebar.classList.contains("w-80")) {
                sidebar.classList.remove("w-80");
                sidebar.classList.add("w-0");
            } else {
                sidebar.classList.remove("w-0");
                sidebar.classList.add("w-80");
            }
        }

        async function loadAllDataFromServer() {
            try {
                const response = await fetch(`${API_URL}?action=getAdminAllData`);
                const res = await response.json();
                if(res.result === "success") {
                    ALL_DATA = res;
                    switchTab(currentActiveTab);
                } else {
                    Swal.fire("ข้อผิดพลาด", "ไม่สามารถโหลดข้อมูลได้", "error");
                }
            } catch(e) {
                Swal.fire("เกิดข้อผิดพลาดในการเชื่อมต่อ", e.toString(), "error");
            }
        }

        function switchTab(tabKey) {
            currentActiveTab = tabKey;
            const schema = schemas[tabKey];
            
            document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("bg-blue-600", "text-white", "shadow-md"));
            const activeBtn = document.getElementById(`btn-${tabKey}`);
            if(activeBtn) activeBtn.classList.add("bg-blue-600", "text-white", "shadow-md");
            
            document.getElementById("current-title").innerText = schema.title;
            document.getElementById("searchBox").value = "";
            document.getElementById("addBtn").style.display = 'flex';

            const addBtnEl = document.getElementById("addBtn");
            if (tabKey === "studentProfiles") {
                addBtnEl.innerHTML = "➕ อัปโหลดรูปภาพใหม่";
            } else {
                addBtnEl.innerHTML = "➕ เพิ่มข้อมูลใหม่";
            }

            renderTable(ALL_DATA[tabKey] || [], schema.fields);
            
            if(window.innerWidth <= 768) {
                document.getElementById("sidebar").classList.replace("w-80", "w-0");
            }
        }

        function renderTable(dataRows, fields) {
            // 🌟 เพิ่มฟิลเตอร์จัดเรียงข้อมูลเฉพาะหน้าเกณฑ์การประเมิน 🌟
            if (currentActiveTab === "formCriteria") {
                dataRows.sort((a, b) => {
                    // เรียงตามหัวข้อ (ข้อ 1, 2, 3...)
                    let topicA = String(a["หัวข้อการประเมิน"] || "");
                    let topicB = String(b["หัวข้อการประเมิน"] || "");
                    
                    if (topicA !== topicB) {
                        return topicA.localeCompare(topicB, 'th', { numeric: true });
                    }
                    
                    // ถ้าหัวข้อเดียวกัน ให้เรียงตาม 'คะแนน' จากมากไปน้อย
                    let scoreA = parseFloat(a["คะแนน"]) || 0;
                    let scoreB = parseFloat(b["คะแนน"]) || 0;
                    return scoreB - scoreA; 
                });
            }
            // 🌟 สิ้นสุดการจัดเรียง 🌟

            const thead = document.getElementById("table-head");
            const tbody = document.getElementById("table-body");
            
            let headHTML = "<tr>";
            fields.forEach(f => {
                let displayField = f === "Timestamp" ? "วันที่ประเมิน" : f;
                headHTML += `<th class="px-6 py-4 whitespace-nowrap">${displayField}</th>`;
            });
            headHTML += `<th class="px-6 py-4 text-center sticky right-0 bg-slate-50 z-10">จัดการ</th></tr>`;
            thead.innerHTML = headHTML;

            if (dataRows.length === 0) {
                tbody.innerHTML = `<tr><td colspan="${fields.length + 1}" class="text-center py-12 text-slate-400">📭 ไม่พบรายการข้อมูลในหน้านี้</td></tr>`;
                return;
            }

            let bodyHTML = "";
            dataRows.forEach(row => {
                bodyHTML += `<tr class="hover:bg-slate-50 transition-colors">`;
                fields.forEach(f => {
                    let val = row[f] || "-";
                    if (f === "ลิงก์รูปภาพ" && val !== "-" && val !== "") {
                        bodyHTML += `<td class="px-6 py-4 whitespace-nowrap"><img src="${val}" class="h-10 w-10 object-cover rounded-md border shadow-sm bg-slate-100" onerror="this.src='https://placehold.co/100x100?text=No+Image'"></td>`;
                    } else {
                        // ดักจับและจัดการ Timestamp ไม่ให้ขึ้น Invalid Date (และตัดเวลาทิ้ง)
                        if(f.includes("Timestamp") && val !== "-" && val !== "") {
                            let checkDate = new Date(val);
                            if (!isNaN(checkDate.getTime())) {
                                val = checkDate.toLocaleDateString('th-TH');
                            } else {
                                // ถ้าแปลงไม่ได้ ให้ดึงข้อความดิบมา แล้วหั่นเอาเฉพาะข้อความส่วนแรกก่อนช่องว่าง (ทิ้งเวลา)
                                val = String(val).split(' ')[0]; 
                            }
                        }

                        bodyHTML += `<td class="px-6 py-4 whitespace-nowrap font-medium text-slate-700 max-w-xs truncate">${val}</td>`;
                    }
                });
                bodyHTML += `
                    <td class="px-6 py-4 text-center whitespace-nowrap sticky right-0 bg-white group-hover:bg-slate-50 shadow-[-4px_0_12px_rgba(0,0,0,0.05)] flex items-center justify-center gap-2">
                        <button onclick="openEditModal('${row._rowNum}')" class="text-xs font-bold text-amber-600 hover:bg-amber-50 px-3 py-1.5 rounded-lg border border-amber-100 transition-colors">✏️ แก้ไข</button>
                        <button onclick="deleteRecord('${row._rowNum}')" class="text-xs font-bold text-rose-600 hover:bg-rose-50 px-3 py-1.5 rounded-lg border border-rose-100 transition-colors">🗑️ ลบ</button>
                    </td>
                </tr>`;
            });
            tbody.innerHTML = bodyHTML;
        }

        function searchTable() {
            const query = document.getElementById("searchBox").value.toLowerCase();
            const schema = schemas[currentActiveTab];
            const filtered = ALL_DATA[currentActiveTab].filter(row => {
                return schema.fields.some(f => String(row[f] || "").toLowerCase().includes(query));
            });
            renderTable(filtered, schema.fields);
        }

        function deleteRecord(rowNum) {
            const schema = schemas[currentActiveTab];
            Swal.fire({
                title: 'ยืนยันการลบข้อมูล?',
                text: `คุณกำลังจะลบข้อมูลแถวที่ ${rowNum} ในชีต "${schema.sheet}" ซึ่งเมื่อลบแล้วจะไม่สามารถกู้คืนได้`,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#e11d48',
                confirmButtonText: 'ใช่, ฉันต้องการลบ',
                cancelButtonText: 'ยกเลิก'
            }).then(async (result) => {
                if (result.isConfirmed) {
                    Swal.fire({ title: 'กำลังลบแถวข้อมูลจาก Excel...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
                    try {
                        const res = await fetch(`${API_URL}?action=deleteAdminRecord&sheetName=${schema.sheet}&rowNum=${rowNum}`);
                        const data = await res.json();
                        if (data.result === "success") {
                            await Swal.fire("สำเร็จ!", "ลบข้อมูลออกจากระบบเรียบร้อยแล้ว", "success");
                            location.reload();
                        } else {
                            Swal.fire("ล้มเหลว", data.message, "error");
                        }
                    } catch(e) { Swal.fire("ผิดพลาด", e.toString(), "error"); }
                }
            });
        }

        function encodeImageFileAsURL(element) {
            let file = element.files[0];
            if(!file) return;
            document.getElementById("temp_fileName").value = file.name;
            document.getElementById("temp_fileMimeType").value = file.type;
            let reader = new FileReader();
            reader.onloadend = function() {
                document.getElementById("temp_base64Data").value = reader.result.split(',')[1];
            }
            reader.readAsDataURL(file);
        }

        function openAddModal() {
            const schema = schemas[currentActiveTab];
            
            if (currentActiveTab === "studentProfiles") {
                let uploadFormHTML = `
                <div class="text-left space-y-4">
                    <input type="hidden" id="temp_base64Data">
                    <input type="hidden" id="temp_fileName">
                    <input type="hidden" id="temp_fileMimeType">
                    
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-2">เลือกไฟล์รูปภาพนิสิต</label>
                        <input id="md_file_input" type="file" accept="image/*" class="w-full px-3 py-2.5 text-sm border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white" onchange="encodeImageFileAsURL(this)">
                    </div>

                    <div class="bg-amber-50 text-amber-800 border border-amber-200 rounded-2xl p-4 text-xs space-y-1.5 shadow-sm">
                        <strong class="text-sm flex items-center gap-1">⚠️ หมายเหตุสำคัญ:</strong>
                        <ul class="list-disc list-inside space-y-1 text-slate-600 pl-1">
                            <li>กรุณาตั้งชื่อไฟล์รูปด้วย <b class="text-amber-900">รหัสนิสิต 8 หลัก</b> (เช่น <code>64460091.jpg</code> หรือ <code>64460091_profile.png</code>)</li>
                            <li>เมื่อกดปุ่มบันทึก ระบบจะตรวจจับตัวเลขรหัสจากชื่อไฟล์ และนำรูปภาพไปผูกเชื่อมลิงก์ให้กับประวัตินิสิตที่มีอยู่ในฐานข้อมูลให้โดยอัตโนมัติทันทีครับ</li>
                        </ul>
                    </div>
                </div>`;

                Swal.fire({
                    title: `📸 อัปโหลดรูปภาพนิสิต`,
                    html: uploadFormHTML,
                    showCancelButton: true,
                    confirmButtonText: 'อัปโหลดเข้าคลังรูปภาพ',
                    cancelButtonText: 'ปิดหน้าต่าง',
                    focusConfirm: false,
                    preConfirm: () => {
                        const fileData = document.getElementById("temp_base64Data")?.value || "";
                        const fileName = document.getElementById("temp_fileName")?.value || "";
                        const fileMimeType = document.getElementById("temp_fileMimeType")?.value || "";

                        if (!fileData) {
                            Swal.showValidationMessage('❌ กรุณาเลือกไฟล์รูปภาพก่อนอัปโหลดครับ!');
                            return false;
                        }

                        const match = fileName.match(/\d{8}/);
                        if (!match) {
                            Swal.showValidationMessage('❌ ไม่พบรหัสนิสิต 8 หลักในชื่อไฟล์! กรุณาตั้งชื่อไฟล์ให้มีรหัสนิสิตด้วยครับ');
                            return false;
                        }

                        return {
                            sheetName: schema.sheet,
                            "รหัสนิสิต": match[0],
                            "ชื่อ-สกุล": "", 
                            fileData: fileData,
                            fileName: fileName,
                            fileMimeType: fileMimeType
                        };
                    }
                }).then(async (result) => {
                    if (result.isConfirmed && result.value) {
                        Swal.fire({ title: 'กำลังอัปโหลดรูปภาพและเชื่อมโยงข้อมูล...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
                        try {
                            let payloadObj = { action: "addAdminRecordWithImage", ...result.value };
                            let res = await fetch(API_URL, { 
                                method: "POST", 
                                headers: { "Content-Type": "text/plain;charset=utf-8" },
                                body: JSON.stringify(payloadObj) 
                            });

                            const data = await res.json();
                            if (data.result === "success") {
                                await Swal.fire("สำเร็จ!", "อัปโหลดและผูกรูปภาพเข้ากับฐานข้อมูลนิสิตเรียบร้อยแล้ว!", "success");
                                location.reload();
                            } else {
                                Swal.fire("ล้มเหลว", data.message, "error");
                            }
                        } catch (e) { Swal.fire("ผิดพลาด", e.toString(), "error"); }
                    }
                });
                return;
            }

            let inputFormHTML = `<div class="text-left space-y-4 max-h-[60vh] overflow-y-auto p-1">`;
            schema.fields.forEach(f => {
                if(f === "Timestamp" || f === "ลำดับ" || f === "คะแนนรวม" || f === "เกรด") return; 
                
                inputFormHTML += `<div><label class="block text-xs font-bold text-slate-500 uppercase mb-1">${f}</label>`;

                let dropdownOptions = [];
                if (f === "จังหวัด") {
                    dropdownOptions = ALL_DATA.provinces.map(item => item.ชื่อจังหวัด).filter(Boolean);
                } else if (f === "สถาบัน" || f === "สถานที่") {
                    dropdownOptions = ALL_DATA.institutes.map(item => item.ชื่อสถาบัน).filter(Boolean);
                } else if (f === "ตำแหน่ง") {
                    dropdownOptions = ALL_DATA.positions.map(item => item.ชื่อตำแหน่ง).filter(Boolean);
                } else if (f === "สาขาวิชา") {
                    dropdownOptions = ALL_DATA.specialties.map(item => item.ชื่อสาขาวิชา).filter(Boolean);
                } else if (f === "กลุ่มงาน" || f === "ภาควิชา") {
                    dropdownOptions = ALL_DATA.departments.map(item => item.ชื่อกลุ่ม_ภาควิชา).filter(Boolean);
                } else if (f === "ภายใน/ภายนอก") {
                    dropdownOptions = ["ภายใน", "ภายนอก"];
                }
                
                if (dropdownOptions.length > 0) {
                    inputFormHTML += `<select id="md_${f}" class="w-full px-3 py-2 text-sm border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white">`;
                    inputFormHTML += `<option value="">-- กรุณาเลือก --</option>`;
                    let uniqueOptions = [...new Set(dropdownOptions)].sort();
                    uniqueOptions.forEach(opt => {
                        inputFormHTML += `<option value="${opt}">${opt}</option>`;
                    });
                    inputFormHTML += `</select></div>`;
                } else {
                    inputFormHTML += `<input id="md_${f}" type="text" class="w-full px-3 py-2 text-sm border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500"></div>`;
                }
            });
            inputFormHTML += `</div>`;

            Swal.fire({
                title: `➕ เพิ่มข้อมูลใน ${schema.title}`,
                html: inputFormHTML,
                showCancelButton: true,
                confirmButtonText: 'บันทึกลงฐานข้อมูล',
                cancelButtonText: 'ปิดหน้าต่าง',
                focusConfirm: false,
                preConfirm: () => {
                    let payload = { sheetName: schema.sheet };
                    schema.fields.forEach(f => {
                        if(f === "Timestamp" || f === "ลำดับ" || f === "คะแนนรวม" || f === "เกรด" || f === "ลิงก์รูปภาพ") return;
                        payload[f] = document.getElementById(`md_${f}`).value;
                    });
                    return payload;
                }
            }).then(async (result) => {
                if (result.isConfirmed && result.value) {
                    Swal.fire({ title: 'กำลังบันทึกข้อมูลเข้า Excel...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
                    try {
                        const queryParams = new URLSearchParams({ action: "addAdminRecord", ...result.value });
                        let res = await fetch(`${API_URL}?${queryParams.toString()}`);
                        const data = await res.json();
                        if (data.result === "success") {
                            await Swal.fire("สำเร็จ!", "เพิ่มข้อมูลใหม่เข้าสู่ Excel เรียบร้อยแล้ว", "success");
                            location.reload();
                        } else {
                            Swal.fire("ล้มเหลว", data.message, "error");
                        }
                    } catch (e) { Swal.fire("ผิดพลาด", e.toString(), "error"); }
                }
            });
        }

        function openEditModal(rowNum) {
            const schema = schemas[currentActiveTab];
            const rowData = ALL_DATA[currentActiveTab].find(r => String(r._rowNum) === String(rowNum));
            if(!rowData) {
                Swal.fire("ผิดพลาด", "ไม่พบข้อมูลของแถวนี้ในระบบ", "error");
                return;
            }

            let inputFormHTML = `<div class="text-left space-y-4 max-h-[60vh] overflow-y-auto p-1">`;
            
            if (currentActiveTab === "studentProfiles") {
                inputFormHTML += `<input type="hidden" id="temp_base64Data"><input type="hidden" id="temp_fileName"><input type="hidden" id="temp_fileMimeType">`;
            }

            schema.fields.forEach(f => {
                if(f === "Timestamp" || f === "ลำดับ" || f === "คะแนนรวม" || f === "เกรด") return; 
                
                let currentVal = rowData[f] || "";
                inputFormHTML += `<div><label class="block text-xs font-bold text-slate-500 uppercase mb-1">${f}</label>`;

                if (f === "ลิงก์รูปภาพ" && currentActiveTab === "studentProfiles") {
                    inputFormHTML += `
                    <div class="mb-2">
                        ${currentVal !== "" && currentVal !== "-" ? `<img src="${currentVal}" class="h-16 w-16 object-cover rounded shadow">` : `<span class="text-xs text-slate-400">ยังไม่มีรูปภาพ</span>`}
                    </div>
                    <input id="edit_md_${f}" type="file" accept="image/*" class="w-full px-3 py-2 text-sm border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white" onchange="encodeImageFileAsURL(this)">
                    <p class="text-[10px] mt-1 text-slate-400">*หากไม่ต้องการเปลี่ยนรูปภาพ ให้ปล่อยช่องนี้ว่างไว้</p></div>`;
                    return;
                }

                let dropdownOptions = [];
                
                if (f === "จังหวัด") {
                    dropdownOptions = ALL_DATA.provinces.map(item => item.ชื่อจังหวัด).filter(Boolean);
                } else if (f === "สถาบัน" || f === "สถานที่") {
                    dropdownOptions = ALL_DATA.institutes.map(item => item.ชื่อสถาบัน).filter(Boolean);
                } else if (f === "ตำแหน่ง") {
                    dropdownOptions = ALL_DATA.positions.map(item => item.ชื่อตำแหน่ง).filter(Boolean);
                } else if (f === "สาขาวิชา") {
                    dropdownOptions = ALL_DATA.specialties.map(item => item.ชื่อสาขาวิชา).filter(Boolean);
                } else if (f === "กลุ่มงาน" || f === "ภาควิชา") {
                    dropdownOptions = ALL_DATA.departments.map(item => item.ชื่อกลุ่ม_ภาควิชา).filter(Boolean);
                } else if (f === "ภายใน/ภายนอก") {
                    dropdownOptions = ["ภายใน", "ภายนอก"];
                }
                
                if (dropdownOptions.length > 0) {
                    inputFormHTML += `<select id="edit_md_${f}" class="w-full px-3 py-2 text-sm border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white">`;
                    inputFormHTML += `<option value="">-- กรุณาเลือก --</option>`;
                    
                    let uniqueOptions = [...new Set(dropdownOptions)].sort();
                    uniqueOptions.forEach(opt => {
                        let selected = (String(opt).trim() === String(currentVal).trim()) ? "selected" : "";
                        inputFormHTML += `<option value="${opt}" ${selected}>${opt}</option>`;
                    });
                    
                    inputFormHTML += `</select></div>`;
                } else {
                    let escapedVal = String(currentVal).replace(/"/g, '&quot;');
                    inputFormHTML += `<input id="edit_md_${f}" type="text" value="${escapedVal}" class="w-full px-3 py-2 text-sm border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500"></div>`;
                }
            });
            inputFormHTML += `</div>`;

            Swal.fire({
                title: `✏️ แก้ไขข้อมูลแถวที่ ${rowNum} (${schema.title})`,
                html: inputFormHTML,
                showCancelButton: true,
                confirmButtonText: 'บันทึกการแก้ไข',
                cancelButtonText: 'ยกเลิก',
                focusConfirm: false,
                preConfirm: () => {
                    let payload = { sheetName: schema.sheet, rowNum: rowNum };
                    schema.fields.forEach(f => {
                        if(f === "Timestamp" || f === "ลำดับ" || f === "คะแนนรวม" || f === "เกรด" || f === "ลิงก์รูปภาพ") return;
                        payload[f] = document.getElementById(`edit_md_${f}`).value;
                    });

                    if (currentActiveTab === "studentProfiles") {
                        payload.fileData = document.getElementById("temp_base64Data")?.value || "";
                        payload.fileName = document.getElementById("temp_fileName")?.value || "";
                        payload.fileMimeType = document.getElementById("temp_fileMimeType")?.value || "";
                    }

                    return payload;
                }
            }).then(async (result) => {
                if (result.isConfirmed && result.value) {
                    Swal.fire({ title: 'กำลังบันทึกการแก้ไขข้อมูลลง Excel...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
                    try {
                        let res;
                        if (currentActiveTab === "studentProfiles") {
                            let payloadObj = { action: "updateAdminRecordWithImage", ...result.value };
                            
                            res = await fetch(API_URL, { 
                                method: "POST", 
                                headers: { "Content-Type": "text/plain;charset=utf-8" },
                                body: JSON.stringify(payloadObj) 
                            });
                        } else {
                            const queryParams = new URLSearchParams({ action: "updateAdminRecord", ...result.value });
                            res = await fetch(`${API_URL}?${queryParams.toString()}`);
                        }

                        const data = await res.json();
                        if (data.result === "success") {
                            await Swal.fire("สำเร็จ!", "แก้ไขข้อมูลเรียบร้อยแล้วครับ", "success");
                            location.reload();
                        } else {
                            Swal.fire("ล้มเหลว", data.message, "error");
                        }
                    } catch (e) { Swal.fire("ผิดพลาด", e.toString(), "error"); }
                }
            });
        }
    </script>
