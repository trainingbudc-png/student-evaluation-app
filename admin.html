<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบแอดมิน - จัดการข้อมูลฐานข้อมูลนิสิตแพทย์</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Prompt', sans-serif; }
        .tab-btn.active {
            background-color: #059669;
            color: white;
            font-weight: 600;
        }
    </style>
</head>
<body class="bg-slate-100 min-h-screen">

    <div class="flex flex-col lg:flex-row min-h-screen">

        <!-- Sidebar Navigation -->
        <aside class="w-full lg:w-64 bg-white border-r border-slate-200 p-5 flex flex-col justify-between shrink-0">
            <div>
                <div class="flex items-center gap-3 mb-8 px-2">
                    <div class="bg-emerald-100 text-emerald-700 p-2.5 rounded-2xl text-2xl">⚙️</div>
                    <div>
                        <h1 class="font-bold text-slate-800 text-lg leading-tight">Admin Portal</h1>
                        <p class="text-xs text-slate-400">ระบบจัดการข้อมูลนิสิตแพทย์</p>
                    </div>
                </div>

                <nav class="space-y-1.5" id="tabContainer">
                    <button onclick="switchTab('pending')" id="tab-pending" class="tab-btn active w-full flex items-center justify-between px-4 py-3 rounded-xl text-sm text-slate-600 hover:bg-slate-50 transition-all text-left">
                        <span class="flex items-center gap-2.5">📋 รออนุมัติลงทะเบียน</span>
                        <span id="pendingBadge" class="bg-rose-500 text-white text-xs font-bold px-2 py-0.5 rounded-full hidden">0</span>
                    </button>
                    <button onclick="switchTab('studentProfiles')" id="tab-studentProfiles" class="tab-btn w-full flex items-center gap-2.5 px-4 py-3 rounded-xl text-sm text-slate-600 hover:bg-slate-50 transition-all text-left">
                        👨‍⚕️ โปรไฟล์นิสิต (Student_Profile)
                    </button>
                    <button onclick="switchTab('mainElectives')" id="tab-mainElectives" class="tab-btn w-full flex items-center gap-2.5 px-4 py-3 rounded-xl text-sm text-slate-600 hover:bg-slate-50 transition-all text-left">
                        📑 ข้อมูลลงทะเบียน (Main)
                    </button>
                    <button onclick="switchTab('assessors')" id="tab-assessors" class="tab-btn w-full flex items-center gap-2.5 px-4 py-3 rounded-xl text-sm text-slate-600 hover:bg-slate-50 transition-all text-left">
                        👨‍🏫 ข้อมูลอาจารย์ (Assessor)
                    </button>
                    <button onclick="switchTab('subjects')" id="tab-subjects" class="tab-btn w-full flex items-center gap-2.5 px-4 py-3 rounded-xl text-sm text-slate-600 hover:bg-slate-50 transition-all text-left">
                        📚 รายวิชา (Subject)
                    </button>
                    <button onclick="switchTab('institutes')" id="tab-institutes" class="tab-btn w-full flex items-center gap-2.5 px-4 py-3 rounded-xl text-sm text-slate-600 hover:bg-slate-50 transition-all text-left">
                        🏥 สถาบัน / รพ. (Institute_Master)
                    </button>
                    <button onclick="switchTab('evaluationResults')" id="tab-evaluationResults" class="tab-btn w-full flex items-center gap-2.5 px-4 py-3 rounded-xl text-sm text-slate-600 hover:bg-slate-50 transition-all text-left">
                        📊 ผลการประเมิน (Evaluation)
                    </button>
                    <button onclick="switchTab('formCriteria')" id="tab-formCriteria" class="tab-btn w-full flex items-center gap-2.5 px-4 py-3 rounded-xl text-sm text-slate-600 hover:bg-slate-50 transition-all text-left">
                        📝 เกณฑ์ประเมิน (Form)
                    </button>
                    <button onclick="switchTab('departments')" id="tab-departments" class="tab-btn w-full flex items-center gap-2.5 px-4 py-3 rounded-xl text-sm text-slate-600 hover:bg-slate-50 transition-all text-left">
                        🏢 ภาควิชา (Department)
                    </button>
                </nav>
            </div>

            <div class="pt-6 border-t border-slate-100 mt-6">
                <button onclick="loadAllData()" class="w-full bg-slate-100 hover:bg-slate-200 text-slate-700 font-semibold py-2.5 px-4 rounded-xl text-sm transition-colors flex items-center justify-center gap-2">
                    🔄 รีเฟรชข้อมูลทั้งหมด
                </button>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="flex-1 p-4 md:p-8 overflow-y-auto">

            <!-- Top Header & Search Bar -->
            <div class="bg-white rounded-3xl p-6 shadow-sm border border-slate-200 mb-6 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                <div>
                    <h2 id="currentTabTitle" class="text-xl font-bold text-slate-800">📋 รายชื่อนิสิตรออนุมัติ</h2>
                    <p id="currentTabDesc" class="text-xs text-slate-400 mt-1">อนุมัติหรือปฏิเสธคำขอลงทะเบียนของนิสิตใหม่</p>
                </div>

                <div class="flex items-center gap-3 w-full md:w-auto">
                    <input type="text" id="searchInput" onkeyup="filterTable()" placeholder="🔍 ค้นหาข้อมูล..." class="w-full md:w-64 px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm outline-none focus:bg-white focus:ring-2 focus:ring-emerald-500/20 focus:border-emerald-500 transition-all">
                    <button id="addBtn" onclick="openAddModal()" class="hidden bg-emerald-600 hover:bg-emerald-700 text-white font-medium px-4 py-2.5 rounded-xl text-sm transition-colors shrink-0 flex items-center gap-1.5 shadow-md shadow-emerald-600/20">
                        ➕ เพิ่มข้อมูล
                    </button>
                </div>
            </div>

            <!-- Table Container -->
            <div class="bg-white rounded-3xl p-6 shadow-sm border border-slate-200 overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-sm text-slate-600" id="dataTable">
                        <thead class="bg-slate-50 text-slate-700 font-semibold uppercase text-xs border-b border-slate-100" id="tableHeader">
                            <!-- JS จะเรนเดอร์ส่วนนี้ -->
                        </thead>
                        <tbody id="tableBody" class="divide-y divide-slate-100">
                            <tr>
                                <td colspan="10" class="text-center py-12 text-slate-400 font-light">กำลังโหลดข้อมูล...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </main>
    </div>

    <!-- Modal Form สำหรับเพิ่ม/แก้ไขข้อมูล -->
    <div id="crudModal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 flex items-center justify-center hidden p-4">
        <div class="bg-white rounded-3xl max-w-lg w-full p-6 shadow-2xl border border-slate-100 max-h-[90vh] flex flex-col">
            <div class="flex justify-between items-center pb-4 border-b border-slate-100">
                <h3 id="modalTitle" class="text-lg font-bold text-slate-800">เพิ่มข้อมูล</h3>
                <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600 text-xl font-bold">✕</button>
            </div>

            <form id="modalForm" onsubmit="handleFormSubmit(event)" class="space-y-4 py-4 overflow-y-auto flex-1">
                <div id="dynamicInputs" class="space-y-3">
                    <!-- JS จะเรนเดอร์ Form Inputs ตามตารางที่เลือก -->
                </div>
            </form>

            <div class="pt-4 border-t border-slate-100 flex justify-end gap-3">
                <button type="button" onclick="closeModal()" class="px-5 py-2.5 rounded-xl text-sm font-medium text-slate-600 hover:bg-slate-100 transition-colors">ยกเลิก</button>
                <button type="submit" form="modalForm" class="px-5 py-2.5 rounded-xl text-sm font-semibold bg-emerald-600 text-white hover:bg-emerald-700 transition-colors shadow-md">บันทึกข้อมูล</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzztzVKjo66T95WJHOIir1QRR5JmPgnJv83ZLNM3dWtqZNnT_pDx4Ktu6O1-6-hm9Cy1w/exec";

        let allData = {};
        let pendingStudentsList = [];
        let activeTab = "pending";
        let editRowNumber = null;

        // การตั้งค่าแต่ละ Tab
        const TAB_CONFIG = {
            pending: { title: "📋 รายชื่อนิสิตรออนุมัติ", desc: "อนุมัติหรือปฏิเสธคำขอลงทะเบียนของนิสิตใหม่", sheetName: "รออนุมัติ", canAdd: false },
            studentProfiles: { title: "👨‍⚕️ โปรไฟล์นิสิต", desc: "จัดการรหัสนิสิต ชื่อ-สกุล และลิงก์รูปภาพ", sheetName: "Student_Profile", canAdd: true },
            mainElectives: { title: "📑 ข้อมูลการลงทะเบียนเรียน", desc: "จัดการการจับคู่นิสิต รายวิชา และสถานะการประเมิน", sheetName: "Main", canAdd: true },
            assessors: { title: "👨‍🏫 รายชื่ออาจารย์ผู้ประเมิน", desc: "จัดการบัญชีผู้ประเมิน อีเมล เบอร์โทร และ LINE UID", sheetName: "Assessor", canAdd: true },
            subjects: { title: "📚 รหัสวิชาและรายวิชา", desc: "จัดการรหัสวิชา ชื่อวิชา และภาควิชาที่สังกัด", sheetName: "Subject", canAdd: true },
            institutes: { title: "🏥 รายชื่อสถาบัน / โรงพยาบาล", desc: "จัดการสถาบันที่เปิดรับนิสิตแพทย์", sheetName: "Institute_Master", canAdd: true },
            evaluationResults: { title: "📊 ผลการประเมินย้อนหลัง", desc: "ดูและจัดการประวัติการประเมินจากอาจารย์", sheetName: "Evaluation_Results", canAdd: false },
            formCriteria: { title: "📝 เกณฑ์และหัวข้อการประเมิน", desc: "จัดการข้อสอบและสเกลคะแนนการประเมิน", sheetName: "Form", canAdd: true },
            departments: { title: "🏢 รายชื่อภาควิชา", desc: "จัดการข้อมูลภาควิชาหลัก", sheetName: "Department_Master", canAdd: true }
        };

        window.addEventListener("DOMContentLoaded", loadAllData);

        // 🚀 ดึงข้อมูลทั้งหมดจาก Google Sheet
        async function loadAllData() {
            showTableLoading();
            try {
                // ดึงข้อมูลหลัก + ดึงนิสิตรออนุมัติ
                const [adminRes, pendingRes] = await Promise.all([
                    fetch(`${API_URL}?action=getAdminAllData`).then(r => r.json()),
                    fetch(`${API_URL}?action=getPendingStudents`).then(r => r.json())
                ]);

                if (adminRes.result === "success") {
                    allData = adminRes;
                }
                if (Array.isArray(pendingRes)) {
                    pendingStudentsList = pendingRes;
                    const badge = document.getElementById("pendingBadge");
                    badge.textContent = pendingRes.length;
                    badge.classList.toggle("hidden", pendingRes.length === 0);
                }

                renderCurrentTab();
            } catch (err) {
                Swal.fire("ข้อผิดพลาด", "ไม่สามารถดึงข้อมูลจากเซิร์ฟเวอร์ได้", "error");
            }
        }

        // 🔄 เปลี่ยน Tab
        function switchTab(tabKey) {
            activeTab = tabKey;
            document.querySelectorAll(".tab-btn").forEach(btn => btn.classList.remove("active"));
            document.getElementById(`tab-${tabKey}`)?.classList.add("active");
            
            document.getElementById("currentTabTitle").textContent = TAB_CONFIG[tabKey].title;
            document.getElementById("currentTabDesc").textContent = TAB_CONFIG[tabKey].desc;
            document.getElementById("addBtn").classList.toggle("hidden", !TAB_CONFIG[tabKey].canAdd);
            document.getElementById("searchInput").value = "";

            renderCurrentTab();
        }

        // 🎨 เรนเดอร์ ตารางตาม Tab ที่เลือก
        function renderCurrentTab() {
            if (activeTab === "pending") {
                renderPendingTable();
            } else {
                renderGenericTable(TAB_CONFIG[activeTab].sheetName, allData[activeTab] || []);
            }
        }

        // 1️⃣ เรนเดอร์ตารางรออนุมัติ
        function renderPendingTable() {
            const header = document.getElementById("tableHeader");
            const body = document.getElementById("tableBody");

            header.innerHTML = `
                <tr>
                    <th class="p-3.5 rounded-l-xl">วันที่ลงทะเบียน</th>
                    <th class="p-3.5">รหัสนิสิต</th>
                    <th class="p-3.5">ชื่อ - นามสกุล</th>
                    <th class="p-3.5">สถาบัน / รพ.</th>
                    <th class="p-3.5 text-center rounded-r-xl">จัดการ</th>
                </tr>
            `;

            if (pendingStudentsList.length === 0) {
                body.innerHTML = `<tr><td colspan="5" class="text-center py-12 text-slate-400 font-light">🎉 ไม่มีรายการที่รออนุมัติในขณะนี้</td></tr>`;
                return;
            }

            body.innerHTML = pendingStudentsList.map(st => `
                <tr class="hover:bg-slate-50 transition-colors">
                    <td class="p-3.5 text-slate-500">${formatDate(st.date)}</td>
                    <td class="p-3.5 font-bold text-slate-800">${st.studentId}</td>
                    <td class="p-3.5 font-medium text-slate-700">${st.fullName}</td>
                    <td class="p-3.5 text-slate-600">${st.hospital || '-'}</td>
                    <td class="p-3.5 text-center">
                        <div class="flex items-center justify-center gap-2">
                            <button onclick="approveStudent('${st.studentId}', '${st.fullName}')" class="bg-emerald-600 hover:bg-emerald-700 text-white text-xs font-semibold px-3 py-1.5 rounded-lg transition-colors">✅ อนุมัติ</button>
                            <button onclick="rejectStudent('${st.studentId}', '${st.fullName}')" class="bg-rose-50 hover:bg-rose-100 text-rose-600 text-xs font-semibold px-3 py-1.5 rounded-lg transition-colors">❌ ปฏิเสธ</button>
                        </div>
                    </td>
                </tr>
            `).join("");
        }

        // 2️⃣ เรนเดอร์ตาราง Master Data ทั่วไป
        function renderGenericTable(sheetName, rows) {
            const header = document.getElementById("tableHeader");
            const body = document.getElementById("tableBody");

            if (!rows || rows.length === 0) {
                header.innerHTML = `<tr><th class="p-3.5">ไม่มีข้อมูล</th></tr>`;
                body.innerHTML = `<tr><td class="text-center py-12 text-slate-400 font-light">ไม่พบข้อมูลในตารางนี้</td></tr>`;
                return;
            }

            // ดึงชื่อ Column ยกเว้น _rowNum
            const keys = Object.keys(rows[0]).filter(k => k !== "_rowNum");

            header.innerHTML = `
                <tr>
                    ${keys.map(k => `<th class="p-3.5">${k}</th>`).join("")}
                    <th class="p-3.5 text-center">จัดการ</th>
                </tr>
            `;

            body.innerHTML = rows.map(row => `
                <tr class="hover:bg-slate-50 transition-colors">
                    ${keys.map(k => {
                        let val = row[k] || "-";
                        if (typeof val === 'string' && val.startsWith('http')) {
                            val = `<a href="${val}" target="_blank" class="text-emerald-600 hover:underline flex items-center gap-1">🖼️ เปิดลิงก์</a>`;
                        }
                        return `<td class="p-3.5 max-w-xs truncate">${val}</td>`;
                    }).join("")}
                    <td class="p-3.5 text-center">
                        <div class="flex items-center justify-center gap-1.5">
                            <button onclick='openEditModal(${JSON.stringify(row)})' class="text-xs bg-slate-100 hover:bg-slate-200 text-slate-700 font-medium px-2.5 py-1.5 rounded-lg">✏️ แก้ไข</button>
                            <button onclick="deleteRecord('${sheetName}', '${row._rowNum}')" class="text-xs bg-rose-50 hover:bg-rose-100 text-rose-600 font-medium px-2.5 py-1.5 rounded-lg">🗑️ ลบ</button>
                        </div>
                    </td>
                </tr>
            `).join("");
        }

        // ➕ เปิด Modal เพิ่มข้อมูล
        function openAddModal() {
            editRowNumber = null;
            document.getElementById("modalTitle").textContent = `เพิ่มข้อมูล (${TAB_CONFIG[activeTab].sheetName})`;
            buildFormInputs({});
            document.getElementById("crudModal").classList.remove("hidden");
        }

        // ✏️ เปิด Modal แก้ไขข้อมูล
        function openEditModal(rowData) {
            editRowNumber = rowData._rowNum;
            document.getElementById("modalTitle").textContent = `แก้ไขข้อมูล (${TAB_CONFIG[activeTab].sheetName})`;
            buildFormInputs(rowData);
            document.getElementById("crudModal").classList.remove("hidden");
        }

        function closeModal() {
            document.getElementById("crudModal").classList.add("hidden");
        }

        // 🛠️ สร้าง Form Dynamic ตาม คอลัมน์ของชีตนั้นๆ
        function buildFormInputs(data) {
            const container = document.getElementById("dynamicInputs");
            const rows = allData[activeTab] || [];
            if (rows.length === 0) return;

            const keys = Object.keys(rows[0]).filter(k => k !== "_rowNum" && k !== "Timestamp");

            container.innerHTML = keys.map(key => `
                <div>
                    <label class="block text-xs font-semibold text-slate-700 mb-1">${key}</label>
                    <input type="text" name="${key}" value="${data[key] || ''}" class="w-full px-3.5 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:bg-white outline-none">
                </div>
            `).join("");
        }

        // 💾 ส่งฟอร์ม บันทึก/แก้ไข
        async function handleFormSubmit(e) {
            e.preventDefault();
            const formData = new FormData(e.target);
            const sheetName = TAB_CONFIG[activeTab].sheetName;
            
            let payload = { sheetName: sheetName };
            formData.forEach((val, key) => payload[key] = val);

            const action = editRowNumber ? "updateAdminRecord" : "addAdminRecord";
            if (editRowNumber) payload.rowNum = editRowNumber;

            Swal.fire({ title: 'กำลังบันทึก...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

            try {
                const queryStr = new URLSearchParams(payload).toString();
                const res = await fetch(`${API_URL}?action=${action}&${queryStr}`).then(r => r.json());

                if (res.result === "success") {
                    Swal.fire("สำเร็จ!", res.message, "success");
                    closeModal();
                    loadAllData();
                } else {
                    Swal.fire("แจ้งเตือน", res.message, "warning");
                }
            } catch (err) {
                Swal.fire("ผิดพลาด", "การเชื่อมต่อล้มเหลว", "error");
            }
        }

        // 🗑️ ลบข้อมูล
        async function deleteRecord(sheetName, rowNum) {
            const confirm = await Swal.fire({
                title: 'ยืนยันการลบ?',
                text: "ข้อมูลนี้จะถูกลบออกจากฐานข้อมูลอย่างถาวร!",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#e11d48',
                confirmButtonText: 'ลบข้อมูล',
                cancelButtonText: 'ยกเลิก'
            });

            if (!confirm.isConfirmed) return;

            Swal.fire({ title: 'กำลังลบ...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

            try {
                const res = await fetch(`${API_URL}?action=deleteAdminRecord&sheetName=${sheetName}&rowNum=${rowNum}`).then(r => r.json());

                if (res.result === "success") {
                    Swal.fire("เรียบร้อย!", "ลบข้อมูลสำเร็จแล้ว", "success");
                    loadAllData();
                } else {
                    Swal.fire("แจ้งเตือน", res.message, "warning");
                }
            } catch (err) {
                Swal.fire("ผิดพลาด", "การเชื่อมต่อล้มเหลว", "error");
            }
        }

        // ✅ อนุมัตินิสิต
        async function approveStudent(studentId, fullName) {
            const confirm = await Swal.fire({
                title: 'ยืนยันอนุมัติ?',
                text: `อนุมัติ ${fullName} (${studentId}) เข้าสู่ระบบ`,
                icon: 'question',
                showCancelButton: true,
                confirmButtonColor: '#059669',
                confirmButtonText: 'อนุมัติ'
            });

            if (!confirm.isConfirmed) return;

            Swal.fire({ title: 'กำลังบันทึก...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

            try {
                const res = await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "text/plain;charset=utf-8" },
                    body: JSON.stringify({ action: "approveStudent", studentId: studentId })
                }).then(r => r.json());

                if (res.result === "success") {
                    Swal.fire("สำเร็จ!", `อนุมัติเรียบร้อยแล้ว`, "success");
                    loadAllData();
                } else {
                    Swal.fire("แจ้งเตือน", res.message, "warning");
                }
            } catch (err) { Swal.fire("ผิดพลาด", "เชื่อมต่อไม่ได้", "error"); }
        }

        // ❌ ปฏิเสธนิสิต
        async function rejectStudent(studentId, fullName) {
            const confirm = await Swal.fire({
                title: 'ปฏิเสธคำขอ?',
                text: `ลบคำขอของ ${fullName} (${studentId})`,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#e11d48',
                confirmButtonText: 'ปฏิเสธ'
            });

            if (!confirm.isConfirmed) return;

            Swal.fire({ title: 'กำลังดำเนินการ...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

            try {
                const res = await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "text/plain;charset=utf-8" },
                    body: JSON.stringify({ action: "rejectStudent", studentId: studentId })
                }).then(r => r.json());

                if (res.result === "success") {
                    Swal.fire("เรียบร้อย", `ลบรายการแล้ว`, "success");
                    loadAllData();
                } else {
                    Swal.fire("แจ้งเตือน", res.message, "warning");
                }
            } catch (err) { Swal.fire("ผิดพลาด", "เชื่อมต่อไม่ได้", "error"); }
        }

        // 🔍 ช่องค้นหาในตาราง
        function filterTable() {
            const query = document.getElementById("searchInput").value.toLowerCase();
            const rows = document.querySelectorAll("#tableBody tr");

            rows.forEach(row => {
                const text = row.textContent.toLowerCase();
                row.style.display = text.includes(query) ? "" : "none";
            });
        }

        function showTableLoading() {
            document.getElementById("tableBody").innerHTML = `<tr><td colspan="10" class="text-center py-12 text-slate-400 font-light">กำลังโหลดข้อมูล...</td></tr>`;
        }

        function formatDate(dateStr) {
            if (!dateStr) return '-';
            try {
                const d = new Date(dateStr);
                if (isNaN(d.getTime())) return dateStr;
                return d.toLocaleDateString('th-TH', { day: '2-digit', month: '2-digit', year: 'numeric' });
            } catch (e) { return dateStr; }
        }
    </script>
</body>
</html>
