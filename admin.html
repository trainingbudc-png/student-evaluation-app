<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจัดการ Admin - Evaluation App</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h2 { color: #1a73e8; border-bottom: 2px solid #1a73e8; padding-bottom: 10px; }
        .nav-tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid #ddd; }
        .tab { padding: 10px 20px; cursor: pointer; border-radius: 8px 8px 0 0; background: #eee; }
        .tab.active { background: #1a73e8; color: white; font-weight: bold; }
        .section { display: none; }
        .section.active { display: block; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #f8f9fa; }
        .question-item { background: #f9f9f9; padding: 15px; border-radius: 8px; margin-bottom: 10px; border-left: 5px solid #1a73e8; }
        input[type="text"] { width: 100%; padding: 8px; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 20px; background: #1a73e8; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button.refresh { background: #34a853; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h2>⚙️ แผงควบคุมสำหรับผู้ดูแลระบบ (Admin)</h2>

    <div class="nav-tabs">
        <div class="tab active" onclick="switchTab('audit')">ตรวจสอบการประเมิน</div>
        <div class="tab" onclick="switchTab('settings')">ตั้งค่าหัวข้อประเมิน</div>
    </div>

    <div id="audit" class="section active">
        <button class="refresh" onclick="fetchLogs()">🔄 ดึงข้อมูลประวัติล่าสุด</button>
        <div id="logTableContainer">
            <p style="text-align:center;">กดปุ่มเพื่อดึงข้อมูลจากระบบ...</p>
        </div>
    </div>

    <div id="settings" class="section">
        <p>คุณสามารถแก้ไขหัวข้อที่ใช้ประเมินได้ที่นี่ (ข้อมูลจะถูกดึงไปแสดงในหน้าอาจารย์)</p>
        <div id="questionsList">
            <div class="question-item">
                <label>ข้อที่ 1:</label>
                <input type="text" id="q1_text" value="ความตั้งใจและการมีส่วนร่วมในชั้นเรียน">
            </div>
            <div class="question-item">
                <label>ข้อที่ 2:</label>
                <input type="text" id="q2_text" value="การส่งงานตรงเวลาและความถูกต้องของเนื้อหา">
            </div>
            <div class="question-item">
                <label>ข้อที่ 3:</label>
                <input type="text" id="q3_text" value="ทักษะการคิดวิเคราะห์และการแก้ปัญหา">
            </div>
        </div>
        <button onclick="saveQuestions()">💾 บันทึกการเปลี่ยนแปลง</button>
        <p id="saveStatus"></p>
    </div>
</div>

<script>
    const API_URL = "URL_WEB_APP_ของ_GAS_ของคุณ"; // ใส่ลิงก์จาก Apps Script

    function switchTab(tabId) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        event.target.classList.add('active');
        document.getElementById(tabId).classList.add('active');
    }

    async function fetchLogs() {
        const container = document.getElementById('logTableContainer');
        container.innerHTML = "<p style='text-align:center;'>กำลังดึงข้อมูล...</p>";
        
        try {
            // เรียก action "getAdminLogs" จาก GAS
            const response = await fetch(`${API_URL}?action=getAdminLogs`);
            const data = await response.json();
            
            let html = "<table><thead><tr><th>วัน-เวลา</th><th>อาจารย์</th><th>วิชา</th><th>นิสิต</th><th>ผลประเมิน</th></tr></thead><tbody>";
            data.forEach(log => {
                html += `<tr>
                    <td>${new Date(log.date).toLocaleString()}</td>
                    <td>${log.teacher}</td>
                    <td>${log.subject}</td>
                    <td>${log.studentId}</td>
                    <td>${log.scores.join(', ')}</td>
                </tr>`;
            });
            html += "</tbody></table>";
            container.innerHTML = html;
        } catch (error) {
            container.innerHTML = "<p style='color:red;'>ไม่สามารถดึงข้อมูลได้ กรุณาตรวจสอบ API</p>";
        }
    }

    async function saveQuestions() {
        const q1 = document.getElementById('q1_text').value;
        const q2 = document.getElementById('q2_text').value;
        const q3 = document.getElementById('q3_text').value;
        const status = document.getElementById('saveStatus');

        status.innerText = "กำลังบันทึก...";
        
        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify({
                    action: "updateQuestions",
                    questions: [q1, q2, q3]
                })
            });
            const res = await response.json();
            if(res.result === "success") {
                status.style.color = "green";
                status.innerText = "✅ บันทึกหัวข้อใหม่สำเร็จ!";
            }
        } catch (e) {
            status.style.color = "red";
            status.innerText = "❌ บันทึกไม่สำเร็จ";
        }
    }
</script>
</body>
</html>
