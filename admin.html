<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบควบคุมแอดมินหลัก - 10 เมนูจัดการฐานข้อมูล</title>

    <link rel="icon" type="image/png" href="logo.png">

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: { extend: { fontFamily: { sans: ['Prompt', 'sans-serif'] } } }
        }
    </script>
</head>
<body class="bg-slate-100 text-slate-800 font-sans min-h-screen flex">

    <!-- Sidebar ธีมเดิม (Dark Sidebar) ครบทุกหมวดหมู่ -->
    <aside id="sidebar" class="w-80 bg-slate-900 text-slate-300 flex flex-col min-h-screen shadow-xl border-r border-slate-800 shrink-0 transition-all duration-300 overflow-hidden">
        <div class="p-6 border-b border-slate-800 bg-slate-950 flex items-center gap-3 w-80">
            <span class="text-3xl">⚙️</span>
            <div>
                <h1 class="text-lg font-bold text-white leading-none mb-1">Admin Panel</h1>
                <p class="text-xs text-slate-500 font-light">ระบบจัดการข้อมูลแพทย์ศาสตรศึกษา</p>
            </div>
        </div>
        
        <nav class="flex-grow p-4 space-y-6 overflow-y-auto w-80" style="max-height: calc(100vh - 90px);">
            <div>
                <p class="px-3 text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">🧑‍🎓 ข้อมูลนิสิต</p>
                <div class="space-y-1">
                    <button onclick="switchTab('pendingStudents')" id="btn-pendingStudents" class="tab-btn w-full text-left px-4 py-2.5 rounded-xl font-medium text-sm flex items-center gap-3 hover:bg-slate-800 transition-all text-amber-400">⏳ จัดการนิสิตรออนุมัติ</button>
                    <button onclick="switchTab('studentProfiles')" id="btn-studentProfiles" class="tab-btn w-full text-left px-4 py-2.5 rounded-xl font-medium text-sm flex items-center gap-3 hover:bg-slate-800 transition-all">📸 ข้อมูลนิสิต & รูปภาพ</button>
                </div>
            </div>

            <div>
                <p class="px-3 text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">📊 ผลการประเมิน & ตารางงาน</p>
                <div class="space-y-1">
                    <button onclick="switchTab('evaluationResults')" id="btn-evaluationResults" class="tab-btn w-full text-left px-4 py-2.5 rounded-xl font-medium text-sm flex items-center gap-3 hover:bg-slate-800 transition-all">📝 ผลการประเมินทั้งหมด</button>
                    <button onclick="switchTab('mainElectives')" id="btn-mainElectives" class="tab-btn w-full text-left px-4 py-2.5 rounded-xl font-medium text-sm flex items-center gap-3 hover:bg-slate-800 transition-all">📅 ตารางเรียนนิสิต (Elective)</button>
                </div>
            </div>

            <div>
                <p class="px-3 text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">🎓 เกณฑ์ & รายชื่อวิชา</p>
                <div class="space-y-1">
                    <button onclick="switchTab('formCriteria')" id="btn-formCriteria" class="tab-btn w-full text-left px-4 py-2.5 rounded-xl font-medium text-sm flex items-center gap-3 hover:bg-slate-800 transition-all">📋 เกณฑ์การประเมิน (Rubrics)</button>
                    <button onclick="switchTab('assessors')" id="btn-assessors" class="tab-btn w-full text-left px-4 py-2.5 rounded-xl font-medium text-sm flex items-center gap-3 hover:bg-slate-800 transition-all">👨‍🏫 รายชื่ออาจารย์ผู้ประเมิน</button>
                    <button onclick="switchTab('subjects')" id="btn-subjects" class="tab-btn w-full text-left px-4 py-2.5 rounded-xl font-medium text-sm flex items-center gap-3 hover:bg-slate-800 transition-all">📚 รายชื่อวิชาเรียน</button>
                </div>
            </div>

            <div>
                <p class="px-3 text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">🗂️ ข้อมูลระบบ (Master Data)</p>
                <div class="space-y-1">
                    <button onclick="switchTab('departments')" id="btn-departments" class="tab-btn w-full text-left px-4 py-2.5 rounded-xl font-medium text-sm flex items-center gap-3 hover:bg-slate-800 transition-all">🏢 ข้อมูลภาควิชา</button>
                    <button onclick="switchTab('specialties')" id="btn-specialties" class="tab-btn w-full text-left px-4 py-2.5 rounded-xl font-medium text-sm flex items-center gap-3 hover:bg-slate-800 transition-all">🧬 ข้อมูลสาขาวิชา</button>
                    <button onclick="switchTab('positions')" id="btn-positions" class="tab-btn w-full text-left px-4 py-2.5 rounded-xl font-medium text-sm flex items-center gap-3 hover:bg-slate-800 transition-all">🎖️ ข้อมูลตำแหน่งอาจารย์</button>
                    <button onclick="switchTab('institutes')" id="btn-institutes" class="tab-btn w-full text-left px-4 py-2.5 rounded-xl font-medium text-sm flex items-center gap-3 hover:bg-slate-800 transition-all">🏥 ข้อมูลสถาบัน / รพ.</button>
                    <button onclick="switchTab('provinces')" id="btn-provinces" class="tab-btn w-full text-left px-4 py-2.5 rounded-xl font-medium text-sm flex items-center gap-3 hover:bg-slate-800 transition-all">🗺️ ข้อมูลจังหวัด</button>
                </div>
            </div>
        </nav>
    </aside>

    <!-- Main Content Body -->
    <main class="flex-grow flex flex-col h-screen overflow-hidden">
        <header class="bg-white border-b border-slate-200 px-8 py-4 flex items-center justify-between shadow-sm shrink-0">
            <div class="flex items-center gap-4">
                <button onclick="toggleSidebar()" class="p-2 hover:bg-slate-100 rounded-lg text-slate-600 transition-colors focus:outline-none focus:ring-2 focus:ring-slate-200">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                    </svg>
                </button>
                <h2 id="current-title" class="text-xl font-bold text-slate-800">กำลังโหลดฐานข้อมูลระบบ...</h2>
            </div>
            
            <div class="flex items-center gap-4">
                <div class="relative">
                    <input type="text" id="searchInput" onkeyup="filterData()" placeholder="🔍 ค้นหาข้อมูลในตาราง..." class="w-64 pl-4 pr-4 py-2 bg-slate-50 border border-slate-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-slate-400 focus:bg-white transition-all">
                </div>
                <button onclick="refreshCurrentTab()" class="px-4 py-2 bg-slate-800 text-white rounded-xl text-sm font-medium hover:bg-slate-700 transition-all flex items-center gap-2 shadow-sm">
                    <span>🔄</span> รีเฟรช
                </button>
                <button onclick="openAddModal()" id="btn-add-new" class="px-4 py-2 bg-emerald-600 text-white rounded-xl text-sm font-medium hover:bg-emerald-700 transition-all flex items-center gap-2 shadow-sm">
                    <span>➕</span> เพิ่มข้อมูลใหม่
                </button>
            </div>
        </header>

        <section class="flex-grow p-8 overflow-y-auto bg-slate-100">
            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr id="table-head" class="bg-slate-50 border-b border-slate-200 text-slate-600 text-xs uppercase font-semibold tracking-wider">
                                <th class="px-6 py-4">กำลังโหลด...</th>
                            </tr>
                        </thead>
                        <tbody id="table-body" class="divide-y divide-slate-200 text-sm">
                            <tr>
                                <td class="px-6 py-12 text-center text-slate-400">
                                    <div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-slate-300 border-t-slate-800 mb-2"></div>
                                    <p>กำลังเชื่อมต่อฐานข้อมูลระบบ...</p>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <!-- Modal เพิ่ม/แก้ไข ข้อมูล -->
    <div id="dataModal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm hidden items-center justify-center z-50 p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg overflow-hidden transform transition-all">
            <div class="bg-slate-900 text-white px-6 py-4 flex items-center justify-between">
                <h3 id="modalTitle" class="font-bold text-lg">เพิ่มข้อมูลใหม่</h3>
                <button onclick="closeModal()" class="text-slate-400 hover:text-white text-xl">✕</button>
            </div>
            <form id="modalForm" onsubmit="handleFormSubmit(event)" class="p-6 space-y-4 max-h-[75vh] overflow-y-auto">
                <div id="modalFormFields" class="space-y-4">
                    <!-- Dynamic Fields -->
                </div>
                <div class="pt-4 border-t border-slate-100 flex items-center justify-end gap-3">
                    <button type="button" onclick="closeModal()" class="px-4 py-2 border border-slate-300 rounded-xl text-slate-700 text-sm font-medium hover:bg-slate-50">ยกเลิก</button>
                    <button type="submit" class="px-5 py-2 bg-emerald-600 text-white rounded-xl text-sm font-medium hover:bg-emerald-700 shadow-sm">บันทึกข้อมูล</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzztzVKjo66T95WJHOIir1QRR5JmPgnJv83ZLNM3dWtqZNnT_pDx4Ktu6O1-6-hm9Cy1w/exec"; 
        
        let ALL_DATA = {};
        let currentActiveTab = "pendingStudents"; 
        let editingRowIndex = null;

        // Schemas ทั้งหมด 12 ตาราง (ตัด studentYear ออกเรียบร้อย)
        const schemas = {
            pendingStudents: { title: "จัดการนิสิตรออนุมัติ", sheet: "รออนุมัติ", fields: ["date", "studentId", "fullName", "hospital"] },
            studentProfiles: { title: "ข้อมูลนิสิต & รูปภาพ", sheet: "Student_Profile", fields: ["รหัสนิสิต", "ชื่อ-สกุล", "ลิงก์รูปภาพ"] },
            evaluationResults: { title: "ผลการประเมินทั้งหมด", sheet: "Evaluation_Results", fields: ["Timestamp", "ชื่อผู้ประเมิน", "รหัสนิสิต", "ชื่อนิสิต", "รหัสวิชา", "คะแนนรวม", "เกรด", "ความคิดเห็น"] },
            mainElectives: { title: "ตารางเรียนนิสิต (Elective)", sheet: "Main", fields: ["ลำดับ", "รหัสนิสิต", "ชื่อ-สกุล", "กลุ่ม", "เริ่มเรียน", "สิ้นสุด", "รหัสวิชา", "ภายใน/ภายนอก", "สถานที่", "จังหวัด"] },
            formCriteria: { title: "เกณฑ์การประเมิน (Rubrics)", sheet: "Form", fields: ["หัวข้อการประเมิน", "คำจำกัดความ", "คะแนน", "รายละเอียด"] },
            assessors: { title: "รายชื่ออาจารย์ผู้ประเมิน", sheet: "Assessor", fields: ["คำนำหน้า", "ชื่อ", "นามสกุล", "ตำแหน่ง", "email", "เบอร์โทร", "สถาบัน", "ภาควิชา"] },
            subjects: { title: "รายชื่อวิชาเรียน", sheet: "Subject", fields: ["รหัสวิชา", "ชื่อวิชา", "กลุ่มงาน", "สาขาวิชา"] },
            departments: { title: "ข้อมูลภาควิชา", sheet: "Department_Master", fields: ["ชื่อกลุ่ม_ภาควิชา"] },
            specialties: { title: "ข้อมูลสาขาวิชา", sheet: "Specialty_Master", fields: ["ชื่อสาขาวิชา"] },
            positions: { title: "ข้อมูลตำแหน่งอาจารย์", sheet: "Position_Master", fields: ["ชื่อตำแหน่ง"] },
            institutes: { title: "ข้อมูลสถาบัน / รพ.", sheet: "Institute_Master", fields: ["ชื่อสถาบัน"] },
            provinces: { title: "ข้อมูลจังหวัด", sheet: "Province_Master", fields: ["ชื่อจังหวัด"] }
        };

        window.addEventListener("DOMContentLoaded", () => {
            loadAllData();
        });

        async function loadAllData() {
            renderLoading();
            try {
                const response = await fetch(`${API_URL}?action=getAdminAllData`);
                const data = await response.json();
                
                const pendingRes = await fetch(`${API_URL}?action=getPendingStudents`);
                const pendingData = await pendingRes.json();

                ALL_DATA = data || {};
                ALL_DATA.pendingStudents = pendingData || [];

                switchTab(currentActiveTab);
            } catch (err) {
                console.error(err);
                Swal.fire("ข้อผิดพลาด", "ไม่สามารถดึงข้อมูลจากฐานข้อมูลได้", "error");
            }
        }

        function switchTab(tabKey) {
            currentActiveTab = tabKey;
            editingRowIndex = null;
            
            document.querySelectorAll(".tab-btn").forEach(btn => {
                btn.classList.remove("bg-slate-800", "text-amber-400", "font-semibold");
                btn.classList.add("hover:bg-slate-800");
            });

            const activeBtn = document.getElementById(`btn-${tabKey}`);
            if (activeBtn) {
                activeBtn.classList.add("bg-slate-800", "text-amber-400", "font-semibold");
            }

            const schema = schemas[tabKey];
            if (schema) {
                document.getElementById("current-title").innerText = schema.title;
            }

            const btnAdd = document.getElementById("btn-add-new");
            if (tabKey === "pendingStudents" || tabKey === "evaluationResults") {
                btnAdd.style.display = "none";
            } else {
                btnAdd.style.display = "flex";
            }

            document.getElementById("searchInput").value = "";
            renderTable();
        }

        function renderTable(filterText = "") {
            const schema = schemas[currentActiveTab];
            const thead = document.getElementById("table-head");
            const tbody = document.getElementById("table-body");

            if (!schema) return;

            // Render Table Header
            let headHTML = "<tr>";
            schema.fields.forEach(f => {
                let displayField = f;
                if(f === "Timestamp") displayField = "วันที่ประเมิน";
                if(f === "date") displayField = "วันที่ลงทะเบียน";
                if(f === "studentId") displayField = "รหัสนิสิต";
                if(f === "fullName") displayField = "ชื่อ-สกุล";
                if(f === "hospital") displayField = "สถาบัน";
                headHTML += `<th class="px-6 py-4 whitespace-nowrap">${displayField}</th>`;
            });
            headHTML += `<th class="px-6 py-4 text-center sticky right-0 bg-slate-50 z-10">จัดการ</th></tr>`;
            thead.innerHTML = headHTML;

            // Filter Data
            const list = ALL_DATA[currentActiveTab] || [];
            let filteredList = list;

            if (filterText.trim() !== "") {
                const q = filterText.toLowerCase();
                filteredList = list.filter(item => JSON.stringify(item).toLowerCase().includes(q));
            }

            if (filteredList.length === 0) {
                tbody.innerHTML = `<tr><td colspan="${schema.fields.length + 1}" class="px-6 py-12 text-center text-slate-400">ไม่พบข้อมูลในระบบ</td></tr>`;
                return;
            }

            // Render Table Body
            let bodyHTML = "";
            filteredList.forEach((item, index) => {
                bodyHTML += `<tr class="hover:bg-slate-50/80 transition-colors">`;
                
                schema.fields.forEach(f => {
                    let val = item[f] !== undefined && item[f] !== null ? item[f] : "-";
                    
                    if (f === "ลิงก์รูปภาพ" && val !== "-") {
                        bodyHTML += `<td class="px-6 py-3"><img src="${val}" class="h-10 w-10 object-cover rounded-md border shadow-sm bg-slate-100" onerror="this.src='https://placehold.co/100x100?text=No+Image'"></td>`;
                    } else {
                        bodyHTML += `<td class="px-6 py-4 whitespace-nowrap text-slate-700">${val}</td>`;
                    }
                });

                // Render Actions
                if (currentActiveTab === "pendingStudents") {
                    bodyHTML += `
                        <td class="px-6 py-4 whitespace-nowrap text-center sticky right-0 bg-white shadow-sm">
                            <button onclick="approveStudent('${item.studentId}')" class="px-3 py-1.5 bg-emerald-600 text-white text-xs font-semibold rounded-lg hover:bg-emerald-700 transition-all mr-1.5 shadow-sm">อนุมัติ</button>
                            <button onclick="rejectStudent('${item.studentId}')" class="px-3 py-1.5 bg-rose-500 text-white text-xs font-semibold rounded-lg hover:bg-rose-600 transition-all shadow-sm">ปฏิเสธ</button>
                        </td>
                    `;
                } else {
                    bodyHTML += `
                        <td class="px-6 py-4 whitespace-nowrap text-center sticky right-0 bg-white shadow-sm">
                            <button onclick="openEditModal(${index})" class="px-3 py-1.5 bg-amber-50 text-amber-700 border border-amber-200 text-xs font-medium rounded-lg hover:bg-amber-100 transition-all mr-1.5">แก้ไข</button>
                            <button onclick="deleteRow('${schema.sheet}', ${index + 2})" class="px-3 py-1.5 bg-rose-50 text-rose-600 border border-rose-200 text-xs font-medium rounded-lg hover:bg-rose-100 transition-all">ลบ</button>
                        </td>
                    `;
                }

                bodyHTML += `</tr>`;
            });

            tbody.innerHTML = bodyHTML;
        }

        function filterData() {
            const q = document.getElementById("searchInput").value;
            renderTable(q);
        }

        function refreshCurrentTab() {
            loadAllData();
        }

        function renderLoading() {
            document.getElementById("table-body").innerHTML = `
                <tr>
                    <td colspan="10" class="px-6 py-12 text-center text-slate-400">
                        <div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-slate-300 border-t-slate-800 mb-2"></div>
                        <p>กำลังเชื่อมต่อฐานข้อมูลระบบ...</p>
                    </td>
                </tr>
            `;
        }

        function toggleSidebar() {
            const sidebar = document.getElementById("sidebar");
            sidebar.classList.toggle("w-80");
            sidebar.classList.toggle("w-0");
        }

        // Modal Functions
        function openAddModal() {
            editingRowIndex = null;
            const schema = schemas[currentActiveTab];
            document.getElementById("modalTitle").innerText = `เพิ่มข้อมูลใน ${schema.title}`;
            
            let fieldsHTML = "";
            schema.fields.forEach(f => {
                fieldsHTML += `
                    <div>
                        <label class="block text-xs font-semibold text-slate-600 uppercase mb-1">${f}</label>
                        <input type="text" name="${f}" required class="w-full px-3 py-2 border border-slate-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
                    </div>
                `;
            });
            document.getElementById("modalFormFields").innerHTML = fieldsHTML;
            document.getElementById("dataModal").classList.remove("hidden");
            document.getElementById("dataModal").classList.add("flex");
        }

        function openEditModal(index) {
            editingRowIndex = index;
            const schema = schemas[currentActiveTab];
            const item = (ALL_DATA[currentActiveTab] || [])[index];
            if (!item) return;

            document.getElementById("modalTitle").innerText = `แก้ไขข้อมูลใน ${schema.title}`;
            
            let fieldsHTML = "";
            schema.fields.forEach(f => {
                const currentVal = item[f] !== undefined && item[f] !== null ? item[f] : "";
                fieldsHTML += `
                    <div>
                        <label class="block text-xs font-semibold text-slate-600 uppercase mb-1">${f}</label>
                        <input type="text" name="${f}" value="${currentVal}" required class="w-full px-3 py-2 border border-slate-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
                    </div>
                `;
            });
            document.getElementById("modalFormFields").innerHTML = fieldsHTML;
            document.getElementById("dataModal").classList.remove("hidden");
            document.getElementById("dataModal").classList.add("flex");
        }

        function closeModal() {
            document.getElementById("dataModal").classList.add("hidden");
            document.getElementById("dataModal").classList.remove("flex");
        }

        async function handleFormSubmit(e) {
            e.preventDefault();
            const schema = schemas[currentActiveTab];
            const formData = new FormData(e.target);
            const rowData = {};
            
            schema.fields.forEach(f => {
                rowData[f] = formData.get(f);
            });

            Swal.showLoading();
            try {
                let action = "addAdminRecord";
                let payload = { action: action, sheetName: schema.sheet, rowData: rowData };

                if (editingRowIndex !== null) {
                    payload.action = "updateAdminRecord";
                    payload.rowNum = editingRowIndex + 2;
                }

                const res = await fetch(API_URL, {
                    method: "POST",
                    body: JSON.stringify(payload)
                });
                const result = await res.json();

                if (result.result === "success") {
                    closeModal();
                    Swal.fire("สำเร็จ", "บันทึกข้อมูลเรียบร้อยแล้ว", "success");
                    loadAllData();
                } else {
                    Swal.fire("ผิดพลาด", result.message || "ไม่สามารถบันทึกข้อมูลได้", "error");
                }
            } catch (err) {
                Swal.fire("ผิดพลาด", "เกิดปัญหาในการส่งข้อมูล", "error");
            }
        }

        async function approveStudent(studentId) {
            const res = await Swal.fire({
                title: "อนุมัติการลงทะเบียน?",
                text: `ต้องการอนุมัติรหัสนิสิต ${studentId} เข้าสู่ระบบหลักใช่หรือไม่`,
                icon: "question",
                showCancelButton: true,
                confirmButtonText: "อนุมัติ",
                cancelButtonText: "ยกเลิก",
