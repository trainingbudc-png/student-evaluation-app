<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบควบคุมแอดมินหลัก - 10 เมนูจัดการฐานข้อมูล</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = { theme: { extend: { fontFamily: { sans: ['Prompt', 'sans-serif'] } } } }
    </script>
</head>
<body class="bg-slate-100 text-slate-800 font-sans min-h-screen flex">

    <aside id="sidebar" class="w-80 bg-slate-900 text-slate-300 flex flex-col min-h-screen shadow-xl border-r border-slate-800 shrink-0 transition-all duration-300 overflow-hidden">
        <div class="p-6 border-b border-slate-800 bg-slate-950 flex items-center gap-3 w-80">
            <span class="text-3xl">⚙️</span>
            <div>
                <h1 class="text-lg font-bold text-white leading-none mb-1">Admin Panel</h1>
                <p class="text-xs text-slate-500 font-light">ระบบจัดการข้อมูลแพทย์ศาสตรศึกษา</p>
            </div>
        </div>
        
        <nav class="flex-grow p-4 space-y-6 overflow-y-auto w-80" style="max-height: calc(100vh - 90px);">
            <div>
                <p class="px-3 text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">📊 ผลการประเมิน & ตารางงาน</p>
                <div class="space-y-1">
                    <button onclick="switchTab('evaluationResults')" id="btn-evaluationResults" class="tab-btn w-full text-left px-4 py-2.5 rounded-xl font-medium text-sm flex items-center gap-3 hover:bg-slate-800 transition-all">📝 ผลการประเมินทั้งหมด</button>
                    <button onclick="switchTab('mainElectives')" id="btn-mainElectives" class="tab-btn w-full text-left px-4 py-2.5 rounded-xl font-medium text-sm flex items-center gap-3 hover:bg-slate-800 transition-all">📅 ตารางเรียนนิสิต (Elective)</button>
                </div>
            </div>

            <div>
                <p class="px-3 text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">👤 ข้อมูลนิสิตแพทย์</p>
                <div class="space-y-1">
                    <button onclick="switchTab('studentProfiles')" id="btn-studentProfiles" class="tab-btn w-full text-left px-4 py-2.5 rounded-xl font-medium text-sm flex items-center gap-3 hover:bg-slate-800 transition-all">📸 ข้อมูลรูปภาพนิสิต</button>
                </div>
            </div>

            <div>
                <p class="px-3 text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">🎓 เกณฑ์ & รายชื่อวิชา</p>
                <div class="space-y-1">
                    <button onclick="switchTab('formCriteria')" id="btn-formCriteria" class="tab-btn w-full text-left px-4 py-2.5 rounded-xl font-medium text-sm flex items-center gap-3 hover:bg-slate-800 transition-all">📋 เกณฑ์การประเมิน (Rubrics)</button>
                    <button onclick="switchTab('assessors')" id="btn-assessors" class="tab-btn w-full text-left px-4 py-2.5 rounded-xl font-medium text-sm flex items-center gap-3 hover:bg-slate-800 transition-all">👨‍🏫 รายชื่ออาจารย์ผู้ประเมิน</button>
                    <button onclick="switchTab('subjects')" id="btn-subjects" class="tab-btn w-full text-left px-4 py-2.5 rounded-xl font-medium text-sm flex items-center gap-3 hover:bg-slate-800 transition-all">📚 รายชื่อวิชาเรียน</button>
                </div>
            </div>

            <div>
                <p class="px-3 text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">🗂️ ข้อมูลระบบ (Master Data)</p>
                <div class="space-y-1">
                    <button onclick="switchTab('departments')" id="btn-departments" class="tab-btn w-full text-left px-4 py-2.5 rounded-xl font-medium text-sm flex items-center gap-3 hover:bg-slate-800 transition-all">🏢 ข้อมูลภาควิชา</button>
                    <button onclick="switchTab('specialties')" id="btn-specialties" class="tab-btn w-full text-left px-4 py-2.5 rounded-xl font-medium text-sm flex items-center gap-3 hover:bg-slate-800 transition-all">🧬 ข้อมูลสาขาวิชา</button>
                    <button onclick="switchTab('positions')" id="btn-positions" class="tab-btn w-full text-left px-4 py-2.5 rounded-xl font-medium text-sm flex items-center gap-3 hover:bg-slate-800 transition-all">🎖️ ข้อมูลตำแหน่งอาจารย์</button>
                    <button onclick="switchTab('institutes')" id="btn-institutes" class="tab-btn w-full text-left px-4 py-2.5 rounded-xl font-medium text-sm flex items-center gap-3 hover:bg-slate-800 transition-all">🏥 ข้อมูลสถาบัน / รพ.</button>
                    <button onclick="switchTab('provinces')" id="btn-provinces" class="tab-btn w-full text-left px-4 py-2.5 rounded-xl font-medium text-sm flex items-center gap-3 hover:bg-slate-800 transition-all">🗺️ ข้อมูลจังหวัด</button>
                </div>
            </div>
        </nav>
    </aside>

    <main class="flex-grow flex flex-col h-screen overflow-hidden">
        <header class="bg-white border-b border-slate-200 px-8 py-4 flex items-center justify-between shadow-sm shrink-0">
            <div class="flex items-center gap-4">
                <button onclick="toggleSidebar()" class="p-2 hover:bg-slate-100 rounded-lg text-slate-600 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" /></svg>
                </button>
                <h2 id="current-title" class="text-xl font-bold text-slate-800">กำลังโหลดฐานข้อมูลระบบ...</h2>
            </div>
            
            <div class="flex items-center gap-4">
                <input type="text" id="searchBox" oninput="searchTable()" placeholder="🔍 ค้นหาในหน้านี้..." class="px-4 py-2 text-sm border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 w-64 transition-all">
                <button id="addBtn" onclick="openAddModal()" class="bg-blue-600 hover:bg-blue-700 text-white text-sm font-semibold px-5 py-2 rounded-xl shadow-lg shadow-blue-100 flex items-center gap-1.5 transition-all">
                    ➕ เพิ่มข้อมูลใหม่
                </button>
            </div>
        </header>

        <section class="flex-grow p-8 overflow-auto">
            <div class="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead id="table-head" class="bg-slate-50 border-b border-slate-200 text-xs font-bold text-slate-500 uppercase tracking-wider sticky top-0 z-10"></thead>
                        <tbody id="table-body" class="text-sm divide-y divide-slate-100 text-slate-600">
                            <tr><td colspan="15" class="text-center py-12 text-slate-400">กรุณารอสักครู่ ระบบกำลังดึงฐานข้อมูลสดจาก Excel...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbx_x-pFk87VJZZElW0ywKYjvkrFyW4Xly7IYEtr4Lcsb1Dk1M838m6rwGDfSTTVxSFuHg/exec"; 
        let ALL_DATA = {};
        let currentActiveTab = "evaluationResults";

        const schemas = {
            evaluationResults: { title: "ผลการประเมินทั้งหมด", sheet: "Evaluation_Results", fields: ["Timestamp", "ชื่อผู้ประเมิน", "รหัสนิสิต", "ชื่อนิสิต", "รหัสวิชา", "คะแนนรวม", "เกรด", "ความคิดเห็น"] },
            mainElectives: { title: "ตารางเรียนนิสิต (Elective)", sheet: "Main", fields: ["ลำดับ", "รหัสนิสิต", "ชื่อ-สกุล", "กลุ่ม", "เริ่มเรียน", "สิ้นสุด", "รหัสวิชา", "ภายใน/ภายนอก", "สถานที่", "จังหวัด"] },
            studentProfiles: { title: "ข้อมูลรูปภาพนิสิต", sheet: "Student_Profile", fields: ["รหัสนิสิต", "ชื่อ-สกุล", "ลิงก์รูปภาพ"] },
            formCriteria: { title: "เกณฑ์การประเมิน (Rubrics)", sheet: "Form", fields: ["หัวข้อการประเมิน", "คำจำกัดความ", "คะแนน", "รายละเอียด"] },
            assessors: { title: "รายชื่ออาจารย์ผู้ประเมิน", sheet: "Assessor", fields: ["คำนำหน้า", "ชื่อ", "นามสกุล", "ตำแหน่ง", "email", "เบอร์โทร", "สถาบัน", "ภาควิชา"] },
            subjects: { title: "รายชื่อวิชาเรียน", sheet: "Subject", fields: ["รหัสวิชา", "ชื่อวิชา", "กลุ่มงาน", "สาขาวิชา"] },
            departments: { title: "ข้อมูลภาควิชา", sheet: "Department_Master", fields: ["ชื่อกลุ่ม_ภาควิชา"] },
            specialties: { title: "ข้อมูลสาขาวิชา", sheet: "Specialty_Master", fields: ["ชื่อสาขาวิชา"] },
            positions: { title: "ข้อมูลตำแหน่งอาจารย์", sheet: "Position_Master", fields: ["ชื่อตำแหน่ง"] },
            institutes: { title: "ข้อมูลสถาบัน / รพ.", sheet: "Institute_Master", fields: ["ชื่อสถาบัน"] },
            provinces: { title: "ข้อมูลจังหวัด", sheet: "Province_Master", fields: ["ชื่อจังหวัด"] }
        };

        const ADMIN_PIN = "9999"; 

        window.addEventListener("DOMContentLoaded", checkAdminLogin);

        async function checkAdminLogin() {
            const { value: pin } = await Swal.fire({
                title: '🔒 Admin Login', input: 'password', inputLabel: 'กรุณาใส่รหัส PIN',
                allowOutsideClick: false, allowEscapeKey: false, showCancelButton: false, confirmButtonText: 'เข้าสู่ระบบ',
                inputValidator: (value) => {
                    if (!value) return 'กรุณาใส่รหัส PIN!';
                    if (value !== ADMIN_PIN) return 'รหัส PIN ไม่ถูกต้อง!';
                }
            });
            if (pin === ADMIN_PIN) {
                Swal.fire({ title: 'สำเร็จ!', icon: 'success', timer: 1000, showConfirmButton: false });
                loadAllDataFromServer(); 
            }
        }

        function toggleSidebar() {
            const sidebar = document.getElementById("sidebar");
            if (sidebar.classList.contains("w-80")) { sidebar.classList.remove("w-80"); sidebar.classList.add("w-0"); } 
            else { sidebar.classList.remove("w-0"); sidebar.classList.add("w-80"); }
        }

        async function loadAllDataFromServer() {
            try {
                const response = await fetch(`${API_URL}?action=getAdminAllData`);
                const res = await response.json();
                if(res.result === "success") {
                    ALL_DATA = res;
                    switchTab(currentActiveTab);
                }
            } catch(e) { Swal.fire("ผิดพลาด", e.toString(), "error"); }
        }

        function switchTab(tabKey) {
            currentActiveTab = tabKey;
            const schema = schemas[tabKey];
            document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("bg-blue-600", "text-white", "shadow-md"));
            document.getElementById(`btn-${tabKey}`).classList.add("bg-blue-600", "text-white", "shadow-md");
            document.getElementById("current-title").innerText = schema.title;
            document.getElementById("searchBox").value = "";
            renderTable(ALL_DATA[tabKey] || [], schema.fields);
            if(window.innerWidth <= 768) document.getElementById("sidebar").classList.replace("w-80", "w-0");
        }

        function renderTable(dataRows, fields) {
            const thead = document.getElementById("table-head");
            const tbody = document.getElementById("table-body");
            let headHTML = "<tr>";
            fields.forEach(f => headHTML += `<th class="px-6 py-4 whitespace-nowrap">${f}</th>`);
            headHTML += `<th class="px-6 py-4 text-center sticky right-0 bg-slate-50 z-10">จัดการ</th></tr>`;
            thead.innerHTML = headHTML;

            if (dataRows.length === 0) {
                tbody.innerHTML = `<tr><td colspan="${fields.length + 1}" class="text-center py-12">ไม่พบข้อมูล</td></tr>`;
                return;
            }

            let bodyHTML = "";
            dataRows.forEach(row => {
                bodyHTML += `<tr class="hover:bg-slate-50">`;
                fields.forEach(f => {
                    let val = row[f] || "-";
                    if(f.includes("Timestamp") && val !== "-") val = new Date(val).toLocaleString('th-TH');
                    if(f === "ลิงก์รูปภาพ" && val !== "-" && val !== "") {
                         bodyHTML += `<td class="px-6 py-4 whitespace-nowrap max-w-[150px] truncate"><a href="${val}" target="_blank" class="text-blue-600 hover:underline">ดูรูปภาพ</a></td>`;
                    } else {
                         bodyHTML += `<td class="px-6 py-4 whitespace-nowrap max-w-xs truncate">${val}</td>`;
                    }
                });
                bodyHTML += `
                    <td class="px-6 py-4 text-center sticky right-0 bg-white shadow-[-4px_0_12px_rgba(0,0,0,0.05)]">
                        <button onclick="openEditModal('${row._rowNum}')" class="text-xs text-amber-600 border border-amber-200 px-3 py-1 rounded-lg">แก้ไข</button>
                        <button onclick="deleteRecord('${row._rowNum}')" class="text-xs text-rose-600 border border-rose-200 px-3 py-1 rounded-lg">ลบ</button>
                    </td></tr>`;
            });
            tbody.innerHTML = bodyHTML;
        }

        function searchTable() {
            const query = document.getElementById("searchBox").value.toLowerCase();
            const schema = schemas[currentActiveTab];
            const filtered = ALL_DATA[currentActiveTab].filter(row => {
                return schema.fields.some(f => String(row[f] || "").toLowerCase().includes(query));
            });
            renderTable(filtered, schema.fields);
        }

        function deleteRecord(rowNum) {
            const schema = schemas[currentActiveTab];
            Swal.fire({
                title: 'ยืนยันการลบ?', text: `ลบข้อมูลแถวที่ ${rowNum}?`, icon: 'warning', showCancelButton: true, confirmButtonColor: '#e11d48',
            }).then(async (result) => {
                if (result.isConfirmed) {
                    Swal.fire({ title: 'กำลังลบ...', didOpen: () => Swal.showLoading() });
                    try {
                        const res = await fetch(`${API_URL}?action=deleteAdminRecord&sheetName=${schema.sheet}&rowNum=${rowNum}`);
                        const data = await res.json();
                        if (data.result === "success") location.reload();
                    } catch(e) { Swal.fire("ผิดพลาด", e.toString(), "error"); }
                }
            });
        }

        // 🌟 Helper ฟังก์ชันสำหรับแปลงไฟล์เป็น Base64
        function getBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result.split(',')[1]); // เอาเฉพาะส่วน data Base64
                reader.onerror = error => reject(error);
            });
        }

        async function openAddModal() {
            const schema = schemas[currentActiveTab];
            let inputFormHTML = `<div class="text-left space-y-4 max-h-[60vh] overflow-y-auto p-1">`;
            
            schema.fields.forEach(f => {
                if(f === "Timestamp" || f === "ลำดับ" || f === "คะแนนรวม" || f === "เกรด") return; 
                
                inputFormHTML += `<div><label class="block text-xs font-bold text-slate-500 uppercase mb-1">${f}</label>`;
                
                // 📸 ถ้าเป็นฟิลด์ "ลิงก์รูปภาพ" ให้สร้างเป็นปุ่มอัปโหลดไฟล์แทนกล่องข้อความ
                if (f === "ลิงก์รูปภาพ") {
                    inputFormHTML += `<input id="fileUpload" type="file" accept="image/*" class="w-full text-sm border border-slate-200 rounded-xl file:mr-4 file:py-2 file:px-4 file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100"></div>`;
                } else {
                    inputFormHTML += `<input id="md_${f}" type="text" class="w-full px-3 py-2 text-sm border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500"></div>`;
                }
            });
            inputFormHTML += `</div>`;

            Swal.fire({
                title: `➕ เพิ่มข้อมูลใน ${schema.title}`, html: inputFormHTML, showCancelButton: true, confirmButtonText: 'บันทึก',
                preConfirm: async () => {
                    let payload = { sheetName: schema.sheet, action: "addAdminRecord" };
                    let fileInput = document.getElementById('fileUpload');
                    
                    schema.fields.forEach(f => {
                        if(f === "Timestamp" || f === "ลำดับ" || f === "คะแนนรวม" || f === "เกรด") return;
                        if(f !== "ลิงก์รูปภาพ") payload[f] = document.getElementById(`md_${f}`).value;
                    });

                    // 📸 จัดการไฟล์ที่อัปโหลด
                    if (fileInput && fileInput.files.length > 0) {
                        payload.action = "addAdminRecordWithImage"; // เปลี่ยน Action ให้เซิร์ฟเวอร์รู้ว่ามีไฟล์
                        const file = fileInput.files[0];
                        payload.fileName = file.name;
                        payload.fileMimeType = file.type;
                        payload.fileData = await getBase64(file);
                    }

                    return payload;
                }
            }).then(async (result) => {
                if (result.isConfirmed && result.value) {
                    Swal.fire({ title: 'กำลังอัปโหลดและบันทึกข้อมูล...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
                    try {
                        const res = await fetch(API_URL, {
                            method: "POST",
                            body: JSON.stringify(result.value)
                        });
                        const data = await res.json();
                        if (data.result === "success") {
                            await Swal.fire("สำเร็จ!", "บันทึกและอัปโหลดรูปเรียบร้อย", "success");
                            location.reload();
                        } else {
                            Swal.fire("ล้มเหลว", data.message, "error");
                        }
                    } catch (e) { Swal.fire("ผิดพลาด", e.toString(), "error"); }
                }
            });
        }

        async function openEditModal(rowNum) {
            const schema = schemas[currentActiveTab];
            const rowData = ALL_DATA[currentActiveTab].find(r => String(r._rowNum) === String(rowNum));
            
            let inputFormHTML = `<div class="text-left space-y-4 max-h-[60vh] overflow-y-auto p-1">`;
            schema.fields.forEach(f => {
                if(f === "Timestamp" || f === "ลำดับ" || f === "คะแนนรวม" || f === "เกรด") return; 
                let currentVal = rowData[f] || "";
                inputFormHTML += `<div><label class="block text-xs font-bold text-slate-500 uppercase mb-1">${f}</label>`;
                
                if (f === "ลิงก์รูปภาพ") {
                    if(currentVal) inputFormHTML += `<p class="text-xs text-green-600 mb-1">มีรูปเดิมอยู่แล้ว (เลือกไฟล์ใหม่เพื่อทับรูปเดิม)</p>`;
                    inputFormHTML += `<input id="fileUpload" type="file" accept="image/*" class="w-full text-sm border border-slate-200 rounded-xl file:mr-4 file:py-2 file:px-4 file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100"></div>`;
                } else {
                    let escapedVal = String(currentVal).replace(/"/g, '&quot;');
                    inputFormHTML += `<input id="edit_md_${f}" type="text" value="${escapedVal}" class="w-full px-3 py-2 text-sm border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500"></div>`;
                }
            });
            inputFormHTML += `</div>`;

            Swal.fire({
                title: `✏️ แก้ไขแถวที่ ${rowNum}`, html: inputFormHTML, showCancelButton: true, confirmButtonText: 'บันทึก',
                preConfirm: async () => {
                    let payload = { sheetName: schema.sheet, rowNum: rowNum, action: "updateAdminRecord" };
                    let fileInput = document.getElementById('fileUpload');

                    schema.fields.forEach(f => {
                        if(f === "Timestamp" || f === "ลำดับ" || f === "คะแนนรวม" || f === "เกรด") return;
                        if(f !== "ลิงก์รูปภาพ") payload[f] = document.getElementById(`edit_md_${f}`).value;
                    });

                    // 📸 จัดการไฟล์ที่อัปโหลด (ถ้ามี)
                    if (fileInput && fileInput.files.length > 0) {
                        payload.action = "updateAdminRecordWithImage";
                        const file = fileInput.files[0];
                        payload.fileName = file.name;
                        payload.fileMimeType = file.type;
                        payload.fileData = await getBase64(file);
                    }

                    return payload;
                }
            }).then(async (result) => {
                if (result.isConfirmed && result.value) {
                    Swal.fire({ title: 'กำลังบันทึกข้อมูล...', didOpen: () => Swal.showLoading() });
                    try {
                        const res = await fetch(API_URL, { method: "POST", body: JSON.stringify(result.value) });
                        const data = await res.json();
                        if (data.result === "success") {
                            await Swal.fire("สำเร็จ!", "แก้ไขข้อมูลเรียบร้อย", "success");
                            location.reload();
                        }
                    } catch (e) { Swal.fire("ผิดพลาด", e.toString(), "error"); }
                }
            });
        }
    </script>
</body>
</html>
