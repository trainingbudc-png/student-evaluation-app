<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบจัดการข้อมูลแอดมิน (Admin Dashboard)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap');
    body { font-family: 'Sarabun', sans-serif; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">

  <nav class="bg-gradient-to-r bg-indigo-600 text-white shadow-md">
    <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
      <div class="flex items-center space-x-3">
        <i class="fa-solid fa-user-shield text-2xl"></i>
        <span class="text-xl font-bold tracking-wide">Admin Control Panel</span>
      </div>
      <button onclick="fetchAllData()" class="bg-indigo-500 hover:bg-indigo-400 px-4 py-2 rounded-lg text-sm font-medium transition flex items-center space-x-2">
        <i class="fa-solid fa-rotate"></i> <span>รีเฟรชข้อมูล</span>
      </button>
    </div>
  </nav>

  <main class="flex-grow max-w-7xl w-full mx-auto px-4 py-6">
    
    <div class="border-b border-gray-200 mb-6">
      <nav class="flex space-x-4" aria-label="Tabs">
        <button onclick="switchTab('Student_Profile')" id="tab-Student_Profile" class="tab-btn border-b-2 border-indigo-500 text-indigo-600 px-3 py-2 font-medium text-sm flex items-center space-x-2">
          <i class="fa-solid fa-image-user text-lg"></i> <span>ข้อมูลนิสิต & รูปภาพ (Student_Profile)</span>
        </button>
        <button onclick="switchTab('Main')" id="tab-Main" class="tab-btn border-b-2 border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300 px-3 py-2 font-medium text-sm flex items-center space-x-2">
          <i class="fa-solid fa-table-list"></i> <span>ข้อมูลการเรียน (Main)</span>
        </button>
        <button onclick="switchTab('Evaluation_Results')" id="tab-Evaluation_Results" class="tab-btn border-b-2 border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300 px-3 py-2 font-medium text-sm flex items-center space-x-2">
          <i class="fa-solid fa-square-poll-vertical"></i> <span>ผลการประเมิน</span>
        </button>
      </nav>
    </div>

    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-4">
      <h2 id="current-tab-title" class="text-xl font-bold text-gray-800">ตารางข้อมูลนิสิต (Student_Profile)</h2>
      <button onclick="openAddModal()" class="bg-emerald-600 hover:bg-emerald-500 text-white px-4 py-2 rounded-lg font-medium shadow transition flex items-center space-x-2 w-full sm:w-auto justify-center">
        <i class="fa-solid fa-plus-circle"></i> <span>+ เพิ่มข้อมูลใหม่</span>
      </button>
    </div>

    <div class="bg-white rounded-xl shadow overflow-hidden border border-gray-100">
      <div class="overflow-x-auto">
        <table class="min-w-full divide-y divide-gray-200 text-sm text-left">
          <thead class="bg-gray-50 text-gray-700 uppercase font-semibold text-xs" id="table-head">
            </thead>
          <tbody class="divide-y divide-gray-200 text-gray-600" id="table-body">
            <tr>
              <td colspan="4" class="text-center py-8 text-gray-400">
                <i class="fa-solid fa-spinner animate-spin text-2xl mb-2"></i> <br> กำลังโหลดข้อมูลจาก Google Sheets...
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <div id="dataModal" class="fixed inset-0 bg-black/50 hidden z-50 flex items-center justify-center p-4 backdrop-blur-sm">
    <div class="bg-white rounded-xl shadow-2xl max-w-lg w-full max-h-[90vh] flex flex-col overflow-hidden transform transition-all">
      <div class="bg-indigo-600 text-white px-6 py-4 flex justify-between items-center">
        <h3 id="modalTitle" class="text-lg font-bold">เพิ่มข้อมูลใหม่</h3>
        <button onclick="closeModal()" class="text-white/80 hover:text-white text-xl"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <form id="modalForm" onsubmit="handleFormSubmit(event)" class="p-6 overflow-y-auto space-y-4 flex-grow">
        <input type="hidden" id="formRowNum">
        
        <div id="formFieldsContainer" class="space-y-4"></div>
        
        <div id="imageUploadSection" class="hidden border-2 border-dashed border-gray-300 rounded-lg p-4 text-center hover:bg-gray-50 transition cursor-pointer relative">
          <input type="file" id="imageFileInput" accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer" onchange="previewImage(event)">
          <div id="uploadPlaceholder" class="space-y-2 text-gray-500">
            <i class="fa-solid fa-cloud-arrow-up text-3xl text-indigo-500"></i>
            <p class="text-xs font-semibold">คลิกเพื่อเลือกรูปภาพนิสิต หรือลากไฟล์มาวางที่นี่</p>
            <p class="text-[10px] text-gray-400">รองรับไฟล์ JPG, PNG, GIF</p>
          </div>
          <div id="imagePreviewContainer" class="hidden flex flex-col items-center">
            <img id="imagePreview" src="" class="h-32 w-32 object-cover rounded-lg shadow-md border mb-2">
            <span class="text-xs text-emerald-600 font-medium"><i class="fa-solid fa-circle-check"></i> เลือกรูปภาพแล้ว เปลี่ยนรูปภาพคลิกซ้ำ</span>
          </div>
        </div>

        <div class="flex justify-end space-x-3 pt-4 border-t border-gray-100">
          <button type="button" onclick="closeModal()" class="px-4 py-2 border border-gray-300 text-gray-700 rounded-lg text-sm hover:bg-gray-50 font-medium">ยกเลิก</button>
          <button type="submit" class="px-5 py-2 bg-indigo-600 hover:bg-indigo-500 text-white rounded-lg text-sm font-medium shadow-sm">บันทึกข้อมูล</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    // 📌 ตรงนี้คือลิงก์ของคุณพี่ที่ผมใส่ให้เรียบร้อยแล้วครับ!
    const API_URL = "https://script.google.com/macros/s/AKfycbx_x-pFk87VJZZElW0ywKYjvkrFyW4Xly7IYEtr4Lcsb1Dk1M838m6rwGDfSTTVxSFuHg/exec"; 

    let allData = {};
    let currentTab = "Student_Profile";
    let base64FileData = null;
    let base64FileName = "";
    let base64FileMimeType = "";

    // โหลดข้อมูลเมื่อเปิดหน้าเว็บ
    window.onload = function() {
      fetchAllData();
    };

    // ดึงข้อมูลทั้งหมดจากหลังบ้าน
    async function fetchAllData() {
      showLoadingTable();
      try {
        const response = await fetch(`${API_URL}?action=getAdminAllData`);
        const resJson = await response.json();
        if (resJson.result === "success") {
          allData = resJson;
          renderTable();
        } else {
          Swal.fire("เกิดข้อผิดพลาด", resJson.message || "ดึงข้อมูลไม่สำเร็จ", "error");
        }
      } catch (err) {
        Swal.fire("เชื่อมต่อล้มเหลว", "กรุณาตรวจสอบลิงก์ API_URL หรือสิทธิ์การเข้าถึงหลังบ้าน", "error");
        console.error(err);
      }
    }

    // สลับแท็บข้อมูล
    function switchTab(tabName) {
      currentTab = tabName;
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.remove('border-indigo-500', 'text-indigo-600');
        btn.classList.add('border-transparent', 'text-gray-500');
      });
      document.getElementById(`tab-${tabName}`).classList.add('border-indigo-500', 'text-indigo-600');
      document.getElementById(`tab-${tabName}`).classList.remove('border-transparent', 'text-gray-500');
      
      const titles = { 'Student_Profile': 'ตารางข้อมูลนิสิต (Student_Profile)', 'Main': 'ตารางข้อมูลเรียน (Main)', 'Evaluation_Results': 'ตารางผลการประเมิน' };
      document.getElementById('current-tab-title').innerText = titles[tabName] || tabName;
      
      renderTable();
    }

    // แสดงตารางข้อมูล
    function renderTable() {
      const tableHead = document.getElementById("table-head");
      const tableBody = document.getElementById("table-body");
      
      let rows = [];
      let headers = [];

      if (currentTab === "Student_Profile") {
        rows = allData.studentProfiles || [];
        headers = ["รหัสนิสิต", "ชื่อ-สกุล", "ลิงก์รูปภาพ"];
      } else if (currentTab === "Main") {
        rows = allData.mainElectives || [];
        headers = ["ลำดับ", "รหัสนิสิต", "ชื่อ-สกุล", "รหัสวิชา", "วันที่ประเมิน", "อาจารย์ผู้ประเมิน"];
      } else if (currentTab === "Evaluation_Results") {
        rows = allData.evaluationResults || [];
        headers = ["Timestamp", "อาจารย์ผู้ประเมิน", "รหัสนิสิต", "ชื่อนิสิต", "รหัสวิชา", "คะแนนรวม", "ผลประเมิน"];
      }

      // 1. วาดหัวตาราง
      let headHtml = "<tr>";
      headers.forEach(h => headHtml += `<th class="px-4 py-3">${h}</th>`);
      headHtml += `<th class="px-4 py-3 text-center">จัดการ</th></tr>`;
      tableHead.innerHTML = headHtml;

      // 2. วาดเนื้อหาตาราง
      if (rows.length === 0) {
        tableBody.innerHTML = `<tr><td colspan="${headers.length + 1}" class="text-center py-6 text-gray-400">ยังไม่มีข้อมูลในระบบ</td></tr>`;
        return;
      }

      let bodyHtml = "";
      rows.forEach(row => {
        bodyHtml += `<tr class="hover:bg-gray-50 transition border-b border-gray-100">`;
        headers.forEach(h => {
          let cellValue = row[h] || "";
          // ถ้ารายการนั้นเป็น ลิงก์รูปภาพ ให้วาดเป็นแท็ก <img> เพื่อแสดงผล
          if (h === "ลิงก์รูปภาพ" || (typeof cellValue === "string" && cellValue.startsWith("http") && (cellValue.includes("drive.google.com") || cellValue.includes("uc?export")))) {
            bodyHtml += `<td class="px-4 py-2">
              ${cellValue ? `<img src="${cellValue}" class="h-10 w-10 object-cover rounded-full border shadow-sm bg-gray-100 onerror="this.src='https://placehold.co/100x100?text=No+Image'"" />` : `<span class="text-gray-300 text-xs">ไม่มีรูปภาพ</span>`}
            </td>`;
          } else {
            bodyHtml += `<td class="px-4 py-3">${cellValue}</td>`;
          }
        });
        
        // ปุ่มจัดการข้อมูล
        bodyHtml += `<td class="px-4 py-3 text-center space-x-2 whitespace-nowrap">
          <button onclick="openEditModal(${JSON.stringify(row).replace(/"/g, '&quot;')})" class="text-indigo-600 hover:text-indigo-900 transition"><i class="fa-solid fa-pen-to-square"></i> แก้ไข</button>
          <button onclick="deleteRecord(${row._rowNum})" class="text-rose-600 hover:text-rose-900 transition pl-2"><i class="fa-solid fa-trash-can"></i> ลบ</button>
        </td></tr>`;
      });
      tableBody.innerHTML = bodyHtml;
    }

    // 📸 จัดการไฟล์รูปภาพและแปลงเป็น Base64
    function previewImage(event) {
      const file = event.target.files[0];
      if (!file) return;

      base64FileName = file.name;
      base64FileMimeType = file.type;

      const reader = new FileReader();
      reader.onload = function(e) {
        base64FileData = e.target.result.split(",")[1]; // ตัดเอาเฉพาะโค้ดฐานข้อมูลภาพ (Base64)
        
        // แสดงผลภาพตัวอย่างบนหน้าจอ
        document.getElementById("uploadPlaceholder").classList.add("hidden");
        document.getElementById("imagePreviewContainer").classList.remove("hidden");
        document.getElementById("imagePreview").src = e.target.result;
      };
      reader.readAsDataURL(file);
    }

    // เปิดหน้าต่างเพิ่มข้อมูล
    function openAddModal() {
      document.getElementById("modalTitle").innerText = `เพิ่มข้อมูลใหม่ลงใน [${currentTab}]`;
      document.getElementById("formRowNum").value = "";
      document.getElementById("modalForm").reset();
      
      base64FileData = null;
      document.getElementById("uploadPlaceholder").classList.remove("hidden");
      document.getElementById("imagePreviewContainer").classList.add("hidden");

      generateFormFields();
      
      // แสดงปุ่มอัปโหลดรูปภาพเฉพาะเมื่ออยู่ตาราง Student_Profile เท่านั้น
      if (currentTab === "Student_Profile") {
        document.getElementById("imageUploadSection").classList.remove("hidden");
      } else {
        document.getElementById("imageUploadSection").classList.add("hidden");
      }
      
      document.getElementById("dataModal").classList.remove("hidden");
    }

    // เปิดหน้าต่างแก้ไขข้อมูล
    function openEditModal(rowData) {
      document.getElementById("modalTitle").innerText = `แก้ไขข้อมูลแถวที่ ${rowData._rowNum}`;
      document.getElementById("formRowNum").value = rowData._rowNum;
      
      base64FileData = null;
      generateFormFields(rowData);

      if (currentTab === "Student_Profile") {
        document.getElementById("imageUploadSection").classList.remove("hidden");
        if (rowData["ลิงก์รูปภาพ"]) {
          document.getElementById("uploadPlaceholder").classList.add("hidden");
          document.getElementById("imagePreviewContainer").classList.remove("hidden");
          document.getElementById("imagePreview").src = rowData["ลิงก์รูปภาพ"];
        } else {
          document.getElementById("uploadPlaceholder").classList.remove("hidden");
          document.getElementById("imagePreviewContainer").classList.add("hidden");
        }
      } else {
        document.getElementById("imageUploadSection").classList.add("hidden");
      }

      document.getElementById("dataModal").classList.remove("hidden");
    }

    // สร้างช่องรับข้อมูล Form input แบบอัตโนมัติอ้างอิงตามแท็บ
    function generateFormFields(data = null) {
      const container = document.getElementById("formFieldsContainer");
      container.innerHTML = "";
      let fields = [];

      if (currentTab === "Student_Profile") fields = ["รหัสนิสิต", "ชื่อ-สกุล"];
      else if (currentTab === "Main") fields = ["รหัสนิสิต", "ชื่อ-สกุล", "รหัสวิชา", "วันที่ประเมิน", "อาจารย์ผู้ประเมิน"];
      else if (currentTab === "Evaluation_Results") fields = ["อาจารย์ผู้ประเมิน", "รหัสนิสิต", "ชื่อนิสิต", "รหัสวิชา", "คะแนนรวม", "ผลประเมิน"];

      fields.forEach(f => {
        const value = data ? (data[f] || "") : "";
        container.innerHTML += `
          <div>
            <label class="block text-xs font-semibold text-gray-700 mb-1">${f}</label>
            <input type="text" name="${f}" value="${value}" required class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
          </div>
        `;
      });
    }

    // บันทึกฟอร์ม (ส่งข้อมูลก้าวหน้าไปหลังบ้าน)
    async function handleFormSubmit(e) {
      e.preventDefault();
      Swal.fire({ title: 'กำลังบันทึกข้อมูล...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); } });

      const rowNum = document.getElementById("formRowNum").value;
      const formData = new FormData(document.getElementById("modalForm"));
      
      let payload = {
        sheetName: currentTab,
        rowNum: rowNum
      };

      // ดึงข้อมูลจากฟิลด์อินพุตทั้งหมดใส่ใน Payload
      formData.forEach((value, key) => {
        payload[key] = value;
      });

      // ตั้งค่า Action และใส่ข้อมูลไฟล์ Base64 ถ้ามีไฟล์รูปภาพแนบมา
      if (currentTab === "Student_Profile") {
        if (base64FileData) {
          payload.fileData = base64FileData;
          payload.fileName = base64FileName;
          payload.fileMimeType = base64FileMimeType;
        }
        payload.action = rowNum ? "updateAdminRecordWithImage" : "addAdminRecordWithImage";
      } else {
        payload.action = rowNum ? "updateAdminRecord" : "addAdminRecord";
      }

      try {
        // ส่งคำขอเป็นแบบ POST แบบ JSON payload ตามที่หลังบ้านรองรับ
        const response = await fetch(API_URL, {
          method: "POST",
          body: JSON.stringify(payload)
        });
        
        const resJson = await response.json();
        if (resJson.result === "success") {
          Swal.fire("สำเร็จ!", resJson.message || "บันทึกข้อมูลเรียบร้อย", "success");
          closeModal();
          fetchAllData();
        } else {
          Swal.fire("ล้มเหลว", resJson.message || "เกิดข้อผิดพลาดในการบันทึกข้อมูล", "error");
        }
      } catch (err) {
        Swal.fire("เกิดข้อผิดพลาด", "ไม่สามารถส่งข้อมูลไปหลังบ้านได้", "error");
        console.error(err);
      }
    }

    // ลบแถวข้อมูล
    function deleteRecord(rowNum) {
      Swal.fire({
        title: 'ยืนยันการลบข้อมูล?',
        text: `คุณกำลังจะลบข้อมูลแถวที่ ${rowNum} ซึ่งไม่สามารถกู้คืนได้`,
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#e11d48',
        cancelButtonColor: '#4b5563',
        confirmButtonText: 'ใช่, ฉันต้องการลบ!',
        cancelButtonText: 'ยกเลิก'
      }).then(async (result) => {
        if (result.isConfirmed) {
          Swal.fire({ title: 'กำลังดำเนินการลบ...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); } });
          try {
            const response = await fetch(`${API_URL}?action=deleteAdminRecord&sheetName=${currentTab}&rowNum=${rowNum}`);
            const resJson = await response.json();
            if (resJson.result === "success") {
              Swal.fire("ลบสำเร็จ!", "ลบข้อมูลแถวดังกล่าวเรียบร้อยแล้ว", "success");
              fetchAllData();
            } else {
              Swal.fire("เกิดข้อผิดพลาด", resJson.message || "ไม่สามารถลบข้อมูลได้", "error");
            }
          } catch (err) {
            Swal.fire("เชื่อมต่อล้มเหลว", "เกิดปัญหาขึ้นในการส่งคำสั่งลบข้อมูล", "error");
          }
        }
      });
    }

    function closeModal() { document.getElementById("dataModal").classList.add("hidden"); }
    function showLoadingTable() {
      document.getElementById("table-body").innerHTML = `<tr><td colspan="10" class="text-center py-8 text-gray-400"><i class="fa-solid fa-spinner animate-spin text-2xl mb-2"></i><br>ระบบกำลังเรียกข้อมูลล่าสุด...</td></tr>`;
    }
  </script>
</body>
</html>
