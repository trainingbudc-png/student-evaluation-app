<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบแอดมิน - จัดการเกณฑ์แบบประเมิน</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --admin-color: #0f172a;
            --secondary-color: #3b82f6;
            --background-color: #f8fafc;
            --card-background: #ffffff;
        }
        body {
            font-family: 'Sarabun', sans-serif;
            background-color: var(--background-color);
            margin: 0;
            padding: 20px;
        }
        .admin-header {
            background-color: var(--admin-color);
            color: #fff;
            padding: 15px 30px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .main-layout {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 20px;
        }
        @media (max-width: 768px) {
            .main-layout { grid-template-columns: 1fr; }
        }
        .card {
            background: var(--card-background);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        h3 { margin-top: 0; color: var(--admin-color); border-bottom: 2px solid #e2e8f0; padding-bottom: 8px;}
        .topic-item {
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .topic-item:hover { background-color: #f1f5f9; }
        .topic-item.active {
            border-color: var(--secondary-color);
            background-color: #eff6ff;
            font-weight: bold;
        }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 6px; }
        input[type="text"], input[type="number"], textarea {
            width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box;
        }
        .rubric-row {
            background: #f8fafc; padding: 12px; border: 1px solid #e2e8f0; border-radius: 6px; margin-bottom: 10px;
        }
        .rubric-row-header { font-weight: bold; color: var(--secondary-color); margin-bottom: 8px; }
        .btn {
            padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold;
        }
        .btn-primary { background-color: var(--secondary-color); color: #fff; width: 100%; padding: 12px; }
        .btn-add { background-color: #10b981; color: white; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="admin-header">
    <h2 style="margin:0;">⚙️ ระบบแอดมิน: จัดการหัวข้อและเกณฑ์การประเมิน</h2>
    <span>ศูนย์แพทยศาสตรศึกษาชั้นคลินิก</span>
</div>

<div class="main-layout">
    <div class="card">
        <h3>1. เลือกหัวข้อที่ต้องการแก้ไข</h3>
        <button class="btn btn-add" onclick="createNewTopic()">＋ เพิ่มหัวข้อประเมินใหม่</button>
        <div id="topicList">กำลังโหลดหัวข้อจาก Google Sheets...</div>
    </div>

    <div class="card" id="formCard" style="display:none;">
        <h3>2. แก้ไขข้อมูลหัวข้อและระดับคะแนน (Rubric)</h3>
        <form id="criteriaForm">
            <div class="form-group">
                <label>ชื่อหัวข้อการประเมิน</label>
                <input type="text" id="editTopicName" required placeholder="ตัวอย่าง: 1. ความรู้ทางคลินิก">
            </div>

            <div id="rubricsContainer">
                </div>

            <button type="submit" class="btn btn-primary">💾 บันทึกการเปลี่ยนแปลงลง Google Sheets</button>
        </form>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycby-NJ261ieZ5r37krHBdcK4dbJmxD0ZYhapsrgmBKtZorzjVPGAi643QrBWc72GHVEY/exec";
    let rawFormDatabase = []; // เก็บเกณฑ์ดิบทั้งหมดจากชีต
    let uniqueTopics = [];    // เก็บท็อปปิกเดี่ยวๆ

    window.addEventListener("DOMContentLoaded", fetchFormCriteria);

    // ดึงข้อมูลเกณฑ์ทั้งหมดจากแท็บ Form บน Google Sheets
    async function fetchFormCriteria() {
        try {
            const response = await fetch(`${API_URL}?action=getFormCriteria`);
            rawFormDatabase = await response.json();
            
            // กรองหาชื่อหัวข้อประเมินแบบไม่ซ้ำ
            uniqueTopics = [...new Set(rawFormDatabase.map(item => item.topic))];
            renderTopicList();
        } catch (error) {
            document.getElementById("topicList").innerHTML = "❌ โหลดข้อมูลล้มเหลว กรุณาเช็กการ Deploy หลังบ้าน";
        }
    }

    // แสดงรายชื่อหัวข้อในเมนูฝั่งซ้าย
    function renderTopicList() {
        const container = document.getElementById("topicList");
        container.innerHTML = "";
        uniqueTopics.forEach(topic => {
            const div = document.createElement("div");
            div.className = "topic-item";
            div.innerText = topic;
            div.onclick = () => selectTopic(topic, div);
            container.appendChild(div);
        });
    }

    // เมื่อกดคลิกเลือกหัวข้อทางซ้าย ให้ดึงเกณฑ์ย่อยมาโชว์ที่ฟอร์มทางขวา
    function selectTopic(topicName, element) {
        document.querySelectorAll(".topic-item").forEach(el => el.classList.remove("active"));
        if(element) element.classList.add("active");

        document.getElementById("editTopicName").value = topicName;
        const container = document.getElementById("rubricsContainer");
        container.innerHTML = "";

        // ดึงเฉพาะรูบริคย่อย 5 ระดับ (ดีมาก - N/A) ของข้อที่เลือก
        const subItems = rawFormDatabase.filter(item => item.topic === topicName);
        
        // ถ้าราการในชีตมีไม่ครบ 5 ระดับ จะเมคสล็อตให้ครบอัตโนมัติ
        const levels = ["ดีมาก", "ดี", "พอใช้", "ควรปรับปรุง", "N/A"];
        levels.forEach(lvl => {
            const exist = subItems.find(s => s.level === lvl) || { rowNum: "", level: lvl, score: "", detail: "" };
            addRubricRow(exist);
        });

        document.getElementById("formCard").style.display = "block";
    }

    // สร้างกล่องกรอกข้อมูลแต่ละระดับความสามารถ (ดีมาก, ดี, พอใช้, ควรปรับปรุง, N/A)
    function addRubricRow(item) {
        const container = document.getElementById("rubricsContainer");
        const div = document.createElement("div");
        div.className = "rubric-row";
        div.innerHTML = `
            <input type="hidden" class="row-num" value="${item.rowNum}">
            <input type="hidden" class="level-name" value="${item.level}">
            <div class="rubric-row-header">ระดับ: ${item.level}</div>
            <div style="display: grid; grid-template-columns: 100px 1fr; gap: 10px;">
                <div>
                    <label>คะแนนเต็ม</label>
                    <input type="number" class="level-score" value="${item.score}" placeholder="${item.level === 'N/A' ? 'ไม่คิด' : 'แต้ม'}" ${item.level === 'N/A' ? 'disabled' : ''}>
                </div>
                <div>
                    <label>คำอธิบายเกณฑ์ (รูบริค)</label>
                    <textarea class="level-detail" rows="2" placeholder="กรอกรายละเอียดความหมายเกณฑ์สำหรับระดับนี้">${item.detail}</textarea>
                </div>
            </div>
        `;
        container.appendChild(div);
    }

    // ปุ่มสร้างข้อหัวข้อประเมินใหม่
    function createNewTopic() {
        document.querySelectorAll(".topic-item").forEach(el => el.classList.remove("active"));
        document.getElementById("editTopicName").value = "";
        const container = document.getElementById("rubricsContainer");
        container.innerHTML = "";
        
        const levels = ["ดีมาก", "ดี", "พอใช้", "ควรปรับปรุง", "N/A"];
        levels.forEach(lvl => {
            addRubricRow({ rowNum: "", level: lvl, score: "", detail: "" });
        });
        document.getElementById("formCard").style.display = "block";
        document.getElementById("editTopicName").focus();
    }

    // บันทึกกลับไปที่ Excel
    document.getElementById("criteriaForm").addEventListener("submit", async function(e) {
        e.preventDefault();
        
        Swal.fire({ title: 'กำลังอัปเดตข้อมูลเกณฑ์...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); } });

        const topicName = document.getElementById("editTopicName").value;
        const rubricRows = document.querySelectorAll(".rubric-row");
        const rubricsPayload = [];

        rubricRows.forEach(row => {
            rubricsPayload.push({
                rowNum: row.querySelector(".row-num").value,
                level: row.querySelector(".level-name").value,
                score: row.querySelector(".level-score").value,
                detail: row.querySelector(".level-detail").value
            });
        });

        const payload = {
            action: "updateFormCriteria",
            topic: topicName,
            rubrics: rubricsPayload
        };

        try {
            const response = await fetch(API_URL, { method: "POST", body: JSON.stringify(payload) });
            const result = await response.json();
            if(result.result === "success") {
                Swal.fire("สำเร็จ", "อัปเดตเกณฑ์ประเมินลง Google Sheets เรียบร้อยแล้ว ข้อความบนหน้าเว็บอาจารย์จะเปลี่ยนตามทันทีครับ", "success");
                fetchFormCriteria(); // รีโหลดข้อมูลใหม่
            } else {
                Swal.fire("เกิดข้อผิดพลาด", "ไม่สามารถบันทึกได้", "error");
            }
        } catch (error) {
            Swal.fire("ผิดพลาด", "การเชื่อมต่อล้มเหลว", "error");
        }
    });
</script>
</body>
</html>
