<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบประเมินผลนิสิต - สำหรับอาจารย์</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f6f9; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #0070f3; margin-bottom: 25px; }
        .form-group { margin-bottom: 20px; }
        label { font-weight: bold; display: block; margin-bottom: 8px; }
        select, input[type="text"] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 12px; background: #0070f3; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; font-weight: bold; transition: background 0.2s; }
        button:hover { background: #0051b3; }
        .student-card { background: #f9f9f9; padding: 15px; border: 1px solid #e0e0e0; border-radius: 4px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .evaluate-zone { margin-top: 20px; padding: 20px; border-top: 2px dashed #0070f3; display: none; }
        .rating-group { margin-bottom: 15px; }
        .radio-options { display: flex; gap: 15px; margin-top: 5px; }
        .status-msg { text-align: center; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h2>👨‍🏫 หน้าต่างประเมินผลสำหรับอาจารย์</h2>
    
    <div class="form-group">
        <label>ชื่ออาจารย์ผู้ประเมิน:</label>
        <input type="text" id="teacherName" placeholder="กรอกชื่อ-นามสกุลของอาจารย์">
    </div>

    <div class="form-group">
        <label>เลือกวิชาที่ต้องการประเมิน:</label>
        <select id="subjectSelect" onchange="fetchStudents()">
            <option value="">-- กรุณาเลือกวิชา --</option>
            <option value="CS101">CS101 - Introduction to Computer Science</option>
            <option value="CS102">CS102 - Web Programming</option>
        </select>
    </div>

    <div id="studentSection" style="margin-top: 25px;">
        <label>รายชื่อนิสิตในวิชา:</label>
        <div id="studentList">
            <p style="color: #666; text-align: center;">กรุณาเลือกวิชาเพื่อโหลดรายชื่อนิสิต</p>
        </div>
    </div>

    <div id="evaluationZone" class="evaluate-zone">
        <h3 id="targetStudentTitle" style="color: #333; margin-top: 0;">ประเมินนิสิต: -</h3>
        
        <div class="rating-group">
            <label>1. ความตั้งใจและการมีส่วนร่วมในชั้นเรียน</label>
            <div class="radio-options">
                <label><input type="radio" name="q1" value="5"> 5 (ดีมาก)</label>
                <label><input type="radio" name="q1" value="4"> 4</label>
                <label><input type="radio" name="q1" value="3"> 3</label>
                <label><input type="radio" name="q1" value="2"> 2</label>
                <label><input type="radio" name="q1" value="1"> 1 (ปรับปรุง)</label>
            </div>
        </div>

        <div class="rating-group">
            <label>2. การส่งงานตรงเวลาและความถูกต้องของเนื้อหา</label>
            <div class="radio-options">
                <label><input type="radio" name="q2" value="5"> 5</label>
                <label><input type="radio" name="q2" value="4"> 4</label>
                <label><input type="radio" name="q2" value="3"> 3</label>
                <label><input type="radio" name="q2" value="2"> 2</label>
                <label><input type="radio" name="q2" value="1"> 1</label>
            </div>
        </div>

        <div class="rating-group">
            <label>3. ทักษะการคิดวิเคราะห์และการแก้ปัญหา</label>
            <div class="radio-options">
                <label><input type="radio" name="q3" value="5"> 5</label>
                <label><input type="radio" name="q3" value="4"> 4</label>
                <label><input type="radio" name="q3" value="3"> 3</label>
                <label><input type="radio" name="q3" value="2"> 2</label>
                <label><input type="radio" name="q3" value="1"> 1</label>
            </div>
        </div>

        <button onclick="submitEvaluation()">💾 บันทึกผลการประเมิน</button>
    </div>

    <div id="statusMsg" class="status-msg"></div>
</div>

<script>
    // URL Web App ของคุณที่ส่งมา
    const API_URL = "https://script.google.com/macros/s/AKfycby-NJ261ieZ5r37krHBdcK4dbJmxD0ZYhapsrgmBKtZorzjVPGAi643QrBWc72GHVEY/exec"; 
    
    let selectedStudentId = "";
    let selectedStudentName = "";

    // ฟังก์ชันดึงรายชื่อนิสิตตามวิชาที่เลือก
    async function fetchStudents() {
        const subjectCode = document.getElementById('subjectSelect').value;
        const studentListDiv = document.getElementById('studentList');
        document.getElementById('evaluationZone').style.display = 'none'; // ซ่อนฟอร์มเก่าก่อน
        
        if (!subjectCode) {
            studentListDiv.innerHTML = '<p style="color: #666; text-align: center;">กรุณาเลือกวิชาเพื่อโหลดรายชื่อนิสิต</p>';
            return;
        }

        studentListDiv.innerHTML = '<p style="text-align: center;">กำลังโหลดรายชื่อนิสิต...</p>';

        try {
            const response = await fetch(`${API_URL}?action=getStudentsBySubject&subjectCode=${subjectCode}`);
            const students = await response.json();
            
            if (students.length === 0) {
                studentListDiv.innerHTML = '<p style="color: red; text-align: center;">ไม่พบรายชื่อนิสิตในวิชานี้</p>';
                return;
            }

            studentListDiv.innerHTML = '';
            students.forEach(std => {
                const card = document.createElement('div');
                card.className = 'student-card';
                card.innerHTML = `
                    <div>
                        <strong>${std.studentId}</strong> - ${std.studentName}
                    </div>
                    <button style="width: auto; padding: 6px 12px; font-size: 14px;" onclick="openEvaluateForm('${std.studentId}', '${std.studentName}')">ประเมิน</button>
                `;
                studentListDiv.appendChild(card);
            });
        } catch (error) {
            studentListDiv.innerHTML = '<p style="color: red; text-align: center;">เกิดข้อผิดพลาดในการดึงข้อมูล</p>';
        }
    }

    // ฟังก์ชันเปิดฟอร์มให้คะแนนนิสิตที่เลือก
    function openEvaluateForm(id, name) {
        selectedStudentId = id;
        selectedStudentName = name;
        document.getElementById('targetStudentTitle').innerText = `ประเมินนิสิต: ${id} - ${name}`;
        document.getElementById('evaluationZone').style.display = 'block';
        document.getElementById('statusMsg').innerText = '';
        
        // รีเซ็ตคะแนนเก่า (ถ้ามี)
        const radios = document.querySelectorAll('input[type="radio"]');
        radios.forEach(radio => radio.checked = false);
    }

    // ฟังก์ชันส่งข้อมูลประเมินไปบันทึกที่ Google Sheets
    async function submitEvaluation() {
        const teacherName = document.getElementById('teacherName').value.trim();
        const subjectCode = document.getElementById('subjectSelect').value;
        const statusMsg = document.getElementById('statusMsg');

        if (!teacherName) {
            alert('กรุณากรอกชื่ออาจารย์ผู้ประเมินก่อนครับ');
            return;
        }

        // ดึงคะแนนวิเคราะห์จากวิทยุ (Radio buttons)
        const q1 = document.querySelector('input[name="q1"]:checked')?.value;
        const q2 = document.querySelector('input[name="q2"]:checked')?.value;
        const q3 = document.querySelector('input[name="q3"]:checked')?.value;

        if (!q1 || !q2 || !q3) {
            alert('กรุณาเลือกคะแนนประเมินให้ครบทุกข้อครับ');
            return;
        }

        statusMsg.style.color = '#333';
        statusMsg.innerText = 'กำลังบันทึกข้อมูล...';

        const payload = {
            action: "submitEvaluation",
            teacherName: teacherName,
            subjectCode: subjectCode,
            studentId: selectedStudentId,
            score1: q1,
            score2: q2,
            score3: q3
        };

        try {
            // ส่งข้อมูลแบบ POST ไปที่ Apps Script URL
            const response = await fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify(payload)
            });
            const result = await response.json();

            if (result.result === "success") {
                statusMsg.style.color = 'green';
                statusMsg.innerText = `🟢 บันทึกผลประเมินของ ${selectedStudentName} สำเร็จ!`;
                document.getElementById('evaluationZone').style.display = 'none';
            } else {
                statusMsg.style.color = 'red';
                statusMsg.innerText = '🔴 เกิดข้อผิดพลาดจากระบบหลังบ้าน ไม่สามารถบันทึกได้';
            }
        } catch (error) {
            statusMsg.style.color = 'red';
            statusMsg.innerText = '🔴 เกิดข้อผิดพลาดในการเชื่อมต่อเครือข่าย';
        }
    }
</script>
</body>
</html>
