<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แบบประเมินการปฏิบัติงานนิสิตแพทย์ - สำหรับอาจารย์</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --primary-color: #1e3a8a;
            --secondary-color: #3b82f6;
            --background-color: #f3f4f6;
            --card-background: #ffffff;
            --text-color: #1f2937;
        }
        body {
            font-family: 'Sarabun', sans-serif;
            background-color: var(--background-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: var(--card-background);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        h2, h3 {
            color: var(--primary-color);
            text-align: center;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
        }
        select, input[type="text"], textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
        }
        .student-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 12px;
            margin-top: 10px;
        }
        .student-card {
            padding: 15px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            background: #fff;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s ease;
        }
        .student-card:hover { border-color: var(--secondary-color); background-color: #eff6ff; }
        .student-card.selected {
            border-color: #10b981; background-color: #ecfdf5; font-weight: bold; box-shadow: 0 0 8px rgba(16, 185, 129, 0.3);
        }
        .student-card .id { font-size: 14px; color: #6b7280; margin-bottom: 4px; }
        .student-card .status-badge { font-size: 12px; margin-top: 6px; display: inline-block; padding: 2px 8px; border-radius: 12px; background: #f3f4f6; }
        .student-card.evaluated { opacity: 0.6; background: #f9fafb; }

        /* ส่วนของรูบริคแบบไดนามิก */
        .rubric-card {
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            background-color: #f9fafb;
        }
        .rubric-title {
            font-size: 18px;
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 12px;
            border-bottom: 2px solid var(--secondary-color);
            padding-bottom: 5px;
        }
        .radio-group { display: flex; flex-direction: column; gap: 10px; }
        .radio-option {
            display: flex; align-items: flex-start; gap: 10px; padding: 10px; border: 1px solid #e5e7eb; border-radius: 6px; background: #fff; cursor: pointer;
        }
        .radio-option:hover { background-color: #eff6ff; }
        .score-badge { font-weight: bold; color: var(--secondary-color); margin-left: auto; white-space: nowrap; }
        .btn-submit {
            background-color: var(--primary-color); color: #fff; padding: 14px; border: none; border-radius: 6px; font-size: 18px; cursor: pointer; width: 100%; font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>แบบประเมินการปฏิบัติงานของนิสิตแพทย์ ชั้นปีที่ 6</h2>
    <hr style="border: 0; border-top: 1px solid #e5e7eb; margin: 20px 0;">

    <form id="evaluationForm">
        <div class="form-group">
            <label for="teacherName">ชื่อ-สกุล อาจารย์ผู้ประเมิน</label>
            <input type="text" id="teacherName" required placeholder="กรุณากรอกชื่อ-นามสกุลของท่าน">
        </div>

        <div class="form-group">
            <label for="subjectCode">รายวิชาเลือกเสรี</label>
            <select id="subjectCode" required onchange="loadStudents()">
                <option value="">-- กำลังโหลดรายวิชา... --</option>
            </select>
        </div>

        <div class="form-group">
            <label>คลิกเลือกรายชื่อนิสิตแพทย์ที่ต้องการประเมิน</label>
            <div id="studentContainer" class="student-grid">
                <p style="color: #6b7280;">(กรุณาเลือกวิชาเลือกเสรีด้านบนก่อน)</p>
            </div>
            <input type="hidden" id="selectedStudentId" required>
            <input type="hidden" id="selectedStudentName" required>
        </div>

        <div class="form-group">
            <label for="workTime">เวลาฝึกปฏิบัติงาน</label>
            <select id="workTime" required>
                <option value="ครบ">ครบ</option>
                <option value="ไม่ครบ">ไม่ครบ</option>
            </select>
        </div>

        <h3>หัวข้อการประเมิน (ดึงเกณฑ์จากระบบอัตโนมัติ)</h3>
        
        <div id="dynamicRubricsContainer">กำลังโหลดหัวข้อประเมินล่าสุด...</div>

        <div class="form-group" style="margin-top: 20px;">
            <label for="comment">ความคิดเห็นเพิ่มเติม</label>
            <textarea id="comment" rows="4" placeholder="ระบุจุดเด่นหรือจุดที่ควรพัฒนาเพิ่มเติม"></textarea>
        </div>

        <button type="submit" class="btn-submit">ส่งผลการประเมิน</button>
    </form>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycby-NJ261ieZ5r37krHBdcK4dbJmxD0ZYhapsrgmBKtZorzjVPGAi643QrBWc72GHVEY/exec";
    let activeTopics = []; // เก็บรายชื่อหัวข้อทั้งหมดที่ดึงมาจากชีต

    window.addEventListener("DOMContentLoaded", () => {
        loadSubjects();
        loadDynamicRubrics();
    });

    // 1. ดึงรายวิชา
    async function loadSubjects() {
        const select = document.getElementById("subjectCode");
        try {
            const response = await fetch(`${API_URL}?action=getSubjects`);
            const subjects = await response.json();
            select.innerHTML = '<option value="">-- เลือกรายวิชาเลือกเสรี --</option>';
            subjects.forEach(sub => { select.innerHTML += `<option value="${sub.code}">${sub.code} - ${sub.name}</option>`; });
        } catch (error) { select.innerHTML = '<option value="">❌ เกิดข้อผิดพลาดในการโหลดวิชา</option>'; }
    }

    // 2. ดึงรายชื่อนิสิตแบบการ์ด
    async function loadStudents() {
        const subjectCode = document.getElementById("subjectCode").value;
        const container = document.getElementById("studentContainer");
        document.getElementById("selectedStudentId").value = "";
        document.getElementById("selectedStudentName").value = "";

        if (!subjectCode) {
            container.innerHTML = '<p style="color: #6b7280;">(กรุณาเลือกวิชาเลือกเสรีด้านบนก่อน)</p>';
            return;
        }
        container.innerHTML = '<p>กำลังโหลดรายชื่อนิสิต...</p>';

        try {
            const response = await fetch(`${API_URL}?action=getStudentsBySubject&subjectCode=${subjectCode}`);
            const students = await response.json();
            if (students.length === 0) {
                container.innerHTML = '<p style="color: red; font-weight: bold;">❌ ไม่พบนิสิตในวิชานี้</p>';
                return;
            }
            container.innerHTML = "";
            students.forEach(std => {
                const isEvaluated = std.status === "ประเมินแล้ว";
                const card = document.createElement("div");
                card.className = `student-card ${isEvaluated ? 'evaluated' : ''}`;
                card.innerHTML = `
                    <div class="id">${std.studentId}</div>
                    <div class="name">${std.studentName}</div>
                    <div class="status-badge" style="color: ${isEvaluated ? '#10b981' : '#6b7280'}">${std.status}</div>
                `;
                card.addEventListener("click", () => {
                    document.querySelectorAll(".student-card").forEach(c => c.classList.remove("selected"));
                    card.classList.add("selected");
                    document.getElementById("selectedStudentId").value = std.studentId;
                    document.getElementById("selectedStudentName").value = std.studentName;
                });
                container.appendChild(card);
            });
        } catch (error) { container.innerHTML = '<p style="color: red;">เกิดข้อผิดพลาดในการดึงข้อมูล</p>'; }
    }

    // 3. 🌟 ดึงเกณฑ์ประเมินจากชีต Form มาสร้างหน้าเว็บให้อัตโนมัติ 🌟
    async function loadDynamicRubrics() {
        const container = document.getElementById("dynamicRubricsContainer");
        try {
            const response = await fetch(`${API_URL}?action=getFormCriteria`);
            const criteria = await response.json();
            
            // หาหัวข้อหลักทั้งหมดแบบไม่ซ้ำ
            activeTopics = [...new Set(criteria.map(item => item.topic))];
            container.innerHTML = "";

            // วนลูปสร้างกล่องคำถามแต่ละข้อ
            activeTopics.forEach((topic, index) => {
                const qNum = index + 1;
                const subItems = criteria.filter(item => item.topic === topic);
                
                const card = document.createElement("div");
                card.className = "rubric-card";
                
                let html = `<div class="rubric-title">${topic}</div>`;
                html += `<div class="radio-group">`;
                
                subItems.forEach(item => {
                    const isNA = item.level === "N/A" || item.score === "" || item.score === null;
                    const displayScore = isNA ? "ไม่คิดคะแนน" : `${item.score} คะแนน`;
                    const scoreVal = isNA ? "NA" : item.score;
                    const badgeColor = isNA ? "#9ca3af" : "var(--secondary-color)";

                    html += `
                        <label class="radio-option">
                            <input type="radio" name="q_${qNum}" value="${scoreVal}" required>
                            <span><strong>${item.level}:</strong> ${item.detail}</span>
                            <span class="score-badge" style="color: ${badgeColor}">(${displayScore})</span>
                        </label>
                    `;
                });
                
                html += `</div>`;
                card.innerHTML = html;
                container.appendChild(card);
            });
        } catch (error) {
            container.innerHTML = "<p style="color:red;">❌ ไม่สามารถโหลดหัวข้อประเมินจาก Google Sheets ได้</p>";
        }
    }

    // 4. ส่งผลการประเมิน
    document.getElementById("evaluationForm").addEventListener("submit", async function(e) {
        e.preventDefault();
        const studentId = document.getElementById("selectedStudentId").value;
        const studentName = document.getElementById("selectedStudentName").value;

        if (!studentId) {
            Swal.fire("แจ้งเตือน", "กรุณาคลิกเลือกนิสิตแพทย์ที่ต้องการประเมินก่อนครับ", "warning");
            return;
        }

        Swal.fire({
            title: 'ยืนยันการบันทึก?',
            text: `ต้องการส่งผลประเมินของ ${studentName}`,
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#1e3a8a',
            confirmButtonText: 'ยืนยัน',
            cancelButtonText: 'ยกเลิก'
        }).then(async (result) => {
            if (result.isConfirmed) {
                Swal.fire({ title: 'กำลังบันทึก...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); } });

                // รวบรวมคะแนนจากทุกข้อที่มีการเลือกแบบไดนามิก
                const payload = {
                    action: "submitEvaluation",
                    teacherName: document.getElementById("teacherName").value,
                    subjectCode: document.getElementById("subjectCode").value,
                    studentId: studentId,
                    studentName: studentName,
                    workTime: document.getElementById("workTime").value,
                    comment: document.getElementById("comment").value
                };

                // วนลูปอ่านค่าวิทยุตามจำนวนข้อที่มีจริงในระบบ
                activeTopics.forEach((topic, index) => {
                    const qNum = index + 1;
                    const selectedRadio = document.querySelector(`input[name="q_${qNum}"]:checked`);
                    payload[`score${qNum}`] = selectedRadio ? selectedRadio.value : "NA";
                });

                try {
                    const response = await fetch(API_URL, { method: "POST", body: JSON.stringify(payload) });
                    const resData = await response.json();
                    if (resData.result === "success") {
                        Swal.fire("สำเร็จ!", "บันทึกข้อมูลเรียบร้อยแล้ว", "success");
                        loadStudents(); // รีโหลดสถานะรายชื่อนิสิต
                        document.getElementById("comment").value = "";
                        // เคลียร์ค่าวิทยุทั้งหมด
                        document.querySelectorAll('input[type="radio"]').forEach(r => r.checked = false);
                    } else { Swal.fire("ล้มเหลว", "เกิดข้อผิดพลาด", "error"); }
                } catch (error) { Swal.fire("ผิดพลาด", "ไม่สามารถเชื่อมต่อระบบได้", "error"); }
            }
        });
    });
</script>
</body>
</html>
