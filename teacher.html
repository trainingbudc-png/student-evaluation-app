<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แบบประเมินการปฏิบัติงานนิสิตแพทย์ - สำหรับอาจารย์</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --primary-color: #1e3a8a;
            --secondary-color: #3b82f6;
            --background-color: #f3f4f6;
            --card-background: #ffffff;
            --text-color: #1f2937;
        }
        body {
            font-family: 'Sarabun', sans-serif;
            background-color: var(--background-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: var(--card-background);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        h2, h3 {
            color: var(--primary-color);
            text-align: center;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
        }
        select, input[type="text"], textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
        }
        /* ดีไซน์ปุ่มเลือกนิสิตแบบคลิกเลือกทันที */
        .student-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 12px;
            margin-top: 10px;
        }
        .student-card {
            padding: 15px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            background: #fff;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s ease;
        }
        .student-card:hover {
            border-color: var(--secondary-color);
            background-color: #eff6ff;
        }
        .student-card.selected {
            border-color: #10b981;
            background-color: #ecfdf5;
            font-weight: bold;
            box-shadow: 0 0 8px rgba(16, 185, 129, 0.3);
        }
        .student-card .id {
            font-size: 14px;
            color: #6b7280;
            margin-bottom: 4px;
        }
        .student-card .name {
            font-size: 16px;
        }
        .student-card .status-badge {
            font-size: 12px;
            margin-top: 6px;
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            background: #f3f4f6;
        }
        .student-card.evaluated {
            opacity: 0.6;
            background: #f9fafb;
        }

        /* ส่วนของเกณฑ์ Rubric */
        .rubric-card {
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            background-color: #f9fafb;
        }
        .rubric-title {
            font-size: 18px;
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 12px;
            border-bottom: 2px solid var(--secondary-color);
            padding-bottom: 5px;
        }
        .radio-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .radio-option {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 10px;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            background: #fff;
            cursor: pointer;
        }
        .radio-option:hover {
            background-color: #eff6ff;
        }
        .score-badge {
            font-weight: bold;
            color: var(--secondary-color);
            margin-left: auto;
        }
        .btn-submit {
            background-color: var(--primary-color);
            color: #fff;
            padding: 14px;
            border: none;
            border-radius: 6px;
            font-size: 18px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>แบบประเมินการปฏิบัติงานของนิสิตแพทย์ ชั้นปีที่ 6</h2>
    <hr style="border: 0; border-top: 1px solid #e5e7eb; margin: 20px 0;">

    <form id="evaluationForm">
        <div class="form-group">
            <label for="teacherName">ชื่อ-สกุล อาจารย์ผู้ประเมิน</label>
            <input type="text" id="teacherName" required placeholder="กรุณากรอกชื่อ-นามสกุลของท่าน">
        </div>

        <div class="form-group">
            <label for="subjectCode">รายวิชาเลือกเสรี (ดึงข้อมูลอัตโนมัติ)</label>
            <select id="subjectCode" required onchange="loadStudents()">
                <option value="">-- กำลังโหลดรายวิชาจากฐานข้อมูล... --</option>
            </select>
        </div>

        <div class="form-group">
            <label>คลิกเลือกรายชื่อนิสิตแพทย์ที่ต้องการประเมินได้เลย</label>
            <div id="studentContainer" class="student-grid">
                <p style="color: #6b7280;">(กรุณาเลือกวิชาเลือกเสรีด้านบนก่อน)</p>
            </div>
            <input type="hidden" id="selectedStudentId" required>
            <input type="hidden" id="selectedStudentName" required>
        </div>

        <div class="form-group">
            <label for="workTime">เวลาฝึกปฏิบัติงาน</label>
            <select id="workTime" required>
                <option value="ครบ">ครบ</option>
                <option value="ไม่ครบ">ไม่ครบ</option>
            </select>
        </div>

        <h3>หัวข้อการประเมิน (Rubric Assessment)</h3>

        <div class="rubric-card">
            <div class="rubric-title">1. ความรู้</div>
            <div class="radio-group">
                <label class="radio-option"><input type="radio" name="q1" value="20" required> <span>ดีมาก: มีความรู้และสามารถอภิปรายและนำความรู้ไปใช้ทางคลินิกได้ดีมาก</span> <span class="score-badge">(20 คะแนน)</span></label>
                <label class="radio-option"><input type="radio" name="q1" value="15"> <span>ดี: มีความรู้ อภิปรายและนำความรู้ไปใช้ทางคลินิกได้ดี</span> <span class="score-badge">(15 คะแนน)</span></label>
                <label class="radio-option"><input type="radio" name="q1" value="10"> <span>พอใช้: มีความรู้บ้าง การประยุกต์ความรู้ในการดูแลผู้ป่วยดีพอควร</span> <span class="score-badge">(10 คะแนน)</span></label>
                <label class="radio-option"><input type="radio" name="q1" value="5"> <span>ควรปรับปรุง: ขาดความรู้ที่สำคัญ ประยุกต์ใช้ทางคลินิกได้น้อย ต้องการคำชี้แนะ</span> <span class="score-badge">(5 คะแนน)</span></label>
                <label class="radio-option"><input type="radio" name="q1" value="NA"> <span>N/A: ไม่มีข้อมูล / ไม่สามารถประเมินได้</span> <span class="score-badge" style="color:#9ca3af;">(ไม่คิดคะแนน)</span></label>
            </div>
        </div>

        <div class="rubric-card">
            <div class="rubric-title">2. ทักษะทางคลินิก (การซักประวัติ ตรวจร่างกาย หัตถการ)</div>
            <div class="radio-group">
                <label class="radio-option"><input type="radio" name="q2" value="20" required> <span>ดีมาก: มีทักษะในทางคลินิกครบถ้วน</span> <span class="score-badge">(20 คะแนน)</span></label>
                <label class="radio-option"><input type="radio" name="q2" value="15"> <span>ดี: มีทักษะในทางคลินิกในเกณฑ์ดี</span> <span class="score-badge">(15 คะแนน)</span></label>
                <label class="radio-option"><input type="radio" name="q2" value="10"> <span>พอใช้: ยังขาดทักษะในทางคลินิกในบางด้าน</span> <span class="score-badge">(10 คะแนน)</span></label>
                <label class="radio-option"><input type="radio" name="q2" value="5"> <span>ควรปรับปรุง: มีทักษะด้านคลินิกน้อยมากไม่สามารถนำมาใช้ในการวินิจฉัยและดูแลผู้ป่วยได้</span> <span class="score-badge">(5 คะแนน)</span></label>
                <label class="radio-option"><input type="radio" name="q2" value="NA"> <span>N/A: ไม่มีข้อมูล / ไม่สามารถประเมินได้</span> <span class="score-badge" style="color:#9ca3af;">(ไม่คิดคะแนน)</span></label>
            </div>
        </div>

        <div class="rubric-card">
            <div class="rubric-title">3. การเรียนรู้ด้วยตนเอง</div>
            <div class="radio-group">
                <label class="radio-option"><input type="radio" name="q3" value="15" required> <span>ดีมาก: มีความกระตือรือร้นในการเรียนรู้ ค้นคว้าข้อมูลที่ทันสมัยมาใช้พัฒนาตนเองอย่างสม่ำเสมอ</span> <span class="score-badge">(15 คะแนน)</span></label>
                <label class="radio-option"><input type="radio" name="q3" value="12"> <span>ดี: มีความสนใจใฝ่รู้ ค้นคว้าข้อมูลเพิ่มเติมเพื่อตอบคำถามทางคลินิกได้เหมาะสม</span> <span class="score-badge">(12 คะแนน)</span></label>
                <label class="radio-option"><input type="radio" name="q3" value="7"> <span>พอใช้: แสวงหาความรู้เมื่อได้รับมอบหมายหรือกระตุ้นจากอาจารย์</span> <span class="score-badge">(7 คะแนน)</span></label>
                <label class="radio-option"><input type="radio" name="q3" value="5"> <span>ควรปรับปรุง: ไม่มีความกระตือรือร้น ละเลยงานที่มอบหมาย ขาดการพัฒนาตนเอง</span> <span class="score-badge">(5 คะแนน)</span></label>
                <label class="radio-option"><input type="radio" name="q3" value="NA"> <span>N/A: ไม่มีข้อมูล / ไม่สามารถประเมินได้</span> <span class="score-badge" style="color:#9ca3af;">(ไม่คิดคะแนน)</span></label>
            </div>
        </div>

        <div class="rubric-card">
            <div class="rubric-title">4. การสื่อสารและมนุษยสัมพันธ์</div>
            <div class="radio-group">
                <label class="radio-option"><input type="radio" name="q4" value="15" required> <span>ดีมาก: สื่อสารมีประสิทธิภาพ สุภาพ นุ่มนวล ชัดเจน วาจา และ มีมนุษยสัมพันธ์ เป็นที่ชื่นชมของบุคลากร ผู้ป่วย และญาติผู้ป่วย</span> <span class="score-badge">(15 คะแนน)</span></label>
                <label class="radio-option"><input type="radio" name="q4" value="12"> <span>ดี: มีทักษะในการสื่อสารดี มนุษยสัมพันธ์ที่ดีกับบุคลากรผู้ป่วย และญาติผู้ป่วย</span> <span class="score-badge">(12 คะแนน)</span></label>
                <label class="radio-option"><input type="radio" name="q4" value="7"> <span>พอใช้: สามารถทำงานได้กับบุคลากรอาจประสบปัญหาบ้างในการสื่อสารกับผู้ป่วยหรือญาติผู้ป่วยในบางครั้ง</span> <span class="score-badge">(7 คะแนน)</span></label>
                <label class="radio-option"><input type="radio" name="q4" value="5"> <span>ควรปรับปรุง: มีปัญหาในการทำงานกับบุคลากรอื่นและ ขาดทักษะพื้นฐานในการสื่อสารกับผู้ป่วย และญาติผู้ป่วย</span> <span class="score-badge">(5 คะแนน)</span></label>
                <label class="radio-option"><input type="radio" name="q4" value="NA"> <span>N/A: ไม่มีข้อมูล / ไม่สามารถประเมินได้</span> <span class="score-badge" style="color:#9ca3af;">(ไม่คิดคะแนน)</span></label>
            </div>
        </div>

        <div class="rubric-card">
            <div class="rubric-title">5. ความรับผิดชอบ</div>
            <div class="radio-group">
                <label class="radio-option"><input type="radio" name="q5" value="15" required> <span>ดีมาก: มีความรับผิดชอบดีมาก มักทำหน้าที่ต่างๆ ที่อยู่ในความรับผิดชอบของตนได้ดีเกินความคาดหมาย</span> <span class="score-badge">(15 คะแนน)</span></label>
                <label class="radio-option"><input type="radio" name="q5" value="12"> <span>ดี: มีความรับผิดชอบดี ดูแลงานในความรับผิดชอบของตนได้ตามความคาดหมาย</span> <span class="score-badge">(12 คะแนน)</span></label>
                <label class="radio-option"><input type="radio" name="q5" value="7"> <span>พอใช้: มีความรับผิดชอบพอใช้ได้ มีบางครั้งที่อาจารย์ หรือบุคลากรอื่นต้องช่วยแบ่งเบาภาระในการดูแลผู้ป่วยในความรับผิดชอบ</span> <span class="score-badge">(7 คะแนน)</span></label>
                <label class="radio-option"><input type="radio" name="q5" value="5"> <span>ควรปรับปรุง: แสดงถึงการขาดความรับผิดชอบในภาระหน้าที่ที่ได้รับมอบหมายเป็นประจำ</span> <span class="score-badge">(5 คะแนน)</span></label>
                <label class="radio-option"><input type="radio" name="q5" value="NA"> <span>N/A: ไม่มีข้อมูล / ไม่สามารถประเมินได้</span> <span class="score-badge" style="color:#9ca3af;">(ไม่คิดคะแนน)</span></label>
            </div>
        </div>

        <div class="rubric-card">
            <div class="rubric-title">6. เจตคติและจริยธรรม</div>
            <div class="radio-group">
                <label class="radio-option"><input type="radio" name="q6" value="15" required> <span>ดีมาก: แสดงถึงความเป็นวิชาชีพเช่นตรงเวลา คำนึงถึงประโยชน์ของผู้ป่วยและผู้ร่วมงาน มีเจตคติที่ดีมากต่อการเป็นแพทย์</span> <span class="score-badge">(15 คะแนน)</span></label>
                <label class="radio-option"><input type="radio" name="q6" value="12"> <span>ดี: แสดงถึงความเป็นวิชาชีพเป็นเช่น ตรงเวลา รักษาประโยชน์ผู้ป่วยและผู้ร่วมงานส่วนใหญ่ มีเจตคติที่ดีต่อการเป็นแพทย์</span> <span class="score-badge">(12 คะแนน)</span></label>
                <label class="radio-option"><input type="radio" name="q6" value="7"> <span>พอใช้: มีเจตคติที่ดีต่อวิชาชีพแพทย์ ไม่ทำผิดกฎระเบียบ ข้อบังคับต่างๆ อาจแสดงออกถึงการไม่คำนึงถึงหลักจริยธรรมในการดูแลผู้ป่วยบางราย</span> <span class="score-badge">(7 คะแนน)</span></label>
                <label class="radio-option"><input type="radio" name="q6" value="5"> <span>ควรปรับปรุง: แสดงพฤติกรรมที่ไม่เหมาะสมต่อการเป็นแพทย์หลายครั้ง</span> <span class="score-badge">(5 คะแนน)</span></label>
                <label class="radio-option"><input type="radio" name="q6" value="NA"> <span>N/A: ไม่มีข้อมูล / ไม่สามารถประเมินได้</span> <span class="score-badge" style="color:#9ca3af;">(ไม่คิดคะแนน)</span></label>
            </div>
        </div>

        <div class="form-group">
            <label for="comment">ความคิดเห็นเพิ่มเติม</label>
            <textarea id="comment" rows="4" placeholder="ระบุจุดเด่นหรือจุดที่ควรพัฒนาเพิ่มเติม"></textarea>
        </div>

        <button type="submit" class="btn-submit">ส่งผลการประเมิน</button>
    </form>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycby-NJ261ieZ5r37krHBdcK4dbJmxD0ZYhapsrgmBKtZorzjVPGAi643QrBWc72GHVEY/exec";

    // โหลดรายวิชาอัตโนมัติเมื่อเปิดหน้าเว็บ
    window.addEventListener("DOMContentLoaded", loadSubjects);

    async function loadSubjects() {
        const select = document.getElementById("subjectCode");
        try {
            const response = await fetch(`${API_URL}?action=getSubjects`);
            const subjects = await response.json();
            
            select.innerHTML = '<option value="">-- เลือกรายวิชาเลือกเสรี --</option>';
            subjects.forEach(sub => {
                select.innerHTML += `<option value="${sub.code}">${sub.code} - ${sub.name}</option>`;
            });
        } catch (error) {
            select.innerHTML = '<option value="">❌ เกิดข้อผิดพลาดในการโหลดวิชา</option>';
        }
    }

    // โหลดและสร้าง Card รายชื่อนิสิตให้คลิกเลือกได้เลย
    async function loadStudents() {
        const subjectCode = document.getElementById("subjectCode").value;
        const container = document.getElementById("studentContainer");
        
        document.getElementById("selectedStudentId").value = "";
        document.getElementById("selectedStudentName").value = "";

        if (!subjectCode) {
            container.innerHTML = '<p style="color: #6b7280;">(กรุณาเลือกวิชาเลือกเสรีด้านบนก่อน)</p>';
            return;
        }

        container.innerHTML = '<p>กำลังโหลดรายชื่อนิสิตในวิชานี้...</p>';

        try {
            const response = await fetch(`${API_URL}?action=getStudentsBySubject&subjectCode=${subjectCode}`);
            const students = await response.json();

            if (students.length === 0) {
                container.innerHTML = '<p style="color: red; font-weight: bold;">❌ ไม่พบนิสิตแพทย์ที่ลงทะเบียนเรียนในวิชานี้</p>';
                return;
            }

            container.innerHTML = "";
            students.forEach(std => {
                const isEvaluated = std.status === "ประเมินแล้ว";
                const card = document.createElement("div");
                card.className = `student-card ${isEvaluated ? 'evaluated' : ''}`;
                card.innerHTML = `
                    <div class="id">${std.studentId}</div>
                    <div class="name">${std.studentName}</div>
                    <div class="status-badge" style="color: ${isEvaluated ? '#10b981' : '#6b7280'}">${std.status}</div>
                `;
                
                // เหตุการณ์เมื่อคลิกเลือกนิสิต
                card.addEventListener("click", () => {
                    document.querySelectorAll(".student-card").forEach(c => c.classList.remove("selected"));
                    card.classList.add("selected");
                    document.getElementById("selectedStudentId").value = std.studentId;
                    document.getElementById("selectedStudentName").value = std.studentName;
                });

                container.appendChild(card);
            });

        } catch (error) {
            container.innerHTML = '<p style="color: red;">เกิดข้อผิดพลาดในการดึงข้อมูลรายชื่อ</p>';
        }
    }

    // ยื่นผลการประเมิน
    document.getElementById("evaluationForm").addEventListener("submit", async function(e) {
        e.preventDefault();
        
        const studentId = document.getElementById("selectedStudentId").value;
        const studentName = document.getElementById("selectedStudentName").value;

        if (!studentId) {
            Swal.fire("แจ้งเตือน", "กรุณาคลิกเลือกนิสิตแพทย์ที่ต้องการประเมินก่อนครับ", "warning");
            return;
        }

        Swal.fire({
            title: 'ยืนยันการบันทึก?',
            text: `ต้องการส่งผลประเมินของ ${studentName} ใช่หรือไม่`,
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#1e3a8a',
            confirmButtonText: 'ยืนยัน',
            cancelButtonText: 'ยกเลิก'
        }).then(async (result) => {
            if (result.isConfirmed) {
                Swal.fire({ title: 'กำลังบันทึก...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); } });

                const payload = {
                    action: "submitEvaluation",
                    teacherName: document.getElementById("teacherName").value,
                    subjectCode: document.getElementById("subjectCode").value,
                    studentId: studentId,
                    studentName: studentName,
                    workTime: document.getElementById("workTime").value,
                    score1: document.querySelector('input[name="q1"]:checked').value,
                    score2: document.querySelector('input[name="q2"]:checked').value,
                    score3: document.querySelector('input[name="q3"]:checked').value,
                    score4: document.querySelector('input[name="q4"]:checked').value,
                    score5: document.querySelector('input[name="q5"]:checked').value,
                    score6: document.querySelector('input[name="q6"]:checked').value,
                    comment: document.getElementById("comment").value
                };

                try {
                    const response = await fetch(API_URL, { method: "POST", body: JSON.stringify(payload) });
                    const resData = await response.json();
                    if (resData.result === "success") {
                        Swal.fire("สำเร็จ!", "บันทึกข้อมูลเรียบร้อยแล้ว", "success");
                        loadStudents(); // รีโหลดสถานะการประเมินใหม่
                        document.getElementById("comment").value = "";
                    } else {
                        Swal.fire("ล้มเหลว", "เกิดข้อผิดพลาด", "error");
                    }
                } catch (error) {
                    Swal.fire("ผิดพลาด", "ไม่สามารถเชื่อมต่อระบบได้", "error");
                }
            }
        });
    });
</script>
</body>
</html>
