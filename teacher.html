<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แบบประเมินการปฏิบัติงานนิสิตแพทย์ - สำหรับอาจารย์</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary-color: #1e3a8a; --secondary-color: #3b82f6; --background-color: #f3f4f6; --card-background: #ffffff; --text-color: #1f2937; }
        body { font-family: 'Sarabun', sans-serif; background-color: var(--background-color); color: var(--text-color); margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: var(--card-background); padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); }
        h2, h3 { color: var(--primary-color); text-align: center; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; }
        select, input[type="text"], textarea { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 16px; font-family: 'Sarabun', sans-serif; box-sizing: border-box; }
        .rubric-table { width: 100%; border-collapse: collapse; margin-top: 10px; margin-bottom: 25px; }
        .rubric-table th, .rubric-table td { padding: 12px; border: 1px solid #cbd5e1; text-align: left; }
        .rubric-table th { background-color: #f8fafc; }
        .radio-cell { text-align: center; width: 60px; }
        .btn-submit { background-color: var(--primary-color); color: white; padding: 14px 28px; border: none; border-radius: 6px; font-size: 18px; font-weight: bold; cursor: pointer; width: 100%; transition: background-color 0.2s; font-family: 'Sarabun', sans-serif; }
        .btn-submit:hover { background-color: #1e40af; }
        .competency-title { background: #e0f2fe; color: #0369a1; padding: 10px 15px; border-radius: 6px; font-weight: bold; margin-top: 30px; margin-bottom: 10px; font-size: 16px; border-left: 5px solid #0284c7; }
    </style>
</head>
<body>

<div class="container">
    <h2>📋 แบบประเมินผลการปฏิบัติงานนิสิตแพทย์ ชั้นคลินิก</h2>
    <p style="text-align: center; color: #555;">กรุณาเลือกวิชาและรายชื่อนิสิตเพื่อดำเนินการให้คะแนนตามเกณฑ์รูบริคส์</p>
    <hr style="border: 0; border-top: 1px solid #e5e7eb; margin: 25px 0;">

    <form id="evalForm">
        <div class="form-group">
            <label for="teacherName">👤 ชื่อ-นามสกุล อาจารย์ผู้ประเมิน</label>
            <input type="text" id="teacherName" required placeholder="ตัวอย่าง: นพ.สมชาย ตั้งใจดี">
        </div>

        <div class="form-group">
            <label for="subjectCode">📚 เลือกรายวิชาปฏิบัติงาน</label>
            <select id="subjectCode" required onchange="loadStudents()">
                <option value="">-- กรุณาเลือกวิชา --</option>
            </select>
        </div>

        <div class="form-group">
            <label for="studentSelect">🎓 รายชื่อนิสิตแพทย์ (ในวิชานี้)</label>
            <select id="studentSelect" required disabled>
                <option value="">-- กรุณาเลือกนิสิต --</option>
            </select>
        </div>

        <div class="form-group">
            <label for="workTime">⏳ ระยะเวลา/ช่วงเวลาปฏิบัติงาน</label>
            <input type="text" id="workTime" required placeholder="ตัวอย่าง: 15 มิ.ย. 2568 - 29 มิ.ย. 2568">
        </div>

        <div id="criteriaContainer">
            <p style="text-align: center; color: #666; padding: 20px;">🔄 กำลังโหลดเกณฑ์ประเมินจากฐานข้อมูล...</p>
        </div>

        <div class="form-group" style="margin-top: 30px;">
            <label for="comment">💬 ความคิดเห็นเพิ่มเติมและข้อเสนอแนะเพื่อพัฒนา</label>
            <textarea id="comment" rows="4" placeholder="ระบุจุดเด่นหรือจุดที่ควรปรับปรุงเพิ่มเติมให้กับนิสิตแพทย์..."></textarea>
        </div>

        <button type="submit" class="btn-submit">💾 บันทึกและส่งผลการประเมินเข้าระบบ</button>
    </form>
</div>

<script>
    // 🔗 ใส่ URL ของแอดมินตรงนี้ให้เรียบร้อยแล้วครับ
    const API_URL = "https://script.google.com/macros/s/AKfycby-NJ261ieZ5r37krHBdcK4dbJmxD0ZYhapsrgmBKtZorzjVPGAi643QrBWc72GHVEY/exec";

    let allStudents = [];
    let activeTopics = [];

    window.addEventListener("DOMContentLoaded", () => {
        loadSubjects();
        loadCriteria();
    });

    async function loadSubjects() {
        try {
            const response = await fetch(`${API_URL}?action=getSubjects`);
            const data = await response.json();
            const select = document.getElementById("subjectCode");
            data.forEach(sub => {
                const opt = document.createElement("option");
                opt.value = sub.code;
                opt.innerText = `${sub.code} - ${sub.name}`;
                select.appendChild(opt);
            });
        } catch (error) { alert("ไม่สามารถดึงข้อมูลรายวิชาได้ครับ"); }
    }

    async function loadStudents() {
        const subCode = document.getElementById("subjectCode").value;
        const studentSelect = document.getElementById("studentSelect");
        studentSelect.innerHTML = '<option value="">-- กรุณาเลือกนิสิต --</option>';
        
        if (!subCode) {
            studentSelect.disabled = true;
            return;
        }

        try {
            if (allStudents.length === 0) {
                const response = await fetch(`${API_URL}?action=getStudentsList`);
                allStudents = await response.json();
            }
            
            const filtered = allStudents.filter(s => String(s.subjectCode).trim() === String(subCode).trim());
            
            if (filtered.length === 0) {
                const opt = document.createElement("option");
                opt.innerText = "❌ ไม่พบนิสิตลงทะเบียนในวิชานี้";
                studentSelect.appendChild(opt);
                studentSelect.disabled = true;
            } else {
                filtered.forEach(s => {
                    const opt = document.createElement("option");
                    opt.value = s.studentId;
                    opt.innerText = `${s.studentId} - ${s.studentName}`;
                    studentSelect.appendChild(opt);
                });
                studentSelect.disabled = false;
            }
        } catch (e) { alert("เกิดข้อผิดพลาดในการโหลดรายชื่อนิสิตครับ"); }
    }

    async function loadCriteria() {
        try {
            const response = await fetch(`${API_URL}?action=getFormCriteria`);
            const data = await response.json();
            
            activeTopics = [...new Set(data.map(item => item.topic))].filter(Boolean);
            const container = document.getElementById("criteriaContainer");
            container.innerHTML = "";

            activeTopics.forEach((topic, index) => {
                const qNum = index + 1;
                const rows = data.filter(item => item.topic === topic);
                
                const titleDiv = document.createElement("div");
                titleDiv.className = "competency-title";
                titleDiv.innerText = topic;
                container.appendChild(titleDiv);

                const table = document.createElement("table");
                table.className = "rubric-table";
                table.innerHTML = `
                    <thead>
                        <tr>
                            <th style="width: 50px; text-align:center;">เลือก</th>
                            <th style="width: 100px;">ระดับ</th>
                            <th style="width: 60px; text-align:center;">คะแนน</th>
                            <th>คำอธิบายเกณฑ์และขอบเขตพฤติกรรม</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                `;
                
                const tbody = table.querySelector("tbody");
                rows.forEach(r => {
                    const tr = document.createElement("tr");
                    tr.innerHTML = `
                        <td class="radio-cell"><input type="radio" name="q_${qNum}" value="${r.score}" required style="transform: scale(1.3); cursor:pointer;"></td>
                        <td style="font-weight:bold; color:#1e3a8a;">${r.level}</td>
                        <td style="text-align:center; font-weight:bold; color:#3b82f6;">${r.score}</td>
                        <td style="font-size:14px; color:#4b5563;">${r.detail || '-'}</td>
                    `;
                    tbody.appendChild(tr);
                });
                container.appendChild(table);
            });
        } catch (err) { document.getElementById("criteriaContainer").innerHTML = `<p style="color:red; text-align:center;">โหลดเกณฑ์รูบริคส์ล้มเหลว: ${err}</p>`; }
    }

    document.getElementById("evalForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        
        Swal.fire({
            title: 'ยืนยันการบันทึกข้อมูลหรือไม่?',
            text: "เมื่อกดตกลง คะแนนจะส่งตรงเข้าคลังฐานข้อมูลทันที",
            icon: 'question',
            showCancelButton: true,
            confirmButtonColor: '#1e3a8a',
            confirmButtonText: 'ใช่, บันทึกเลย',
            cancelButtonText: 'ตรวจสอบอีกครั้ง'
        }).then(async (result) => {
            if (result.isConfirmed) {
                Swal.fire({ title: 'กำลังประมวลผลข้อมูล...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); } });
                
                const studentSelect = document.getElementById("studentSelect");
                const studentId = studentSelect.value;
                const studentName = studentSelect.options[studentSelect.selectedIndex].text.split(" - ")[1];

                const payload = {
                    action: "submitEvaluation",
                    teacherName: document.getElementById("teacherName").value,
                    subjectCode: document.getElementById("subjectCode").value,
                    studentId: studentId,
                    studentName: studentName,
                    workTime: document.getElementById("workTime").value,
                    comment: document.getElementById("comment").value
                };

                activeTopics.forEach((topic, index) => {
                    const qNum = index + 1;
                    const selectedRadio = document.querySelector(`input[name="q_${qNum}"]:checked`);
                    payload[`score${qNum}`] = selectedRadio ? selectedRadio.value : "0";
                });

                try {
                    const response = await fetch(API_URL, { 
                        method: "POST", 
                        headers: { "Content-Type": "text/plain;charset=utf-8" },
                        body: JSON.stringify(payload) 
                    });
                    const resData = await response.json();
                    
                    if (resData.result === "success") {
                        await Swal.fire("สำเร็จ!", "บันทึกผลการประเมินนิสิตเรียบร้อยแล้ว", "success");
                        document.getElementById("comment").value = "";
                        document.querySelectorAll('input[type="radio"]').forEach(r => r.checked = false);
                        document.getElementById("studentSelect").value = "";
                    } else { 
                        Swal.fire("ล้มเหลว", "เกิดข้อผิดพลาดจากระบบฐานข้อมูล", "error"); 
                    }
                } catch (error) { Swal.fire("ผิดพลาด", "ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้", "error"); }
            }
        });
    });
</script>
</body>
</html>
