<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แบบประเมินการปฏิบัติงานนิสิตแพทย์ - สำหรับอาจารย์</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary-color: #1e3a8a; --secondary-color: #3b82f6; --background-color: #f3f4f6; --card-background: #ffffff; --text-color: #1f2937; }
        body { font-family: 'Sarabun', sans-serif; background-color: var(--background-color); color: var(--text-color); margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: var(--card-background); padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); }
        h2, h3 { color: var(--primary-color); text-align: center; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; }
        select, textarea { width: 100%; padding: 10px; border: 1px solid #d1d5db; border-radius: 6px; box-sizing: border-box; font-family: 'Sarabun', sans-serif; font-size: 16px; }
        .criteria-card { background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 8px; padding: 20px; margin-bottom: 20px; }
        .criteria-title { font-weight: bold; color: var(--primary-color); font-size: 18px; margin-bottom: 10px; }
        .radio-group { display: flex; flex-direction: column; gap: 10px; }
        .radio-option { display: flex; align-items: flex-start; gap: 10px; background: white; padding: 10px; border-radius: 6px; border: 1px solid #e5e7eb; cursor: pointer; }
        .radio-option:hover { background: #f0fdf4; border-color: #10b981; }
        .radio-option input { margin-top: 4px; }
        .btn-submit { background-color: var(--primary-color); color: white; border: none; padding: 15px 30px; font-size: 18px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; transition: background 0.2s; margin-top: 20px; }
        .btn-submit:hover { background-color: #1e40af; }
    </style>
</head>
<body>

<div class="container">
    <h2>แบบประเมินผลการปฏิบัติงานนิสิตแพทย์</h2>
    <h3 style="font-weight: normal; margin-top: -10px;">ชั้นคลินิก (สำหรับอาจารย์ผู้ประเมิน)</h3>
    <hr style="border: 0; height: 1px; background: #e5e7eb; margin: 25px 0;">

    <form id="evalForm">
        <div class="form-group">
            <label for="subjectSelect">1. เลือกรายวิชาที่ทำจับคู่เรียน</label>
            <select id="subjectSelect" onchange="loadStudents()">
                <option value="">-- กำลังโหลดรายวิชา --</option>
            </select>
        </div>

        <div class="form-group">
            <label for="studentSelect">2. เลือกรายชื่อนิสิตแพทย์ที่ต้องการประเมิน</label>
            <select id="studentSelect">
                <option value="">-- กรุณาเลือกรายวิชาก่อน --</option>
            </select>
        </div>

        <div class="form-group">
            <label for="assessorName">3. ชื่อ-นามสกุล อาจารย์ผู้ประเมิน</label>
            <input type="text" id="assessorName" style="width:100%; padding:10px; border:1px solid #d1d5db; border-radius:6px; font-size:16px;" placeholder="ระบุชื่ออาจารย์">
        </div>

        <h3 style="text-align: left; margin-top: 40px; margin-bottom: 20px; color: var(--primary-color);">📝 ส่วนที่ 2: เกณฑ์การประเมินผล</h3>
        
        <div id="criteriaContainer">
            <div class="criteria-card">
                <div class="criteria-title">1. ความรู้</div>
                <div class="radio-group">
                    <label class="radio-option"><input type="radio" name="q_1" value="20"> <div><strong>ดีมาก (20 คะแนน)</strong><br><span style="font-size:14px; color:#555;">มีควารู้และสามารถอภิปรายและนำความรู้ไปใช้ทางคลินิกได้ดีมาก</span></div></label>
                    <label class="radio-option"><input type="radio" name="q_1" value="15"> <div><strong>ดี (15 คะแนน)</strong><br><span style="font-size:14px; color:#555;">มีความรู้ อภิปรายและนำความรู้ไปใช้ทางคลินิกได้ดี</span></div></label>
                    <label class="radio-option"><input type="radio" name="q_1" value="10"> <div><strong>พอใช้ (10 คะแนน)</strong><br><span style="font-size:14px; color:#555;">มีความรู้บ้าง การประยุกต์ความรู้ในการดูแลผู้ป่วยดีพอควร</span></div></label>
                    <label class="radio-option"><input type="radio" name="q_1" value="5"> <div><strong>ควรปรับปรุง (5 คะแนน)</strong><br><span style="font-size:14px; color:#555;">ขาดความรู้ที่สำคัญ ประยุกต์ใช้ทางคลินิกได้น้อย ต้องการคำชี้แนะ</span></div></label>
                </div>
            </div>

            <div class="criteria-card">
                <div class="criteria-title">2. ทักษะทางคลินิก (การซักประวัติ ตรวจร่างกาย หัตถการ)</div>
                <div class="radio-group">
                    <label class="radio-option"><input type="radio" name="q_2" value="20"> <div><strong>ดีมาก (20 คะแนน)</strong><br><span style="font-size:14px; color:#555;">มีทักษะในทางคลินิกครบถ้วน</span></div></label>
                    <label class="radio-option"><input type="radio" name="q_2" value="15"> <div><strong>ดี (15 คะแนน)</strong><br><span style="font-size:14px; color:#555;">มีทักษะในทางคลินิกในเกณฑ์ดี</span></div></label>
                    <label class="radio-option"><input type="radio" name="q_2" value="10"> <div><strong>พอใช้ (10 คะแนน)</strong><br><span style="font-size:14px; color:#555;">ยังขาดทักษะในทางคลินิกในบางด้าน</span></div></label>
                    <label class="radio-option"><input type="radio" name="q_2" value="5"> <div><strong>ควรปรับปรุง (5 คะแนน)</strong><br><span style="font-size:14px; color:#555;">มีทักษะด้านคลินิกน้อยมากไม่สามารถนำมาใช้ในการวินิจฉัยและดูแลผู้ป่วยได้</span></div></label>
                </div>
            </div>

            <div class="criteria-card">
                <div class="criteria-title">3. การเรียนรู้ด้วยตนเองและการแก้ไขปัญหา</div>
                <div class="radio-group">
                    <label class="radio-option"><input type="radio" name="q_3" value="15"> <div><strong>ดีมาก (15 คะแนน)</strong><br><span style="font-size:14px; color:#555;">ศึกษาค้นคว้าหาความรู้เพิ่มเติมด้วยตนเองสม่ำเสมอ แสวงหาแนวทางแก้ไขปัญหาอย่างเป็นระบบ</span></div></label>
                    <label class="radio-option"><input type="radio" name="q_3" value="12"> <div><strong>ดี (12 คะแนน)</strong><br><span style="font-size:14px; color:#555;">ศึกษาค้นคว้าเพิ่มเติมเมื่อได้รับคำแนะนำ สามารถแก้ไขปัญหาเฉพาะหน้าได้ดี</span></div></label>
                    <label class="radio-option"><input type="radio" name="q_3" value="7"> <div><strong>พอใช้ (7 คะแนน)</strong><br><span style="font-size:14px; color:#555;">ศึกษาค้นคว้าบ้างเป็นบางครั้ง ต้องการการกระตุ้นและแนะนำในการแก้ไขปัญหา</span></div></label>
                    <label class="radio-option"><input type="radio" name="q_3" value="5"> <div><strong>ควรปรับปรุง (5 คะแนน)</strong><br><span style="font-size:14px; color:#555;">ไม่ศึกษาค้นคว้าเพิ่มเติม ขาดทักษะในการคิดวิเคราะห์และแก้ไขปัญหา</span></div></label>
                </div>
            </div>

            <div class="criteria-card">
                <div class="criteria-title">4. การสื่อสารและมนุษยสัมพันธ์</div>
                <div class="radio-group">
                    <label class="radio-option"><input type="radio" name="q_4" value="15"> <div><strong>ดีมาก (15 คะแนน)</strong><br><span style="font-size:14px; color:#555;">มีทักษะในการสื่อสารดีมาก สุภาพ มีกาลเทศะ และ มีมนุษยสัมพันธ์ เป็นที่ชื่นชมของบุคลากร ผู้ป่วย และญาติผู้ป่วย</span></div></label>
                    <label class="radio-option"><input type="radio" name="q_4" value="12"> <div><strong>ดี (12 คะแนน)</strong><br><span style="font-size:14px; color:#555;">มีทักษะในการสื่อสารดี มนุษยสัมพันธ์ที่ดีกับบุคลากรผู้ป่วย และญาติผู้ป่วย</span></div></label>
                    <label class="radio-option"><input type="radio" name="q_4" value="7"> <div><strong>พอใช้ (7 คะแนน)</strong><br><span style="font-size:14px; color:#555;">สามารถทำงานได้กับบุคลากรอาจประสบปัญหาบ้างในการสื่อสารกับผู้ป่วยหรือญาติผู้ป่วยในบางครั้ง</span></div></label>
                    <label class="radio-option"><input type="radio" name="q_4" value="5"> <div><strong>ควรปรับปรุง (5 คะแนน)</strong><br><span style="font-size:14px; color:#555;">มีปัญหาในการทำงานกับบุคลากรอื่นและ ขาดทักษะพื้นฐานในการสื่อสารกับผู้ป่วย และญาติผู้ป่วย</span></div></label>
                </div>
            </div>

            <div class="criteria-card">
                <div class="criteria-title">5. ความรับผิดชอบ</div>
                <div class="radio-group">
                    <label class="radio-option"><input type="radio" name="q_5" value="15"> <div><strong>ดีมาก (15 คะแนน)</strong><br><span style="font-size:14px; color:#555;">มีความรับผิดชอบดีมาก มักทำหน้าที่ต่างๆ ที่อยู่ในความรับผิดชอบของตนได้ดีเกินความคาดหมาย</span></div></label>
                    <label class="radio-option"><input type="radio" name="q_5" value="12"> <div><strong>ดี (12 คะแนน)</strong><br><span style="font-size:14px; color:#555;">มีความรับผิดชอบดี ดูแลงานในความรับผิดชอบของตนได้ตามความคาดหมาย</span></div></label>
                    <label class="radio-option"><input type="radio" name="q_5" value="7"> <div><strong>พอใช้ (7 คะแนน)</strong><br><span style="font-size:14px; color:#555;">มีความรับผิดชอบพอใช้ได้ มีบางครั้งที่อาจารย์ หรือบุคลากรอื่นต้องช่วยแบ่งเบาภาระในการดูแลผู้ป่วยในความรับผิดชอบ</span></div></label>
                    <label class="radio-option"><input type="radio" name="q_5" value="5"> <div><strong>ควรปรับปรุง (5 คะแนน)</strong><br><span style="font-size:14px; color:#555;">แสดงถึงการขาดความรับผิดชอบในภาระหน้าที่ที่ได้รับมอบหมายเป็นประจำ</span></div></label>
                </div>
            </div>

            <div class="criteria-card">
                <div class="criteria-title">6. เจตคติและจริยธรรม</div>
                <div class="radio-group">
                    <label class="radio-option"><input type="radio" name="q_6" value="15"> <div><strong>ดีมาก (15 คะแนน)</strong><br><span style="font-size:14px; color:#555;">แสดงถึงความเป็นวิชาชีพเช่นตรงเวลา คำนึงถึงประโยชน์ของผู้ป่วย ซื่อสัตย์ ไว้วางใจได้ดีมากเป็นแบบอย่างได้</span></div></label>
                    <label class="radio-option"><input type="radio" name="q_6" value="12"> <div><strong>ดี (12 คะแนน)</strong><br><span style="font-size:14px; color:#555;">พฤติกรรมเหมาะสมตามหลักจรรยาบรรณวิชาชีพ ตรงต่อเวลา ปฏิบัติตนดี</span></div></label>
                    <label class="radio-option"><input type="radio" name="q_6" value="7"> <div><strong>พอใช้ (7 คะแนน)</strong><br><span style="font-size:14px; color:#555;">พฤติกรรมทั่วไปยอมรับได้ แต่ต้องตักเตือนในบางเรื่อง เช่น การมาสาย หรือความกระตือรือร้น</span></div></label>
                    <label class="radio-option"><input type="radio" name="q_6" value="5"> <div><strong>ควรปรับปรุง (5 คะแนน)</strong><br><span style="font-size:14px; color:#555;">มีพฤติกรรมที่ไม่เหมาะสม ไม่ตรงต่อเวลา ขาดความซื่อสัตย์ หรือไม่เคารพสิทธิ์ผู้ป่วย</span></div></label>
                </div>
            </div>
        </div>

        <div class="form-group" style="margin-top: 30px;">
            <label for="comment">ความคิดเห็นเพิ่มเติม / ข้อเสนอแนะ เพื่อการพัฒนา</label>
            <textarea id="comment" rows="4" placeholder="กรอกข้อเสนอแนะเพิ่มเติม..."></textarea>
        </div>

        <button type="button" id="submitBtn" class="btn-submit">💾 บันทึกและส่งผลการประเมิน</button>
    </form>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycby-NJ261ieZ5r37krHBdcK4dbJmxD0ZYhapsrgmBKtZorzjVPGAi643QrBWc72GHVEY/exec";

    document.addEventListener("DOMContentLoaded", () => {
        loadInitialData();
    });

    async function loadInitialData() {
        Swal.fire({ title: 'กำลังโหลดข้อมูลระบบ...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); } });
        try {
            const resSub = await fetch(`${API_URL}?action=getSubjects`);
            const subjects = await resSub.json();
            const subSelect = document.getElementById("subjectSelect");
            subSelect.innerHTML = '<option value="">-- เลือกรายวิชา --</option>';
            subjects.forEach(s => {
                let opt = document.createElement("option");
                opt.value = s.id;
                opt.innerText = `${s.id} - ${s.name}`;
                subSelect.appendChild(opt);
            });
            Swal.close();
        } catch (e) {
            Swal.fire("ผิดพลาด", "ไม่สามารถโหลดรายวิชาได้", "error");
        }
    }

    async function loadStudents() {
        const subId = document.getElementById("subjectSelect").value;
        const stuSelect = document.getElementById("studentSelect");
        if (!subId) {
            stuSelect.innerHTML = '<option value="">-- กรุณาเลือกรายวิชาก่อน --</option>';
            return;
        }
        stuSelect.innerHTML = '<option value="">-- กำลังดึงรายชื่อนิสิต... --</option>';
        try {
            const res = await fetch(`${API_URL}?action=getStudentsList&subjectId=${subId}`);
            const students = await res.json();
            stuSelect.innerHTML = '<option value="">-- เลือกรายชื่อนิสิต --</option>';
            students.forEach(st => {
                let opt = document.createElement("option");
                opt.value = st.id;
                opt.innerText = `${st.id} - ${st.name} [สถานะ: ${st.status}]`;
                if(st.status === "✅ ประเมินแล้ว") opt.disabled = true;
                stuSelect.appendChild(opt);
            });
        } catch (e) {
            stuSelect.innerHTML = '<option value="">❌ ดึงข้อมูลล้มเหลว</option>';
        }
    }

    document.getElementById("submitBtn").addEventListener("click", async () => {
        const subId = document.getElementById("subjectSelect").value;
        const stuId = document.getElementById("studentSelect").value;
        const assessor = document.getElementById("assessorName").value.trim();
        const studentSelectText = document.getElementById("studentSelect");
        const studentName = studentSelectText.options[studentSelectText.selectedIndex]?.text.split(" - ")[1]?.split(" [")[0] || "";

        if(!subId || !stuId || !assessor) {
            Swal.fire("คำเตือน", "กรุณากรอกข้อมูลส่วนหัวข้อและผู้ประเมินให้ครบถ้วนครับ", "warning");
            return;
        }

        let answeredAll = true;
        for (let i = 1; i <= 6; i++) {
            if(!document.querySelector(`input[name="q_${i}"]:checked`)) answeredAll = false;
        }

        if(!answeredAll) {
            Swal.fire("คำเตือน", "กรุณาตอบคำถามหัวข้อการประเมินให้ครบทุกข้อครับ", "warning");
            return;
        }

        Swal.fire({
            title: 'ยืนยันการบันทึก?',
            text: "ตรวจสอบคะแนนให้เรียบร้อยก่อนส่งฐานข้อมูล ไม่สามารถกลับมาแก้ไขเองได้",
            icon: 'question',
            showCancelButton: true,
            confirmButtonColor: '#1e3a8a',
            confirmButtonText: 'ยืนยันส่งข้อมูล'
        }).then(async (result) => {
            if (result.isConfirmed) {
                Swal.fire({ title: 'กำลังบันทึกคะแนน...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); } });
                
                let payload = {
                    action: "submitEvaluation",
                    studentId: stuId,
                    subjectId: subId,
                    assessorName: assessor,
                    studentName: studentName,
                    workTime: "", 
                    comment: document.getElementById("comment").value
                };

                for (let i = 1; i <= 6; i++) {
                    const selectedRadio = document.querySelector(`input[name="q_${i}"]:checked`);
                    payload[`score${i}`] = selectedRadio ? selectedRadio.value : "0";
                }

                try {
                    const response = await fetch(API_URL, { 
                        method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify(payload) 
                    });
                    const resData = await response.json();
                    
                    if (resData.result === "success") {
                        await Swal.fire("สำเร็จ!", "บันทึกผลการประเมินนิสิตเรียบร้อยแล้ว", "success");
                        loadStudents(); 
                        document.getElementById("comment").value = "";
                        document.querySelectorAll('input[type="radio"]').forEach(r => r.checked = false);
                    } else { 
                        Swal.fire("ล้มเหลว", resData.message || "เกิดข้อผิดพลาดจากระบบฐานข้อมูล", "error"); 
                    }
                } catch (error) { Swal.fire("ผิดพลาด", "ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้", "error"); }
            }
        });
    });
</script>
</body>
</html>
