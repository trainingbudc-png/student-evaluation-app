<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ลงทะเบียนฐานข้อมูลนิสิตแพทย์</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style> body { font-family: 'Prompt', sans-serif; } </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md bg-white rounded-3xl shadow-xl shadow-slate-200/50 p-8">
        <div class="text-center mb-6">
            <div class="inline-flex bg-emerald-50 text-emerald-600 p-4 rounded-2xl shadow-inner mb-4 text-3xl">👨‍⚕️</div>
            <h2 class="text-2xl font-bold text-slate-800 mb-2">ลงทะเบียนนิสิตแพทย์</h2>
            <p class="text-sm text-slate-500 font-light">กรุณากรอกข้อมูลเพื่อรอแอดมินอนุมัติเข้าสู่ระบบ</p>
        </div>

        <form id="registerForm" class="space-y-4">
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">รหัสนิสิต (8 หลัก) <span class="text-rose-500">*</span></label>
                <input type="text" id="studentId" required pattern="[0-9]{8}" maxlength="8" placeholder="เช่น 64460084" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:bg-white focus:ring-2 focus:ring-emerald-500/20 focus:border-emerald-500 outline-none text-slate-800 transition-colors">
            </div>

            <div class="grid grid-cols-3 gap-3">
                <div class="col-span-1">
                    <label class="block text-sm font-semibold text-slate-700 mb-1">คำนำหน้า <span class="text-rose-500">*</span></label>
                    <select id="prefix" required class="w-full px-3 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:bg-white outline-none">
                        <option value="">เลือก</option><option value="นาย">นาย</option><option value="นางสาว">นางสาว</option>
                    </select>
                </div>
                <div class="col-span-2">
                    <label class="block text-sm font-semibold text-slate-700 mb-1">ชื่อจริง <span class="text-rose-500">*</span></label>
                    <input type="text" id="firstName" required placeholder="ชื่อ" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:bg-white outline-none">
                </div>
            </div>

            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">นามสกุล <span class="text-rose-500">*</span></label>
                <input type="text" id="lastName" required placeholder="นามสกุล" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:bg-white outline-none">
            </div>

            <div class="grid grid-cols-2 gap-3 mt-2">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">ชั้นปี <span class="text-rose-500">*</span></label>
                    <select id="studentYear" required class="w-full px-3 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:bg-white outline-none">
                        <option value="">-- เลือก --</option><option value="4">ปีที่ 4</option><option value="5">ปีที่ 5</option><option value="6">ปีที่ 6</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">สถาบัน / รพ. <span class="text-rose-500">*</span></label>
                    <select id="hospital" required class="w-full px-3 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:bg-white outline-none">
                        <option value="">-- เลือก --</option><option value="รพ.ศูนย์">รพ.ศูนย์</option><option value="รพ.สมทบ A">รพ.สมทบ A</option>
                    </select>
                </div>
            </div>

            <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3.5 px-6 rounded-xl shadow-lg mt-4">
                ✅ ยืนยันการลงทะเบียน
            </button>
        </form>
    </div>

    <script>
        // ⚠️ เปลี่ยนลิงก์ตรงนี้ให้เป็น Web App URL ของคุณ
        const API_URL = "https://script.google.com/macros/s/AKfycbzztzVKjo66T95WJHOIir1QRR5JmPgnJv83ZLNM3dWtqZNnT_pDx4Ktu6O1-6-hm9Cy1w/exec"; 

        document.getElementById("registerForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const studentId = document.getElementById("studentId").value.trim();

            if (studentId.length !== 8) return Swal.fire("แจ้งเตือน", "รหัสนิสิตต้องมี 8 หลัก", "warning");

            Swal.fire({ title: 'กำลังบันทึกข้อมูล...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); } });

            const payload = {
                action: "registerStudent",
                studentId: studentId,
                prefix: document.getElementById("prefix").value,
                firstName: document.getElementById("firstName").value.trim(),
                lastName: document.getElementById("lastName").value.trim(),
                studentYear: document.getElementById("studentYear").value,
                hospital: document.getElementById("hospital").value
            };

            try {
                const res = await fetch(API_URL, { 
                    method: "POST", 
                    headers: { "Content-Type": "text/plain;charset=utf-8" },
                    body: JSON.stringify(payload) 
                }).then(r => r.json());
                
                if (res.result === "success") {
                    Swal.fire("ลงทะเบียนสำเร็จ!", "ข้อมูลถูกส่งให้แอดมินอนุมัติแล้ว", "success").then(() => document.getElementById("registerForm").reset());
                } else {
                    Swal.fire("แจ้งเตือน", res.message, "warning");
                }
            } catch (err) { Swal.fire("ผิดพลาด", "เชื่อมต่อเซิร์ฟเวอร์ไม่ได้", "error"); }
        });
    </script>
</body>
</html>
