<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ลงทะเบียนฐานข้อมูลนิสิตแพทย์</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: { extend: { fontFamily: { sans: ['Prompt', 'sans-serif'] } } }
        }
    </script>
</head>
<body class="bg-slate-50 font-sans min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md bg-white rounded-3xl shadow-xl shadow-slate-200/50 p-8">
        <div class="text-center mb-6">
            <div class="inline-flex bg-emerald-50 text-emerald-600 p-4 rounded-2xl shadow-inner mb-4 text-3xl">
                👨‍⚕️
            </div>
            <h2 class="text-2xl font-bold text-slate-800 mb-2">ลงทะเบียนนิสิตแพทย์</h2>
            <p class="text-sm text-slate-500 font-light">กรุณากรอกข้อมูลเพื่อบันทึกลงในฐานข้อมูลระบบประเมินผลชั้นคลินิก</p>
        </div>

        <form id="registerForm" class="space-y-4">
            <div>
                <label for="studentId" class="block text-sm font-semibold text-slate-700 mb-1">รหัสนิสิต (8 หลัก) <span class="text-rose-500">*</span></label>
                <input type="text" id="studentId" required pattern="[0-9]{8}" maxlength="8" placeholder="เช่น 64460084" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:bg-white focus:ring-2 focus:ring-emerald-500/20 focus:border-emerald-500 outline-none text-slate-800 transition-colors">
            </div>

            <div class="grid grid-cols-3 gap-3">
                <div class="col-span-1">
                    <label for="prefix" class="block text-sm font-semibold text-slate-700 mb-1">คำนำหน้า <span class="text-rose-500">*</span></label>
                    <select id="prefix" required class="w-full px-3 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:bg-white focus:ring-2 focus:ring-emerald-500/20 focus:border-emerald-500 outline-none text-slate-800">
                        <option value="นาย">นาย</option>
                        <option value="นางสาว">นางสาว</option>
                    </select>
                </div>
                <div class="col-span-2">
                    <label for="firstName" class="block text-sm font-semibold text-slate-700 mb-1">ชื่อจริง <span class="text-rose-500">*</span></label>
                    <input type="text" id="firstName" required placeholder="ชื่อ (ไม่ต้องใส่คำนำหน้า)" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:bg-white focus:ring-2 focus:ring-emerald-500/20 focus:border-emerald-500 outline-none text-slate-800 transition-colors">
                </div>
            </div>

            <div>
                <label for="lastName" class="block text-sm font-semibold text-slate-700 mb-1">นามสกุล <span class="text-rose-500">*</span></label>
                <input type="text" id="lastName" required placeholder="นามสกุล" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:bg-white focus:ring-2 focus:ring-emerald-500/20 focus:border-emerald-500 outline-none text-slate-800 transition-colors">
            </div>

            <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3.5 px-6 rounded-xl shadow-lg shadow-emerald-200 transition-all transform hover:-translate-y-0.5 active:translate-y-0 text-center text-sm tracking-wide mt-4">
                ✅ ยืนยันการลงทะเบียน
            </button>
        </form>
    </div>

    <script>
        // ⚠️ อย่าลืมแก้ลิงก์ API_URL ให้ตรงกับตัวที่ Deploy ของคุณนะครับ
        const API_URL = "https://script.google.com/macros/s/AKfycbzztzVKjo66T95WJHOIir1QRR5JmPgnJv83ZLNM3dWtqZNnT_pDx4Ktu6O1-6-hm9Cy1w/exec";

        document.getElementById("registerForm").addEventListener("submit", async (e) => {
            e.preventDefault();

            const studentId = document.getElementById("studentId").value.trim();
            const prefix = document.getElementById("prefix").value;
            const firstName = document.getElementById("firstName").value.trim();
            const lastName = document.getElementById("lastName").value.trim();

            if (studentId.length !== 8) {
                Swal.fire("ข้อมูลไม่ถูกต้อง", "กรุณากรอกรหัสนิสิตให้ครบ 8 หลัก", "warning");
                return;
            }

            Swal.fire({
                title: 'กำลังตรวจสอบข้อมูล...',
                allowOutsideClick: false,
                didOpen: () => { Swal.showLoading(); }
            });

            try {
                // ส่งข้อมูลไปบันทึกที่ Apps Script
                const payload = {
                    action: "registerStudent",
                    studentId: studentId,
                    prefix: prefix,
                    firstName: firstName,
                    lastName: lastName
                };

                const response = await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "text/plain;charset=utf-8" },
                    body: JSON.stringify(payload)
                });
                
                const data = await response.json();

                if (data.result === "success") {
                    Swal.fire({
                        icon: "success",
                        title: "ลงทะเบียนสำเร็จ!",
                        text: "ข้อมูลของคุณถูกบันทึกลงระบบแล้ว",
                        confirmButtonColor: "#059669"
                    }).then(() => {
                        document.getElementById("registerForm").reset();
                        // ถ้าเปิดใน LIFF สามารถสั่ง liff.closeWindow() ได้ที่นี่เลย
                    });
                } else if (data.result === "duplicate") {
                    // 🌟 แจ้งเตือนกรณีลงทะเบียนซ้ำ 🌟
                    Swal.fire({
                        icon: "error",
                        title: "ลงทะเบียนซ้ำ!",
                        text: `รหัสนิสิต ${studentId} มีในระบบแล้ว ไม่สามารถลงทะเบียนซ้ำได้ครับ`,
                        confirmButtonColor: "#dc2626"
                    });
                } else {
                    Swal.fire("ข้อผิดพลาด", data.message || "ไม่สามารถบันทึกข้อมูลได้", "error");
                }
            } catch (error) {
                Swal.fire("ข้อผิดพลาด", "ไม่สามารถเชื่อมต่อกับเซิร์ฟเวอร์ได้", "error");
            }
        });
    </script>
</body>
</html>
