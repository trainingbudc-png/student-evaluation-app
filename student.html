<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบตรวจสอบผลการประเมิน - สำหรับนิสิตแพทย์</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f6f9; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 550px; margin: 50px auto; background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #10b981; margin-bottom: 5px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 25px; font-size: 14px; }
        .form-group { margin-bottom: 20px; }
        label { font-weight: bold; display: block; margin-bottom: 8px; }
        select, input[type="text"] { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; background: #10b981; color: white; padding: 14px; border: none; border-radius: 4px; font-size: 18px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        button:hover { background: #059669; }
        .result-box { margin-top: 30px; padding: 20px; border-radius: 6px; display: none; }
        .status-evaluated { background-color: #e6fffa; border: 1px solid #319795; color: #234e52; }
        .status-not-evaluated { background-color: #fffaf0; border: 1px solid #dd6b20; color: #742a2a; }
        .score-zone { font-size: 32px; text-align: center; margin: 15px 0; font-weight: bold; color: #2b6cb0; }
        .grade-zone { text-align: center; font-size: 18px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>🩺 คลังข้อมูลผลการประเมินนิสิตแพทย์</h2>
    <p class="subtitle">ระบบสำหรับนิสิตสืบค้นสถานะการส่งผลรูบริคส์รายวิชาชั้นคลินิก</p>
    
    <div class="form-group">
        <label for="studentId">🆔 รหัสนิสิตแพทย์ (8 หลัก)</label>
        <input type="text" id="studentId" placeholder="ตัวอย่าง: 64460084" maxlength="8">
    </div>

    <div class="form-group">
        <label for="subjectCode">📚 เลือกรายวิชาที่ต้องการสืบค้น</label>
        <select id="subjectCode">
            <option value="">-- กรุณาเลือกรายวิชา --</option>
        </select>
    </div>

    <button onclick="checkEvaluationStatus()">🔍 ตรวจสอบคะแนนประเมิน</button>

    <div id="resultBox" class="result-box">
        <h4 id="statusTitle" style="margin-top:0; margin-bottom:10px;">-</h4>
        <div id="scoreZone" class="score-zone" style="display:none;">
            <span id="totalScoreText">0</span> <span style="font-size:16px;">คะแนนเต็ม 100</span>
            <div id="gradeText" class="grade-zone" style="margin-top: 10px; font-size: 20px;">-</div>
        </div>
    </div>
</div>

<script>
    // 🔗 ใส่ URL ของแอดมินตรงนี้ให้เรียบร้อยแล้วครับ
    const API_URL = "https://script.google.com/macros/s/AKfycbx_x-pFk87VJZZElW0ywKYjvkrFyW4Xly7IYEtr4Lcsb1Dk1M838m6rwGDfSTTVxSFuHg/exec";

    window.addEventListener("DOMContentLoaded", async () => {
        try {
            const response = await fetch(`${API_URL}?action=getSubjects`);
            const data = await response.json();
            const select = document.getElementById("subjectCode");
            data.forEach(sub => {
                const opt = document.createElement("option");
                opt.value = sub.code;
                opt.innerText = `${sub.code} - ${sub.name}`;
                select.appendChild(opt);
            });
        } catch (error) { alert("ล้มเหลวในการเชื่อมต่อคลังรายวิชา"); }
    });

    async function checkEvaluationStatus() {
        const studentId = document.getElementById('studentId').value.trim();
        const subjectCode = document.getElementById('subjectCode').value;
        const resultBox = document.getElementById('resultBox');
        const statusTitle = document.getElementById('statusTitle');
        const scoreZone = document.getElementById('scoreZone');

        if (studentId.length !== 8) {
            alert('กรุณากรอกรหัสนิสิตให้ถูกต้องครบ 8 หลักก่อนครับ');
            return;
        }
        if (!subjectCode) {
            alert('กรุณาเลือกรายวิชาที่ต้องการตรวจสอบครับ');
            return;
        }

        resultBox.style.display = 'block';
        resultBox.className = 'result-box';
        statusTitle.innerText = '⏳ กำลังค้นหาข้อมูลการประเมิน...';
        scoreZone.style.display = 'none';

        try {
            const response = await fetch(`${API_URL}?action=checkStatus&studentId=${studentId}&subjectCode=${subjectCode}`);
            const data = await response.json();

            if (data.status === "ได้รับการประเมินแล้ว") {
                resultBox.classList.add('status-evaluated');
                statusTitle.innerText = '✅ อาจารย์ได้บันทึกผลการประเมินให้คุณแล้ว';
                document.getElementById('totalScoreText').innerText = data.totalScore;
                document.getElementById('gradeText').innerText = data.grade;
                scoreZone.style.display = 'block';
            } else {
                resultBox.classList.add('status-not-evaluated');
                statusTitle.innerText = '⚠️ ยังไม่พบผลการประเมินในระบบคลังข้อมูล';
                scoreZone.style.display = 'none';
            }
        } catch (error) {
            resultBox.style.display = 'block';
            statusTitle.innerText = '❌ เกิดข้อผิดพลาดในการเชื่อมต่อกรุณาลองใหม่อีกครั้ง';
            scoreZone.style.display = 'none';
        }
    }
</script>
</body>
</html>
