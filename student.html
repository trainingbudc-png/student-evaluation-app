<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบตรวจสอบผลการประเมิน - สำหรับนิสิตแพทย์</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: { extend: { fontFamily: { sans: ['Prompt', 'sans-serif'] } } }
        }
    </script>
    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeIn 0.4s ease forwards; }

        /* สีกล่องสถานะตามโค้ดเดิม */
        .status-evaluated { 
            background-color: #ecfdf5 !important; 
            border-color: #a7f3d0 !important; 
            color: #065f46 !important; 
        }
        .status-not-evaluated { 
            background-color: #fff7ed !important; 
            border-color: #fed7aa !important; 
            color: #9a3412 !important; 
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen flex items-center justify-center p-4 sm:p-6">

<div class="w-full max-w-md bg-white rounded-3xl shadow-xl shadow-slate-200/50 border border-slate-100 p-8 sm:p-10 transition-all">
    
    <div class="text-center mb-8">
        <div class="inline-flex bg-indigo-50 text-indigo-600 p-4 rounded-2xl shadow-inner mb-4 text-3xl">
            🩺
        </div>
        <h2 class="text-2xl font-bold text-slate-800 mb-2">คลังข้อมูลผลประเมิน</h2>
        <p class="text-sm text-slate-500 font-light leading-relaxed">ระบบสำหรับนิสิตสืบค้นสถานะการส่งผลรูบริคส์รายวิชาชั้นคลินิก</p>
    </div>
    
    <div class="space-y-5">
        <div>
            <label for="studentId" class="block text-sm font-semibold text-slate-700 mb-2">รหัสนิสิตแพทย์ (8 หลัก)</label>
            <input type="text" id="studentId" placeholder="เช่น: 64460084" maxlength="8" class="w-full px-4 py-3.5 bg-slate-50 border border-slate-200 rounded-xl text-base focus:bg-white focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition-all text-slate-800 placeholder-slate-400 font-medium shadow-sm">
        </div>

        <div>
            <label for="subjectCode" class="block text-sm font-semibold text-slate-700 mb-2">เลือกรายวิชาที่ต้องการสืบค้น</label>
            <div class="relative">
                <select id="subjectCode" class="w-full px-4 py-3.5 bg-slate-50 border border-slate-200 rounded-xl text-base focus:bg-white focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition-all text-slate-800 font-medium shadow-sm appearance-none cursor-pointer pr-10">
                    <option value="">-- กรุณาเลือกรายวิชา --</option>
                </select>
                <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-slate-400">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                </div>
            </div>
        </div>

        <button onclick="checkEvaluationStatus()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 px-6 rounded-xl shadow-lg shadow-indigo-200 transition-all transform hover:-translate-y-0.5 active:translate-y-0 text-center text-base tracking-wide">
            ตรวจสอบสถานะการประเมิน
        </button>
    </div>

    <div id="resultBox" class="mt-8 p-5 rounded-2xl text-center border transition-all animate-fade-in" style="display: none;">
        <h4 id="statusTitle" class="font-semibold text-base leading-snug py-2">-</h4>
        
        <div id="scoreZone" style="display: none !important;">
            <div id="totalScoreText"></div>
            <div id="gradeText"></div>
        </div>
    </div>
</div>

<script>
    // 🔗 ลิงก์ Web App ประจำระบบของคุณ
    const API_URL = "https://script.google.com/macros/s/AKfycbx_x-pFk87VJZZElW0ywKYjvkrFyW4Xly7IYEtr4Lcsb1Dk1M838m6rwGDfSTTVxSFuHg/exec";

    window.addEventListener("DOMContentLoaded", async () => {
        try {
            const response = await fetch(`${API_URL}?action=getSubjects`);
            const data = await response.json();
            const select = document.getElementById("subjectCode");
            data.forEach(sub => {
                const opt = document.createElement("option");
                opt.value = sub.code;
                opt.innerText = `${sub.code} - ${sub.name}`;
                select.appendChild(opt);
            });
        } catch (error) { alert("ล้มเหลวในการเชื่อมต่อคลังรายวิชา"); }
    });

    async function checkEvaluationStatus() {
        const studentId = document.getElementById('studentId').value.trim();
        const subjectCode = document.getElementById('subjectCode').value;
        const resultBox = document.getElementById('resultBox');
        const statusTitle = document.getElementById('statusTitle');
        const scoreZone = document.getElementById('scoreZone');

        if (studentId.length !== 8) {
            alert('กรุณากรอกรหัสนิสิตให้ถูกต้องครบ 8 หลักก่อนครับ');
            return;
        }
        if (!subjectCode) {
            alert('กรุณาเลือกรายวิชาที่ต้องการตรวจสอบครับ');
            return;
        }

        resultBox.style.display = 'block';
        resultBox.classList.remove('status-evaluated', 'status-not-evaluated');
        
        resultBox.style.backgroundColor = '#f8fafc';
        resultBox.style.borderColor = '#e2e8f0';
        resultBox.style.color = '#475569';
        
        statusTitle.innerText = '⏳ กำลังค้นหาข้อมูลการประเมิน...';
        scoreZone.style.display = 'none';

        try {
            const response = await fetch(`${API_URL}?action=checkStatus&studentId=${studentId}&subjectCode=${subjectCode}`);
            const data = await response.json();

            resultBox.style.backgroundColor = '';
            resultBox.style.borderColor = '';
            resultBox.style.color = '';

            if (data.status === "ได้รับการประเมินแล้ว") {
                resultBox.classList.add('status-evaluated');
                statusTitle.innerText = '✅ อาจารย์บันทึกผลการประเมินเรียบร้อยแล้ว';
                
                // ใส่ข้อมูลลงในตัวแปรซ่อนตามปกติเพื่อไม่ให้สคริปต์ Error
                document.getElementById('totalScoreText').innerText = data.totalScore;
                document.getElementById('gradeText').innerText = data.grade;
                
                // ล็อคให้ซ่อนกล่องคะแนนไว้เสมอตามคำขอ
                scoreZone.style.display = 'none'; 
            } else {
                resultBox.classList.add('status-not-evaluated');
                statusTitle.innerText = '⚠️ ยังไม่พบผลการประเมินในระบบ';
                scoreZone.style.display = 'none';
            }
        } catch (error) {
            resultBox.style.backgroundColor = '';
            resultBox.style.borderColor = '';
            resultBox.style.color = '';
            
            resultBox.classList.add('status-not-evaluated');
            statusTitle.innerText = '❌ เกิดข้อผิดพลาดในการเชื่อมต่อ กรุณาลองใหม่';
            scoreZone.style.display = 'none';
        }
    }
</script>
</body>
</html>
