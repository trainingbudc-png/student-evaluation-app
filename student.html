<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ระบบตรวจสอบสถานะการประเมินสำหรับนิสิต</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 400px; margin: 0 auto; }
        .form-group { margin-bottom: 15px; }
        input { width: 100%; padding: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #0070f3; color: white; border: none; cursor: pointer; }
        #result { margin-top: 20px; font-weight: bold; text-align: center; }
    </style>
</head>
<body>
    <h2>ตรวจสอบการประเมิน</h2>
    <div class="form-group">
        <label>รหัสนิสิต:</label>
        <input type="text" id="studentId" placeholder="เช่น 66010101">
    </div>
    <div class="form-group">
        <label>รหัสวิชา:</label>
        <input type="text" id="subjectCode" placeholder="เช่น CS101">
    </div>
    <button onclick="checkStatus()">ตรวจสอบสถานะ</button>
    
    <div id="result"></div>

    <script>
        // เปลี่ยนเป็น URL Web App ที่ได้จาก Google Apps Script ในขั้นตอนที่ 1
        const API_URL = "URL_WEB_APP_ของ_GAS_ที่คุณDeployมา"; 

        async function checkStatus() {
            const studentId = document.getElementById('studentId').value;
            const subjectCode = document.getElementById('subjectCode').value;
            const resultDiv = document.getElementById('result');
            
            resultDiv.innerText = "กำลังตรวจสอบ...";
            
            try {
                const response = await fetch(`${API_URL}?action=checkStatus&studentId=${studentId}&subjectCode=${subjectCode}`);
                const data = await response.json();
                
                if(data.status === "ได้รับการประเมินแล้ว") {
                    resultDiv.innerHTML = `<span style="color: green;">🟢 ${data.status}</span>`;
                } else {
                    resultDiv.innerHTML = `<span style="color: red;">🔴 ${data.status}</span>`;
                }
            } catch (error) {
                resultDiv.innerText = "เกิดข้อผิดพลาดในการเชื่อมต่อระบบ";
            }
        }
    </script>
</body>
</html>
