<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบตรวจสอบผลการประเมิน - สำหรับนิสิตแพทย์</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f6f9; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 550px; margin: 50px auto; background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #10b981; margin-bottom: 5px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 25px; font-size: 14px; }
        .form-group { margin-bottom: 20px; }
        label { font-weight: bold; display: block; margin-bottom: 8px; }
        select, input[type="text"] { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; background: #10b981; color: white; border: none; padding: 14px; font-size: 16px; border-radius: 4px; cursor: pointer; font-weight: bold; transition: background 0.3s; }
        button:hover { background: #059669; }
        .result-box { margin-top: 30px; padding: 20px; border-radius: 6px; display: none; text-align: center; }
        .status-evaluated { background-color: #d1fae5; border: 1px solid #10b981; color: #065f46; }
        .status-not-evaluated { background-color: #fef3c7; border: 1px solid #f59e0b; color: #92400e; }
        .score-display { margin-top: 15px; font-size: 18px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>ระบบตรวจสอบผลการประเมิน</h2>
    <div class="subtitle">คณะแพทยศาสตร์ (สำหรับนิสิตแพทย์)</div>
    
    <div class="form-group">
        <label for="studentId">รหัสนิสิตแพทย์ (8 หลัก)</label>
        <input type="text" id="studentId" placeholder="ตัวอย่าง: 63460580" maxlength="8">
    </div>

    <div class="form-group">
        <label for="subjectCode">เลือกรายวิชา / หอผู้ป่วย</label>
        <select id="subjectCode">
            <option value="">-- กำลังโหลดรายวิชา --</option>
        </select>
    </div>

    <button onclick="checkEvaluation()">🔎 ตรวจสอบสถานะและคะแนน</button>

    <div id="resultBox" class="result-box">
        <div id="statusTitle" style="font-size: 18px; font-weight: bold;"></div>
        <div id="scoreZone" style="display: none;">
            <div class="score-display">คะแนนรวมที่ได้: <span id="totalScoreText" style="color: #10b981; font-size: 24px;">0</span> / 100 คะแนน</div>
            <div class="score-display">เกรดประเมินผล: <span id="gradeText" style="color: #2563eb; font-size: 24px;">-</span></div>
        </div>
    </div>
</div>

<script>
    // ฝัน URL ของ Google Apps Script เรียบร้อยแล้ว
    const API_URL = "https://script.google.com/macros/s/AKfycby-NJ261ieZ5r37krHBdcK4dbJmxD0ZYhapsrgmBKtZorzjVPGAi643QrBWc72GHVEY/exec";

    document.addEventListener("DOMContentLoaded", () => {
        loadSubjects();
    });

    async function loadSubjects() {
        const select = document.getElementById('subjectCode');
        try {
            const response = await fetch(`${API_URL}?action=getSubjects`);
            const subjects = await response.json();
            select.innerHTML = '<option value="">-- เลือกรายวิชา --</option>';
            subjects.forEach(sub => {
                const opt = document.createElement('option');
                opt.value = sub.id;
                opt.innerText = `${sub.id} - ${sub.name}`;
                select.appendChild(opt);
            });
        } catch (e) {
            select.innerHTML = '<option value="">❌ โหลดวิชาล้มเหลว กรุณารีเฟรชหน้าเว็บ</option>';
        }
    }

    async function checkEvaluation() {
        const studentId = document.getElementById('studentId').value.trim();
        const subjectCode = document.getElementById('subjectCode').value;
        const resultBox = document.getElementById('resultBox');
        const statusTitle = document.getElementById('statusTitle');
        const scoreZone = document.getElementById('scoreZone');

        if (studentId.length !== 8) {
            alert('กรุณากรอกรหัสนิสิตให้ถูกต้องครบ 8 หลักก่อนครับ');
            return;
        }
        if (!subjectCode) {
            alert('กรุณาเลือกรายวิชาที่ต้องการตรวจสอบครับ');
            return;
        }

        resultBox.style.display = 'block';
        resultBox.className = 'result-box';
        statusTitle.innerText = '⏳ กำลังค้นหาข้อมูลการประเมิน...';
        scoreZone.style.display = 'none';

        try {
            const response = await fetch(`${API_URL}?action=checkStatus&studentId=${studentId}&subjectCode=${subjectCode}`);
            const data = await response.json();

            if (data.status === "ได้รับการประเมินแล้ว") {
                resultBox.classList.add('status-evaluated');
                statusTitle.innerText = '✅ อาจารย์ได้บันทึกผลการประเมินให้คุณแล้ว';
                document.getElementById('totalScoreText').innerText = data.totalScore;
                document.getElementById('gradeText').innerText = data.grade;
                scoreZone.style.display = 'block';
            } else {
                resultBox.classList.add('status-not-evaluated');
                statusTitle.innerText = '⚠️ ยังไม่พบผลการประเมินในระบบคลังข้อมูล';
                scoreZone.style.display = 'none';
            }
        } catch (error) {
            resultBox.style.display = 'block';
            statusTitle.innerText = '❌ เกิดข้อผิดพลาดในการเชื่อมต่อกรุณาลองใหม่อีกครั้ง';
            scoreZone.style.display = 'none';
        }
    }
</script>
</body>
</html>
