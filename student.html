<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบตรวจสอบผลการประเมิน - สำหรับนิสิตแพทย์</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f6f9; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 550px; margin: 50px auto; background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #10b981; margin-bottom: 5px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 25px; font-size: 14px; }
        .form-group { margin-bottom: 20px; }
        label { font-weight: bold; display: block; margin-bottom: 8px; }
        select, input[type="text"] { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 12px; background: #10b981; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; font-weight: bold; transition: background 0.2s; }
        button:hover { background: #059669; }
        .result-box { margin-top: 25px; padding: 20px; border-radius: 6px; display: none; text-align: center; }
        .status-not-evaluated { background-color: #fef3c7; border: 1px solid #f59e0b; color: #b45309; }
        .status-evaluated { background-color: #d1fae5; border: 1px solid #10b981; color: #065f46; }
        .score-display { font-size: 24px; font-weight: bold; margin: 10px 0; }
        .grade-display { font-size: 20px; font-weight: bold; color: #0070f3; }
    </style>
</head>
<body>

<div class="container">
    <h2>🎓 ระบบตรวจสอบผลการประเมินวิชาเลือกเสรี</h2>
    <div class="subtitle">สำหรับนิสิตแพทย์ ชั้นปีที่ 6</div>
    
    <div class="form-group">
        <label>รหัสนิสิตแพทย์ (8 หลัก):</label>
        <input type="text" id="studentIdInput" placeholder="ตัวอย่าง: 63460047" maxlength="8">
    </div>

    <div class="form-group">
        <label>เลือกรายวิชา:</label>
        <select id="subjectSelect">
            <option value="">-- กรุณาเลือกวิชา --</option>
            <option value="499723">499723 - การปฏิบัติงานทางอายุรศาสตร์</option>
            <option value="499724">499724 - อายุรศาสตร์เฉพาะทาง</option>
            <option value="499726">499726 - ศัลยศาสตร์พื้นฐาน</option>
            <option value="499727">499727 - ศัลยศาสตร์ประยุกต์</option>
            <option value="499746">499746 - เวชปฏิบัติครอบครัว</option>
            <option value="499751">499751 - รายวิชาโสต ศอ นาสิกวิทยาทั่วไป</option>
            <option value="499752">499752 - จักษุวิทยาคลินิก</option>
            <option value="499753">499753 - ประสบการณ์คลินิกทางเวชศาสตร์ฉุกเฉิน</option>
            <option value="499754">499754 - ประสบการณ์ทางนิติเวชศาสตร์</option>
            <option value="499756">499756 - การปฏิบัติงานทางเวชศาสตร์ฟื้นฟู</option>
            <option value="499757">499757 - การปฏิบัติงานทางพยาธิวิทยา</option>
        </select>
    </div>

    <button onclick="checkEvaluationStatus()">🔍 ตรวจสอบผลคะแนน</button>

    <div id="resultBox" class="result-box">
        <h3 id="statusTitle" style="margin-top: 0;">-</h3>
        <div id="scoreZone" style="display: none;">
            <p>คะแนนรวมที่ได้</p>
            <div class="score-display"><span id="totalScoreText">0</span> / 100 คะแนน</div>
            <div class="grade-display">ผลประเมิน: <span id="gradeText">-</span></div>
        </div>
    </div>
</div>

<script>
    // 🔗 ฝัง URL เว็บแอปให้เรียบร้อยแล้วครับ ไม่ต้องแก้ไขอะไรเพิ่ม
    const API_URL = "https://script.google.com/macros/s/AKfycby-NJ261ieZ5r37krHBdcK4dbJmxD0ZYhapsrgmBKtZorzjVPGAi643QrBWc72GHVEY/exec"; 

    async function checkEvaluationStatus() {
        const studentId = document.getElementById('studentIdInput').value.trim();
        const subjectCode = document.getElementById('subjectSelect').value;
        const resultBox = document.getElementById('resultBox');
        const statusTitle = document.getElementById('statusTitle');
        const scoreZone = document.getElementById('scoreZone');

        if (!studentId || studentId.length < 8) {
            alert('กรุณากรอกรหัสนิสิตให้ถูกต้องครบ 8 หลักก่อนครับ');
            return;
        }
        if (!subjectCode) {
            alert('กรุณาเลือกรายวิชาที่ต้องการตรวจสอบครับ');
            return;
        }

        resultBox.style.display = 'block';
        resultBox.className = 'result-box';
        statusTitle.innerText = '⏳ กำลังค้นหาข้อมูลการประเมิน...';
        scoreZone.style.display = 'none';

        try {
            const response = await fetch(`${API_URL}?action=checkStatus&studentId=${studentId}&subjectCode=${subjectCode}`);
            const data = await response.json();

            if (data.status === "ได้รับการประเมินแล้ว") {
                resultBox.classList.add('status-evaluated');
                statusTitle.innerText = '✅ อาจารย์ได้บันทึกผลการประเมินให้คุณแล้ว';
                document.getElementById('totalScoreText').innerText = data.totalScore;
                document.getElementById('gradeText').innerText = data.grade;
                scoreZone.style.display = 'block';
            } else {
                resultBox.classList.add('status-not-evaluated');
                statusTitle.innerText = '⚠️ ยังไม่พบผลการประเมินในระบบคลังข้อมูล';
                scoreZone.style.display = 'none';
            }
        } catch (error) {
            resultBox.style.display = 'block';
            statusTitle.innerText = '❌ เกิดข้อผิดพลาดในการเชื่อมต่อกรุณาลองใหม่อีกครั้ง';
            scoreZone.style.display = 'none';
        }
    }
</script>
</body>
</html>
